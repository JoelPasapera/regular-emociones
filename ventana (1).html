  <script>
/* Ventana · modo SOS
   Flujo guiado de emergencia en pantalla completa, para usar EN el pico.
   Diseño para alguien activado: pasos únicos, letra grande, cero decisiones. */
(function () {
  const G = (window.Guia = window.Guia || {});
  const { h, montar } = G.dom;

  const ANCLAS = [
    "Esto es el pico. Pasa solo.",
    "Sentirlo sí, actuarlo no.",
    "En 30 minutos esto se ve distinto.",
    "No decido nada en caliente.",
    "¿Me acerca o me aleja?"
  ];

  let overlay = null;
  let temporizadores = [];

  function limpiar() {
    temporizadores.forEach((t) => { clearTimeout(t); clearInterval(t); });
    temporizadores = [];
  }

  function cerrar() {
    limpiar();
    if (overlay) { overlay.remove(); overlay = null; }
    document.body.style.overflow = "";
  }

  function marco(pasoNum, ...contenido) {
    const btnCerrar = h("button", { class: "btn btn-fantasma", onclick: cerrar, "aria-label": "Salir del modo SOS" }, "✕ Salir");
    return h("div", { class: "sos-overlay", role: "dialog", "aria-modal": "true", "aria-label": "Modo SOS" },
      h("div", { class: "sos-cabecera" }, btnCerrar),
      h("div", { class: "sos-cuerpo" },
        h("p", { class: "sos-pasos" }, "Paso " + pasoNum + " de 4"),
        ...contenido
      )
    );
  }

  function pinta(nodo) {
    montar(overlay);
    overlay.append(nodo);
  }

  /* ---- Paso 1: llegada ---- */
  function paso1() {
    limpiar();
    pinta(marco(1,
      h("h2", null, "Estás aquí. Eso ya es ganar."),
      h("p", { class: "grande" }, "Abriste esto en vez de actuar el impulso. Ahora, tres cosas:"),
      h("p", { class: "grande" }, "No escribas nada. No decidas nada. No respondas nada."),
      h("p", { class: "suave" }, "Si necesitas irte de donde estás, tu frase: ", h("em", null, "\u201cEsto me importa, dame un momento. Vuelvo.\u201d")),
      h("div", { class: "fila-botones" },
        h("button", { class: "btn btn-primario", onclick: paso2 }, "Listo, sigamos")
      )
    ));
  }

  /* ---- Paso 2: respiración ---- */
  function paso2() {
    limpiar();
    const escenario = G.respiracion.crearEscenario({ tecnica: "suspiro", autoIniciar: true });
    pinta(marco(2,
      h("h2", null, "Primero el cuerpo"),
      h("p", { class: "suave" }, "Suspiro fisiológico: doble inhalación por la nariz, exhalación larga por la boca. Sigue el círculo."),
      escenario.el,
      h("div", { class: "fila-botones" },
        h("button", { class: "btn", onclick: () => { escenario.detener(); paso3(); } }, "Siguiente →")
      )
    ));
  }

  /* ---- Paso 3: dejar pasar el pico ---- */
  function paso3() {
    limpiar();
    const reloj = h("div", { class: "temporizador", "aria-live": "off" }, "20:00");
    const ancla = h("p", { class: "ancla-rotativa" }, ANCLAS[0]);
    let restante = 20 * 60;
    let corriendo = false;

    const btnReloj = h("button", {
      class: "btn btn-primario",
      onclick: () => {
        if (corriendo) return;
        corriendo = true;
        btnReloj.textContent = "Corriendo…";
        btnReloj.disabled = true;
        const intv = setInterval(() => {
          restante--;
          const m = String(Math.floor(restante / 60)).padStart(2, "0");
          const s = String(restante % 60).padStart(2, "0");
          reloj.textContent = m + ":" + s;
          if (restante <= 0) {
            clearInterval(intv);
            reloj.textContent = "✓";
            ancla.textContent = "El pico ya debería haber bajado. Escúchate.";
          }
        }, 1000);
        temporizadores.push(intv);
      }
    }, "Iniciar 20 minutos");

    let iAncla = 0;
    const rota = setInterval(() => {
      iAncla = (iAncla + 1) % ANCLAS.length;
      ancla.textContent = ANCLAS[iAncla];
    }, 9000);
    temporizadores.push(rota);

    pinta(marco(3,
      h("h2", null, "El pico pasa solo"),
      h("p", { class: "grande" }, "La activación tarda 20–30 minutos en bajar si no le echas leña. Tu único trabajo es dejarla pasar."),
      reloj,
      h("p", { class: "suave" }, "Mientras tanto: camina rápido · agua fría en cara y muñecas · o escribe TODO en una nota que nadie leerá (jamás en el chat)."),
      h("p", { class: "suave" }, "Si aparece el bucle (\u201ccómo se atreve…\u201d), es leña: vuelve al cuerpo."),
      ancla,
      h("div", { class: "fila-botones" },
        btnReloj,
        h("button", { class: "btn", onclick: paso4 }, "Ya estoy más abajo →")
      )
    ));
  }

  /* ---- Paso 4: antes de actuar ---- */
  function paso4() {
    limpiar();
    G.storage.guardar("sos_completados", (G.storage.leer("sos_completados", 0) || 0) + 1);
    pinta(marco(4,
      h("h2", null, "Antes de decir o hacer nada"),
      h("p", { class: "ancla-rotativa" }, "¿Esto me acerca o me aleja de lo que quiero?"),
      h("p", { class: "suave" }, "Si la respuesta es \u201cme aleja pero me aliviaría\u201d, es el impulso hablando. Espera otro rato."),
      h("p", { class: "grande" }, "Cuando vuelvas a la conversación: agradece la espera y usa la fórmula — ", h("em", null, "cuando pasó X, me sentí Y, te pido Z.")),
      h("p", { class: "suave" }, "Y recuerda: dijiste que volvías. Cumplirlo es lo que separa la pausa del abandono."),
      h("div", { class: "fila-botones" },
        h("button", {
          class: "btn btn-primario",
          onclick: () => { cerrar(); G.router.navegar("#/checkin"); }
        }, "Registrar este momento (check-in)"),
        h("button", { class: "btn", onclick: cerrar }, "Cerrar")
      ),
      h("p", { class: "tenue" }, "En unas horas, ya en frío: hazle la autopsia a este episodio. Ahí está el oro.")
    ));
  }

  function abrir() {
    if (overlay) cerrar();
    overlay = h("div");
    document.getElementById("zonaOverlay").append(overlay);
    document.body.style.overflow = "hidden";
    paso1();
    // Nota: paso1 reemplaza el contenido de overlay; el contenedor externo queda fijo.
  }

  G.emergencia = { abrir, cerrar };
})();

  <script>
/* Ventana · respiración guiada
   Motor reutilizable (también lo usa el modo SOS). Tres técnicas.
   Respeta prefers-reduced-motion: sin animación de escala, solo texto y conteo. */
(function () {
  const G = (window.Guia = window.Guia || {});
  const { h, montar } = G.dom;

  const TECNICAS = {
    suspiro: {
      nombre: "Suspiro fisiológico",
      descripcion: "La manera más rápida conocida de bajar la activación. Doble inhalación por la nariz + exhalación larga por la boca.",
      ciclos: 8,
      fases: [
        { txt: "Inhala profundo por la nariz", dur: 1800, expandir: true },
        { txt: "Otro sorbo corto de aire", dur: 700, expandir: true },
        { txt: "Exhala largo y lento por la boca", dur: 6000, expandir: false }
      ]
    },
    exhalacion: {
      nombre: "Exhalación alargada (4–8)",
      descripcion: "Inhala en 4, exhala en 8. La exhalación larga es la que frena el sistema de alarma.",
      ciclos: 10,
      fases: [
        { txt: "Inhala por la nariz", dur: 4000, expandir: true },
        { txt: "Exhala lento", dur: 8000, expandir: false }
      ]
    },
    cuadrada: {
      nombre: "Respiración cuadrada (4-4-4-4)",
      descripcion: "Para antes de una conversación difícil. Inhala, sostén, exhala, sostén.",
      ciclos: 6,
      fases: [
        { txt: "Inhala", dur: 4000, expandir: true },
        { txt: "Sostén", dur: 4000, expandir: true },
        { txt: "Exhala", dur: 4000, expandir: false },
        { txt: "Sostén", dur: 4000, expandir: false }
      ]
    }
  };

  const movReducido = () =>
    window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  /** Crea un escenario de respiración autónomo.
      opciones: { tecnica, autoIniciar, alTerminar } → { el, iniciar, detener } */
  function crearEscenario(opciones = {}) {
    const tecnica = TECNICAS[opciones.tecnica] || TECNICAS.suspiro;
    let cancelado = true;
    let temporizadores = [];

    const circulo = h("div", { class: "circulo-respiracion", "aria-hidden": "true" });
    const fase = h("p", { class: "fase-respiracion" }, "Listo cuando tú lo estés");
    const contador = h("p", { class: "contador-respiracion" }, tecnica.ciclos + " ciclos · ~" + duracionTotal(tecnica) + " min");
    const btnIniciar = h("button", { class: "btn btn-primario", onclick: iniciar }, "Empezar");
    const btnDetener = h("button", { class: "btn btn-fantasma oculto", onclick: detener }, "Detener");

    const el = h("div", { class: "escenario-respiracion" },
      h("div", { class: "circulo-envoltura" }, circulo),
      fase, contador,
      h("div", { class: "fila-botones" }, btnIniciar, btnDetener)
    );

    function duracionTotal(t) {
      const ms = t.ciclos * t.fases.reduce((a, f) => a + f.dur, 0);
      return Math.max(1, Math.round(ms / 60000));
    }

    function limpiarTemporizadores() {
      temporizadores.forEach(clearTimeout);
      temporizadores = [];
    }

    function paso(iCiclo, iFase) {
      if (cancelado) return;
      const f = tecnica.fases[iFase];
      contador.textContent = "Ciclo " + (iCiclo + 1) + " de " + tecnica.ciclos;

      // Texto con cuenta regresiva por segundos (útil para todos, esencial sin animación)
      let restante = Math.round(f.dur / 1000);
      const pinta = () => { fase.textContent = f.txt + (restante > 1 ? " · " + restante : ""); };
      pinta();
      const intervalo = setInterval(() => {
        restante--;
        if (restante <= 0) clearInterval(intervalo);
        else pinta();
      }, 1000);
      temporizadores.push(intervalo);

      if (!movReducido()) {
        circulo.classList.add("animando");
        circulo.style.setProperty("--dur", f.dur + "ms");
        circulo.classList.toggle("expandido", !!f.expandir);
      }

      temporizadores.push(setTimeout(() => {
        clearInterval(intervalo);
        const sigFase = iFase + 1;
        if (sigFase < tecnica.fases.length) paso(iCiclo, sigFase);
        else if (iCiclo + 1 < tecnica.ciclos) paso(iCiclo + 1, 0);
        else terminar();
      }, f.dur));
    }

    function iniciar() {
      cancelado = false;
      btnIniciar.classList.add("oculto");
      btnDetener.classList.remove("oculto");
      paso(0, 0);
    }

    function detener() {
      cancelado = true;
      limpiarTemporizadores();
      circulo.classList.remove("expandido", "animando");
      fase.textContent = "Pausado. Cuando quieras, otra vez.";
      contador.textContent = "";
      btnDetener.classList.add("oculto");
      btnIniciar.classList.remove("oculto");
      btnIniciar.textContent = "Empezar de nuevo";
    }

    function terminar() {

(function () {
  const G = (window.Guia = window.Guia || {});
  const { h, montar } = G.dom;

  function vista(vista) {
    const marcadas = G.storage.leer("prog_tareas", {});

      marcadas[id] = valor;
      G.storage.guardar("prog_tareas", marcadas);
      pintarProgreso();
    }

    const barra = h("div", null);
    const textoProg = h("p", { class: "suave" });

    function pintarProgreso() {
      let total = 0, hechas = 0, faseActual = null;
      for (const fase of G.programa) {
        for (const t of fase.tareas) { total++; if (marcadas[t.id]) hechas++; }
        if (!faseActual && fase.tareas.some((t) => !marcadas[t.id])) faseActual = fase;
      }
      const pct = total ? Math.round((hechas / total) * 100) : 0;
      barra.innerHTML = "";
      barra.append(h("div", { class: "barra-progreso" }, h("div", { style: "width:" + pct + "%" })));
      textoProg.textContent = hechas + " de " + total + " tareas · " + pct + "%" +
        (faseActual ? " · Fase actual: " + faseActual.titulo + " (" + faseActual.semanas + ")" : " · Programa completado 🎉");
    }

    const fases = G.programa.map((fase, i) =>
      h("div", { class: "tarjeta" },

/* Ventana · Dojo de escenarios
   Práctica deliberada: situación → elección → feedback que nombra el mecanismo.
   Sesión de 5 escenarios (prioriza los menos practicados). */
(function () {
  const G = (window.Guia = window.Guia || {});
  const { h, montar } = G.dom;

  function barajar(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function elegirSesion(n = 5) {
    const historial = G.storage.leer("dojo", []);
    const veces = {};
    for (const d of historial) veces[d.escenario] = (veces[d.escenario] || 0) + 1;
    return barajar(G.escenarios)
      .sort((a, b) => (veces[a.id] || 0) - (veces[b.id] || 0))
      .slice(0, n);
  }

  function vista(vista) {
    let sesion = [], indice = 0, puntos = 0;

    function inicio() {
      const historial = G.storage.leer("dojo", []);
      const total = historial.length;
      const reguladas = historial.filter((d) => d.tipo === "regulada").length;
      montar(vista,
        h("p", { class: "eyebrow" }, "Herramienta · práctica deliberada"),
        h("h1", { class: "titulo" }, "Dojo"),
        h("p", { class: "subtitulo" }, "Veinte situaciones reales. Eliges cómo responder y el feedback te nombra el mecanismo. Aquí se falla gratis para no fallar caro afuera."),
        h("div", { class: "tarjeta" },
          h("p", { class: "suave" }, total
            ? "Llevas " + total + " respuestas, " + reguladas + " reguladas (" + Math.round((reguladas / total) * 100) + "%)."
            : "Primera sesión: cinco escenarios, dos minutos. El ensayo en frío es lo que aparece solo en caliente."),
          h("div", { class: "fila-botones" },
            h("button", { class: "btn btn-primario", onclick: empezar }, "Entrenar (5 escenarios)"))
        )
      );
    }

    function empezar() {
      sesion = elegirSesion(5);
      indice = 0; puntos = 0;
      pintarEscenario();
    }

    function pintarEscenario() {
      const e = sesion[indice];
      const zona = h("div");
      const opciones = barajar(e.opciones);

      opciones.forEach((op) => {
        zona.append(h("button", {
          class: "opcion-dojo",
          onclick: (ev) => responder(e, op, zona, ev.currentTarget)
        }, op.t));
      });

      montar(vista,
        h("p", { class: "eyebrow" }, "Dojo · escenario " + (indice + 1) + " de " + sesion.length),
        h("h1", { class: "titulo", style: "font-size:1.4rem" }, e.situacion),
        h("p", { class: "suave" }, "¿Qué haces?"),
        zona
      );
    }

    function responder(e, elegida, zona, boton) {
      // registra
      const historial = G.storage.leer("dojo", []);
      historial.push({ ts: new Date().toISOString(), escenario: e.id, tipo: elegida.tipo, disciplina: e.disciplina });
      G.storage.guardar("dojo", historial);
      puntos += elegida.tipo === "regulada" ? 2 : elegida.tipo === "parcial" ? 1 : 0;

      // pinta feedback en todas las opciones
      zona.querySelectorAll(".opcion-dojo").forEach((b) => { b.disabled = true; });
      boton.classList.add("elegida-" + elegida.tipo);

      const fb = h("div", { class: "tarjeta", style: "margin-top:16px;border-color:var(--" + (elegida.tipo === "regulada" ? "calma" : elegida.tipo === "parcial" ? "ambar" : "rojo") + ")" },
        h("p", { class: "eyebrow" }, elegida.tipo === "regulada" ? "Regulada · +2" : elegida.tipo === "parcial" ? "Parcial · +1" : "Impulso · +0"),
        h("p", null, elegida.fb),
        elegida.tipo !== "regulada" && h("p", { class: "suave" }, h("strong", null, "La jugada del domador: "), e.opciones.find((o) => o.tipo === "regulada").t),
        h("p", { class: "tenue" }, "Lección: " + e.leccion),
        h("div", { class: "fila-botones" },
          h("button", { class: "btn btn-primario", onclick: siguiente }, indice + 1 < sesion.length ? "Siguiente →" : "Ver resultado"))
      );
      zona.append(fb);
      if (fb.scrollIntoView) fb.scrollIntoView({ block: "nearest" });
    }

    function siguiente() {
      indice++;
      if (indice < sesion.length) pintarEscenario();

    function resumen() {
      const max = sesion.length * 2;
      const pct = Math.round((puntos / max) * 100);

        h("p", { class: "eyebrow" }, "Dojo · sesión completa"),
        h("h1", { class: "titulo" }, puntos + " de " + max + " puntos"),
        h("div", { class: "barra-progreso", style: "max-width:360px" }, h("div", { style: "width:" + pct + "%" })),
        h("p", { class: "suave", style: "margin-top:16px" },
          pct >= 80 ? "Nivel domador. Ahora la prueba real: que salga igual con el pecho a 6."
          : pct >= 50 ? "Vas viendo las jugadas. Repite mañana: la sesión prioriza lo que menos practicas."

  }

  G.vistas = G.vistas || {};
  G.vistas.dojo = vista;

/* Ventana · repaso espaciado (algoritmo SM-2 simplificado)
   Un experto recupera bajo presión: Otra vez (1d) · Bien (intervalo×2) · Fácil (×3). */
(function () {
  const G = (window.Guia = window.Guia || {});
  const { h, montar, claveDia } = G.dom;
  const DIA = 24 * 60 * 60 * 1000;

  function estado() { return G.storage.leer("repaso", {}); }
  function stats() { return G.storage.leer("repaso_stats", { revisadas: 0 }); }

  function pendientes() {
    const st = estado();
    const ahora = Date.now();
    return G.tarjetas.filter((t) => {
      const e = st[t.id];
      return !e || e.proxima <= ahora;
    });
  }

  function calificar(id, grado) {
    const st = estado();
    const e = st[id] || { intervalo: 0 };
    if (grado === "otra") e.intervalo = 0;
    else if (grado === "bien") e.intervalo = Math.max(1, Math.round((e.intervalo || 0.5) * 2));
    else e.intervalo = Math.max(2, Math.round((e.intervalo || 1) * 3));
    e.proxima = Date.now() + Math.max(0.5, e.intervalo) * DIA * (grado === "otra" ? 0.007 : 1); // "otra vez" vuelve en ~10 min
    st[id] = e;
    G.storage.guardar("repaso", st);
    const s = stats();
    s.revisadas++;
    s.ultimoDia = claveDia();
    G.storage.guardar("repaso_stats", s);
  }

  function vista(vista) {
    let cola = [];

    function inicio() {
      cola = pendientes();
      const s = stats();

        h("h1", { class: "titulo" }, "Repaso"),

            : "Sin pendientes por ahora: el mazo está al día. Total de repasos: " + s.revisadas + "."),
          h("div", { class: "fila-botones" },
            cola.length ? h("button", { class: "btn btn-primario", onclick: () => tarjeta(0) }, "Repasar (" + Math.min(cola.length, 12) + ")") : null,
            h("button", { class: "btn", onclick: () => { cola = [...G.tarjetas].sort(() => Math.random() - 0.5); tarjeta(0); } }, "Modo libre"))
        )
      );
    }

    function tarjeta(i) {
      if (i >= Math.min(cola.length, 12)) { inicio(); return; }
      const t = cola[i];
      const dorso = h("div", { class: "tarjeta oculto", style: "border-color:var(--calma)" },

          h("button", { class: "btn", onclick: () => { calificar(t.id, "bien"); tarjeta(i + 1); } }, "Bien"),
          h("button", { class: "btn btn-primario", onclick: () => { calificar(t.id, "facil"); tarjeta(i + 1); } }, "Fácil"))
      );
      const btnVer = h("button", { class: "btn btn-primario", onclick: () => { dorso.classList.remove("oculto"); btnVer.classList.add("oculto"); } }, "Mostrar respuesta");

(function () {
  const G = (window.Guia = window.Guia || {});

  /** Serie: promedio de nivel por día, últimos 30 días. */

    const porDia = {};

    const dias = [];
    const d = new Date();
    d.setDate(d.getDate() - 29);
    for (let i = 0; i < 30; i++) {
      const k = claveDia(d);
      const vals = porDia[k];
      dias.push({ dia: k, valor: vals ? vals.reduce((a, b) => a + b, 0) / vals.length : null });

    const r = resumen();
    const autoev = G.storage.leer("autoevaluaciones", []);
    const L = [];
    L.push("INFORME DE ENTRENAMIENTO EMOCIONAL · Ventana");
    L.push("Generado: " + new Date().toLocaleDateString("es"));
    L.push("");
    L.push("— Registro —");
    L.push("Check-ins totales: " + r.checkins.length);
    L.push("Amarillos/rojos registrados: " + r.conAmarillo.length + " · detectados a tiempo: " + r.detectados);
    L.push("Episodios marcados: " + r.episodios + " · autopsias procesadas: " + r.autopsias.length);
    if (r.top.length) L.push("Emociones más nombradas: " + r.top.map(([e, n]) => e + " (" + n + ")").join(", "));
    if (autoev.length) {
      L.push("Autoevaluación: base " + autoev[0].total + "/40 → última " + autoev[autoev.length - 1].total + "/40");
    }
    L.push("");
    L.push("— Últimas autopsias (resumen) —");
    for (const a of r.autopsias.slice(-5)) {
      L.push("· " + new Date(a.ts).toLocaleDateString("es") + " (nivel " + a.nivel + "/10): " + (a.respuestas.antes || "").slice(0, 90));
      if (a.respuestas.debajo) L.push("  Debajo: " + a.respuestas.debajo.slice(0, 90));
      if (a.respuestas.proxima) L.push("  Plan: " + a.respuestas.proxima.slice(0, 90));
    }
    L.push("");
    L.push("Nota: datos auto-registrados por el paciente con una app local de entrenamiento");
    L.push("en regulación emocional (protocolo: detección/semáforo, pausa, descarga,");
    L.push("reestructuración, autopsias de episodio, comunicación y reparación).");
    return L.join("\n");
  }

  function descargarInforme() {
    const blob = new Blob([informeTexto()], { type: "text/markdown" });
    const url = URL.createObjectURL(blob);
    const a = h("a", { href: url, download: "ventana-informe-" + claveDia() + ".md" });
    document.body.append(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    toast("Informe descargado");
  }

  function vista(vista) {
    const r = resumen();
    const niveles = serieNiveles();
    const hayDatos = r.checkins.length > 0;

    montar(vista,
      h("p", { class: "eyebrow" }, "Herramienta · tus cuatro curvas"),
      h("h1", { class: "titulo" }, "Estadísticas"),
      h("p", { class: "subtitulo" }, "El progreso real no es cero episodios: es detectar antes, recuperarte más rápido, dañar menos y reparar mejor. Aquí se ve."),
      !hayDatos
        ? h("div", { class: "vacio" }, "Todavía no hay datos que graficar. Con una semana de check-ins, esto cobra vida.")
        : h("div", null,
            h("div", { class: "tarjeta" },
              h("h3", { class: "mt0", style: "font-family:var(--f-titulo)" }, "Tu número, últimos 30 días"),
              h("p", { class: "tenue" }, "La banda verde es tu ventana (≤6). La meta no es una línea plana: es que las subidas duren menos."),
              graficaNiveles(niveles)),
            h("div", { class: "tarjeta" },
              h("h3", { class: "mt0", style: "font-family:var(--f-titulo)" }, "Detección a tiempo (curva 1)"),
              h("p", { class: "tenue" }, "De los amarillos/rojos que registraste, cuántos viste venir. Esta curva subiendo = el termómetro calibrado."),
              graficaDeteccion(serieDeteccion())),
            h("div", { class: "tarjeta" },
              h("h3", { class: "mt0", style: "font-family:var(--f-titulo)" }, "Datos duros"),
              h("p", { class: "suave mb0" },
                r.checkins.length + " check-ins · " + r.episodios + " episodios marcados · " + r.autopsias.length +
                " autopsias · " + r.dojo.length + " respuestas de dojo (" +
                (r.dojo.length ? Math.round((r.dojo.filter((d) => d.tipo === "regulada").length / r.dojo.length) * 100) : 0) + "% reguladas)" +
                (r.top.length ? " · emociones top: " + r.top.map(([e]) => e).join(", ") : "")))
          ),
      h("div", { class: "tarjeta" },
        h("h3", { class: "mt0", style: "font-family:var(--f-titulo)" }, "Informe para terapeuta"),
        h("p", { class: "suave" }, "Resumen de tus patrones y últimas autopsias, listo para llevar a consulta. Movimiento de experto: entrenar con datos y con entrenador."),
        h("div", { class: "fila-botones" },
          h("button", { class: "btn btn-primario", onclick: descargarInforme }, "Descargar informe (.md)"),
          h("button", { class: "btn", onclick: async () => toast(await copiar(informeTexto()) ? "Informe copiado" : "No pude copiar aquí") }, "Copiar texto"))
      )
    );
  }

  G.vistas = G.vistas || {};
  G.vistas.estadisticas = vista;
})();

</script>
  <script>
/* Ventana · sistema de maestría
   Principio de diseño: los niveles NO se leen, se ganan. Cada punto sale de
   práctica registrada en la app. Un experto es alguien con repeticiones, no
   con capítulos leídos. */
(function () {
  const G = (window.Guia = window.Guia || {});
  const { h, montar } = G.dom;

  const DISCIPLINAS = [
    { id: "deteccion",  nombre: "Detección",  desc: "Ver el amarillo a tiempo: check-ins, calibración del termómetro." },
    { id: "cuerpo",     nombre: "Cuerpo",     desc: "Bajar la activación: respiraciones completadas, SOS terminados." },
    { id: "mente",      nombre: "Mente",      desc: "Desarmar interpretaciones: repasos del mazo, aciertos del Dojo." },
    { id: "palabra",    nombre: "Palabra",    desc: "Salir y expresar bien: escenarios de palabra, frases propias, retos." },
    { id: "reparacion", nombre: "Reparación", desc: "Procesar y reparar: autopsias hechas, escenarios de reparación." },
    { id: "terreno",    nombre: "Terreno",    desc: "Cuidar la base: terreno anotado, retos de sueño/alcohol/ejercicio." }
  ];

  const NIVELES = [
    { min: 0,   nombre: "Aprendiz" },
    { min: 12,  nombre: "Practicante" },
    { min: 35,  nombre: "Avanzado" },
    { min: 80,  nombre: "Experto" },
    { min: 160, nombre: "Maestro" }
  ];

  const RANGOS = [
    { min: 0,   nombre: "Observador" },
    { min: 25,  nombre: "Aprendiz" },
    { min: 70,  nombre: "Practicante" },
    { min: 160, nombre: "Domador" },
    { min: 320, nombre: "Experto" },
    { min: 560, nombre: "Maestro de la Ventana" }
  ];

  /** Calcula puntos por disciplina a partir de lo registrado. */
  function calcular() {
    const st = G.storage;
    const checkins = st.leer("checkins", []);
    const autopsias = st.leer("autopsias", []);
    const dojo = st.leer("dojo", []);
    const repaso = st.leer("repaso_stats", { revisadas: 0 });
    const retosHechos = st.leer("retos_hechos", {});
    const cuaderno = st.leer("cuaderno", {});
    const respSes = st.leer("resp_sesiones", 0);
    const sosOk = st.leer("sos_completados", 0);

    const p = { deteccion: 0, cuerpo: 0, mente: 0, palabra: 0, reparacion: 0, terreno: 0 };

    // Detección: cada check-in 1; amarillo detectado a tiempo +2; nombre preciso +1
    for (const c of checkins) {
      p.deteccion += 1;
      if (c.detecte === "si") p.deteccion += 2;
      if (c.emocion) p.deteccion += 1;
      if (c.terreno) p.terreno += 1;
    }

    // Cuerpo
    p.cuerpo += respSes * 2 + sosOk * 3;

    // Mente: repasos + aciertos dojo (regulada 2, parcial 1) van a su disciplina
    p.mente += Math.floor(repaso.revisadas / 2);
    for (const d of dojo) {
      const pts = d.tipo === "regulada" ? 2 : d.tipo === "parcial" ? 1 : 0;
      if (p[d.disciplina] != null) p[d.disciplina] += pts;
      else p.mente += pts;
    }

    // Reparación: autopsias 3; con si-entonces escrito +2
    for (const a of autopsias) {
      p.reparacion += 3;
      if (a.respuestas && a.respuestas.proxima) p.reparacion += 2;
    }

    // Palabra: campos clave del cuaderno llenos (una vez)
    if ((cuaderno.frases || "").trim()) p.palabra += 4;
    if ((cuaderno.sientonces || "").trim()) p.mente += 4;
    if ((cuaderno.norte || "").trim()) p.deteccion += 2;

    // Retos: 2 puntos a su disciplina
    for (const dia of Object.keys(retosHechos)) {
      const reto = G.retos.find((r) => r.id === retosHechos[dia]);
      if (reto && p[reto.disciplina] != null) p[reto.disciplina] += 2;
    }

    return p;
  }

  function nivelDe(puntos) {
    let actual = NIVELES[0], siguiente = null;
    for (let i = 0; i < NIVELES.length; i++) {
      if (puntos >= NIVELES[i].min) { actual = NIVELES[i]; siguiente = NIVELES[i + 1] || null; }
    }
    return { actual, siguiente };
  }

  function rangoGlobal(p) {
    const total = Object.values(p).reduce((a, b) => a + b, 0);
    let r = RANGOS[0];
    for (const cand of RANGOS) if (total >= cand.min) r = cand;
    const sig = RANGOS[RANGOS.indexOf(r) + 1] || null;
    return { total, rango: r, siguiente: sig };
  }

  /** Reto del día: determinista por fecha, sesgado hacia tu disciplina más floja. */
  function retoDelDia() {
    const dia = G.dom.claveDia();
    const hechos = G.storage.leer("retos_hechos", {});
    const p = calcular();
    const floja = DISCIPLINAS.reduce((a, b) => (p[a.id] <= p[b.id] ? a : b)).id;
    const candidatos = G.retos.filter((r) => r.disciplina === floja);
    const banco = candidatos.length ? candidatos : G.retos;
    let semilla = 0;
    for (const ch of dia) semilla = (semilla * 31 + ch.charCodeAt(0)) % 100000;
    const reto = banco[semilla % banco.length];
    return { reto, hecho: hechos[dia] === reto.id, dia };
  }

  function marcarReto() {
    const { reto, dia } = retoDelDia();
    const hechos = G.storage.leer("retos_hechos", {});
    hechos[dia] = reto.id;
    G.storage.guardar("retos_hechos", hechos);
  }

  /* -------- Vista -------- */
  function vista(vista) {
    const p = calcular();
    const g = rangoGlobal(p);
    const rd = retoDelDia();

    const filas = DISCIPLINAS.map((d) => {
      const { actual, siguiente } = nivelDe(p[d.id]);
      const pct = siguiente ? Math.min(100, Math.round(((p[d.id] - actual.min) / (siguiente.min - actual.min)) * 100)) : 100;
      return h("div", { class: "tarjeta" },
        h("div", { class: "fila separado" },
          h("div", null, h("strong", null, d.nombre), h("span", { class: "tenue" }, "  ·  " + actual.nombre)),
          h("span", { class: "badge badge-verde" }, p[d.id] + " pts")
        ),
        h("p", { class: "tenue", style: "margin:6px 0 10px" }, d.desc),
        h("div", { class: "barra-progreso" }, h("div", { style: "width:" + pct + "%" })),
        h("p", { class: "tenue mb0", style: "margin-top:6px" },
          siguiente ? "Siguiente nivel (" + siguiente.nombre + ") a los " + siguiente.min + " pts" : "Nivel máximo alcanzado")
      );
    });

    const btnReto = h("button", {
      class: "btn " + (rd.hecho ? "" : "btn-primario"),
      onclick: () => { if (!rd.hecho) { marcarReto(); G.dom.toast("Reto cumplido: +2 en su disciplina"); vista.__render(); } }
    }, rd.hecho ? "Cumplido hoy ✓" : "Marcar como hecho");

    vista.__render = () => vistaRender(vista);
    montar(vista,
      h("p", { class: "eyebrow" }, "Herramienta · práctica registrada, no lectura"),
      h("h1", { class: "titulo" }, "Maestría"),
      h("p", { class: "subtitulo" }, "Aquí no hay atajos: cada punto sale de algo que hiciste y registraste. Así se fabrica un experto."),
      h("div", { class: "tarjeta", style: "border-color:var(--calma)" },
        h("p", { class: "eyebrow" }, "Tu rango"),
        h("h3", { class: "mt0", style: "font-family:var(--f-titulo);font-size:1.6rem" }, g.rango.nombre),
        h("p", { class: "suave mb0" }, g.total + " puntos totales" + (g.siguiente ? " · siguiente rango (" + g.siguiente.nombre + ") a los " + g.siguiente.min : " · rango máximo"))
      ),
      h("div", { class: "tarjeta", style: "border-color:var(--ambar)" },
        h("p", { class: "eyebrow" }, "Reto del día · disciplina " + (G.retos.find(r => r.id === rd.reto.id)?.disciplina || "")),
        h("p", { style: "font-size:1.05rem" }, rd.reto.t),
        h("div", { class: "fila-botones" }, btnReto)
      ),
      ...filas,
      h("p", { class: "tenue" }, "Cómo puntúa cada disciplina está explicado en el Libro 10.4.")
    );
  }

  function vistaRender(v) { vista(v); }

  G.maestria = { calcular, rangoGlobal, retoDelDia, marcarReto, DISCIPLINAS };
  G.vistas = G.vistas || {};
  G.vistas.maestria = vista;
})();

</script>

  <script>
/* Ventana · arranque: navegación, rutas y eventos globales */
(function () {
  const G = window.Guia;
  const { h, montar } = G.dom;

  /* ---- Navegación lateral ---- */
  const HERRAMIENTAS = [
    ["#/checkin", "Check-in", "1 minuto al día"],
    ["#/dojo", "Dojo", "escenarios con feedback"],
    ["#/repaso", "Repaso", "tarjetas espaciadas"],
    ["#/respiracion", "Respiración", "guiada, 3 técnicas"],
    ["#/autopsia", "Autopsia", "procesa episodios"],
    ["#/frases", "Frases de salida", "filtrables, copiables"],
    ["#/autoevaluacion", "Autoevaluación", "tu línea de base"],
    ["#/programa", "Programa 90 días", "un foco por quincena"],
    ["#/estadisticas", "Estadísticas", "tus cuatro curvas"],
    ["#/maestria", "Maestría", "rango y reto del día"],
    ["#/cuaderno", "Mi cuaderno", "tu mapa personal"],
    ["#/datos", "Copia y datos", "todo es tuyo"]
  ];

  function construirNav() {
    const lateral = document.getElementById("lateral");
    const nodos = [h("h2", null, "Empieza"), enlace("#/inicio", "Inicio", null)];

    nodos.push(h("h2", null, "Herramientas"));
    for (const [href, nombre, mini] of HERRAMIENTAS) nodos.push(enlace(href, nombre, mini));

    nodos.push(h("h2", null, "La guía"));
    for (const libro of G.libros) {
      const etiqueta = typeof libro.num === "number" ? "Libro " + libro.num : libro.titulo;
      const mini = typeof libro.num === "number" ? libro.titulo : "plantillas y guiones";
      nodos.push(enlace("#/libro/" + libro.id, etiqueta, mini));
    }
    montar(lateral, ...nodos);
  }

  function enlace(href, nombre, mini) {
    return h("a", { href }, nombre, mini && h("span", { class: "mini" }, mini));
  }

  /* ---- Rutas ---- */
  G.router.registrar("#/inicio", G.vistas.inicio);
  G.router.registrar("#/checkin", G.vistas.checkin);
  G.router.registrar("#/respiracion", G.vistas.respiracion);
  G.router.registrar("#/autopsia", G.vistas.autopsia);
  G.router.registrar("#/frases", G.vistas.frases);
  G.router.registrar("#/autoevaluacion", G.vistas.autoevaluacion);
  G.router.registrar("#/programa", G.vistas.programa);
  G.router.registrar("#/cuaderno", G.vistas.cuaderno);
  G.router.registrar("#/datos", G.vistas.datos);
  G.router.registrar("#/dojo", G.vistas.dojo);
  G.router.registrar("#/repaso", G.vistas.repaso);
  G.router.registrar("#/estadisticas", G.vistas.estadisticas);
  G.router.registrar("#/maestria", G.vistas.maestria);
  for (const libro of G.libros) {
    G.router.registrar("#/libro/" + libro.id, G.vistas.renderLibro(libro.id));
  }

  /* ---- Eventos globales ---- */
  document.getElementById("btnSOS").addEventListener("click", () => G.emergencia.abrir());

  const lateral = document.getElementById("lateral");
  const capa = document.getElementById("capaNav");
  const alternador = document.getElementById("navToggle");
  alternador.addEventListener("click", () => {
    const abierto = lateral.classList.toggle("abierto");
    capa.hidden = !abierto;
    alternador.setAttribute("aria-expanded", String(abierto));
  });
  capa.addEventListener("click", () => {
    lateral.classList.remove("abierto");
    capa.hidden = true;
    alternador.setAttribute("aria-expanded", "false");
  });

  // Atajo de teclado: S abre el SOS (salvo escribiendo en un campo)
  document.addEventListener("keydown", (e) => {
    if (e.key.toLowerCase() === "s" && !e.ctrlKey && !e.metaKey && !e.altKey) {
      const t = e.target;
      if (t && (t.tagName === "INPUT" || t.tagName === "TEXTAREA" || t.tagName === "SELECT" || t.isContentEditable)) return;
      G.emergencia.abrir();
    }
    if (e.key === "Escape") G.emergencia.cerrar();
  });

  construirNav();
  G.router.iniciar("#/inicio");
})();

</script>
