  {
    num: 9, id: "libro-9", titulo: "El largo plazo",
    resumen: "Identidad de proceso, tu norte, cómo se mide el progreso real, protocolo de recaída, mantenimiento y ayuda profesional.",
    secciones: [
      { titulo: "9.1 De \"soy impulsivo\" a \"estoy entrenando\"", md: `
Las etiquetas de identidad ("soy impulsivo", "soy tóxico", "soy un desastre") son profecías: si *eres* así, ¿para qué intentar? El cambio sostenible se apoya en identidad de proceso: **"soy alguien que está entrenando su respuesta"**. Cada vez que actúas según el método —una frase dicha, un borrador salvado, una autopsia hecha— votas por esa identidad. El objetivo no es la perfección: es la mayoría de votos.` },

      { titulo: "9.2 Tu norte", md: `
Escribe, en dos o tres líneas, quién quieres ser en tus relaciones. No qué quieres dejar de hacer: quién quieres **ser**. ("Quiero ser alguien con quien se pueda hablar de lo difícil sin miedo. Alguien que cuando le duele algo lo dice claro y sin herir.") Guárdalo en *Mi cuaderno*. En los momentos grises, la pregunta "¿qué haría la persona que quiero ser?" ordena más que cualquier técnica.` },

      { titulo: "9.3 Medir el progreso real", md: `
El progreso NO es cero episodios; medirlo así garantiza frustración y abandono. Son cuatro curvas:

1. **Detección más temprana:** cada vez notas el amarillo antes.
2. **Recuperación más rápida:** el pico dura menos; vuelves antes.
3. **Menor intensidad de daño:** un comentario seco en vez de un mensaje bomba es una victoria enorme.
4. **Mejor reparación:** cuando pasa, reparas antes y mejor.

Se miden con el check-in diario y la revisión semanal (Anexo C): diez minutos por semana que separan el entrenamiento de las buenas intenciones.` },

      { titulo: "9.4 Protocolo de recaída", md: `
Habrá recaídas, incluso feas, incluso tras semanas buenas. Una recaída no borra el progreso ni te devuelve a cero; es un dato más. Protocolo: (1) sin identidad —"tuve un episodio", no "soy un desastre"—; (2) autopsia completa en 24–48 h; (3) reparación si hubo daño; (4) ajuste del plan con lo aprendido (¿qué eslabón falló?, ¿qué regla faltaba?); (5) seguir, sin periodo de autocastigo. Lo que define el resultado a un año no es cuántas veces caes: es cuántas caídas procesas.` },

      { titulo: "9.5 Mantenimiento (después de los 90 días)", md: `
Mínimo vital de por vida: check-in de un minuto los días de carga alta, revisión semanal de diez minutos, autopsia de todo episodio, y práctica de atención la mayoría de los días. Cuando lleves meses estable, puedes aflojar el registro diario; la revisión semanal y las autopsias no se jubilan nunca: son el sistema inmune del patrón.` },

      { titulo: "9.6 Ayuda profesional", md: `
Esta guía es entrenamiento serio; un psicólogo lo multiplica: ve tus puntos ciegos, trabaja el origen de tus fibras específicas y sostiene el proceso cuando flaquea. Dos enfoques con especial buena evidencia para esto: la **terapia dialéctico-conductual (TDC/DBT)**, que es literalmente un entrenamiento formal en regulación emocional y tolerancia al malestar —esta guía, con acompañamiento experto—, y la **terapia cognitivo-conductual (TCC)**, que trabaja a fondo el Libro 5. Señales de que conviene ir ya: episodios que siguen frecuentes tras dos meses de práctica seria, rumiación de días, o daño relacional que se acumula. Si esto te costó una relación que amabas, la terapia es probablemente la inversión con mejor retorno disponible. No es señal de estar roto: es lo que hace un adulto que va en serio.` }
    ]
  },

  {
    num: 10, id: "libro-10", titulo: "El camino del experto",
    resumen: "De competente a domador: práctica deliberada, la escalera de exposición, cómo puntúa el sistema de maestría y la mentalidad que sostiene todo.",
    secciones: [
      { titulo: "10.1 Qué significa ser experto aquí", md: `
Experto no es quien nunca se activa: es quien ejecuta bien **bajo presión**. El aprendizaje de cualquier destreza pasa por cuatro etapas: no sabes que fallas → sabes que fallas (donde más duele, y donde probablemente estás) → lo haces bien si te concentras → **lo haces bien en automático, incluso a 7/10 de activación**. La última etapa no llega leyendo: llega con repeticiones. Por eso esta edición convierte la guía en gimnasio.

La definición operativa de tu meta: **que la respuesta regulada sea más rápida que el impulso.** Hoy el impulso tiene años de ventaja en repeticiones; el entrenamiento existe para dárselas a la respuesta nueva.` },

      { titulo: "10.2 Práctica deliberada (por qué el Dojo funciona)", md: `
La práctica que fabrica expertos tiene cuatro ingredientes, y el Dojo los implementa todos:

1. **Dificultad justa:** escenarios reales de tus categorías (visto, cancelación, crítica pública…), no teoría abstracta.
2. **Feedback inmediato que nombra el mecanismo:** no "mal", sino "eso es frase espejo + leer la mente". Lo que tiene nombre se ve venir.
3. **Repetición espaciada de lo débil:** las sesiones priorizan los escenarios que menos has practicado, y el mazo de Repaso te devuelve lo que se te escapa.
4. **Fallar gratis:** cada impulso elegido en el Dojo es un impulso que no le costó nada a nadie — y que ahora reconoces.

El ensayo mental (5.2) es la otra mitad: visualizar la escena incómoda y verte ejecutar el plan. Dojo + ensayo + vida real es el circuito completo.` },

      { titulo: "10.3 La escalera de exposición", md: `
La tolerancia al malestar (5.8) se entrena con progresión de cargas, como la fuerza. Diseña tu escalera: ordena situaciones de tu vida de menor a mayor activación esperada, y practica el protocolo empezando abajo.

Ejemplo de escalera tipo: (1) esperar 1 hora para responder un mensaje neutro → (2) decir "prefiero otra opción" en una decisión trivial → (3) nombrar en voz alta una molestia menor a alguien de confianza → (4) poner un límite pequeño a tiempo → (5) abrir una conversación pendiente de intensidad media con apertura suave → (6) sostener una conversación difícil real con pausa incluida. **Regla:** no subes de escalón hasta que el actual te salga con el número bajo control. Saltarte escalones es cómo se convence la gente de que "esto no funciona".` },

      { titulo: "10.4 Cómo puntúa el sistema de maestría", md: `
El principio: **los niveles no se leen, se ganan.** Cada punto sale de práctica registrada — la app no puede verte la vida, así que lo que no registras no existe para ella (y esa honestidad es parte del entrenamiento).

- **Detección:** check-ins hechos (+1), amarillos detectados a tiempo (+2), emoción nombrada con precisión (+1).
- **Cuerpo:** respiraciones completadas (+2), flujos SOS terminados (+3).
- **Mente:** repasos del mazo, aciertos del Dojo en escenarios de interpretación, si-entonces escritos.
- **Palabra:** escenarios de comunicación del Dojo, tus frases propias en el cuaderno, retos de expresión.
- **Reparación:** autopsias (+3, y +2 si incluyen plan si-entonces), escenarios de reparación.
- **Terreno:** terreno anotado en el check-in, retos de sueño/alcohol/ejercicio.

Y las herramientas de campo también puntúan: cada **descarga física** completada (+1 Cuerpo), cada **ola surfeada** con su curva (+2 Cuerpo), cada **STOP guiado** terminado (+2 Detección), cada **borrador que murió o se reescribió en frío** (+3 Palabra) y cada **conversación preparada que efectivamente tuviste** (+3 Palabra), cada **anclaje completado** (+1 Detección) y cada **práctica de autocompasión** (+2 Reparación — reparar también es contigo).

Cada disciplina sube por niveles (Aprendiz → Practicante → Avanzado → Experto → Maestro) y el conjunto define tu rango, hasta **Maestro de la Ventana**. El reto del día apunta automáticamente a tu disciplina más floja: los expertos entrenan su punto débil, no su truco favorito.` },

      { titulo: "10.5 Por qué memorizar (el Repaso)", md: `
En pleno amarillo no hay tiempo de buscar el capítulo: o el conocimiento está **disponible sin esfuerzo**, o no está. El repaso espaciado entrena exactamente eso — recuperar bajo demanda — y además es el método de memorización con mejor evidencia que existe. Diez tarjetas al día bastan. Cuando "¿y debajo, qué me dolió?" te salga solo a las 2 a.m. con el pecho a 7, vas a entender para qué era el mazo.` },

      { titulo: "10.6 Mentalidad de domador", md: `
Un domador no odia al animal ni lo apalea: **lo conoce mejor que nadie**. Sabe qué lo asusta, lee sus señales antes que nadie, y por eso puede trabajar con él donde otros solo ven peligro. Tus impulsos son ese animal: fuerza real, con historia, con gatillos conocibles. Domar no es suprimir — un animal suprimido explota peor — sino conocer, anticipar y dirigir. La intensidad que hoy te cuesta relaciones es la misma que, dirigida, se vuelve pasión, presencia y coraje para las conversaciones que otros evitan. No estás amputando nada: estás poniendo jinete a un caballo con motor grande.` },

      { titulo: "10.7 El techo del autodidacta", md: `
Todo experto serio tiene entrenador: los atletas de élite más que nadie. En este terreno, el entrenador se llama psicólogo, y hay un techo claro para el trabajo en solitario: los puntos ciegos (por definición no los ves tú), el origen fino de tus fibras, y los patrones que se activan justamente *en relación con otra persona*. Si tras dos meses de práctica registrada las curvas no se mueven, o si el daño relacional sigue acumulándose, no es que falles tú ni el método: es que tocaste el techo del gimnasio en casa. La TDC/DBT es exactamente este entrenamiento con entrenador. Los expertos de verdad se distinguen por saber cuándo llamarlo.` }
    ]

Tus disparadores, señales, nombres, movimientos, frases, reglas, planes si-entonces, distorsiones de cabecera y tu norte. Editable y con guardado automático en la herramienta *Mi cuaderno*.` },

      { titulo: "Anexo G · Glosario", md: `
**Secuestro emocional:** toma de control del sistema rápido; visión de túnel + certeza falsa + urgencia. · **Ventana de tolerancia:** franja donde puedes sentir y pensar a la vez. · **Emoción tapa:** la que cubre a la primaria (típicamente rabia sobre dolor). · **Meta-emoción:** emoción sobre otra emoción (vergüenza por la rabia). · **Periodo refractario:** rato post-pico donde la mente solo busca confirmar la emoción. · **Surfear el impulso:** dejar pasar la ola del impulso sin obedecerla ni pelearla. · **Acción opuesta:** hacer deliberadamente lo contrario suave de lo que empuja el impulso. · **Defusión:** despegarse del pensamiento ("estoy teniendo el pensamiento de que..."). · **Rumiación:** masticado mental en bucle que mantiene la activación. · **Distorsión cognitiva:** atajo mental sistemático que deforma la interpretación. · **Autopsia:** análisis en frío de un episodio, como investigador y no como juez.` },

      { titulo: "Anexo H · La conversación del contrato", md: `
Para tener en frío con tu pareja, amigos o familia cercana, ANTES del próximo episodio. Guion adaptable:

> "Quiero contarte algo en lo que estoy trabajando. Sé que cuando algo me duele reacciono mal: digo cosas que no pienso, me cierro o tomo decisiones en caliente, y sé que eso te ha lastimado. Estoy entrenando una forma distinta. Parte del método es que cuando me note muy activado voy a pedir una pausa —algo como 'dame un momento, vuelvo'—. Necesito que sepas que esa pausa no es ignorarte ni castigarte: es exactamente lo contrario, es para no dañarte y volver a hablarlo bien. Siempre voy a volver, y si te digo un tiempo, lo cumplo. Puede que a veces me salga tarde o imperfecto; te pido paciencia con el proceso. Y si tú me ves escalando antes de que yo lo note, puedes decirme [palabra o señal acordada] y eso me ayuda a frenar."

Esta conversación convierte tu pausa de gesto ambiguo en herramienta reconocida por los dos, y suma un detector externo (la señal acordada). Es de las jugadas de mayor impacto de toda la guía.` }

  }

  <script>
/* Ventana · vista de lectura de la guía (libros y anexos) */
(function () {
  const G = (window.Guia = window.Guia || {});
  const { h, montar } = G.dom;

  function renderLibro(id) {
    return function (vista) {
      const libro = G.libros.find((l) => l.id === id);
      if (!libro) { montar(vista, h("p", null, "No encontré ese libro.")); return; }

      const secciones = libro.secciones.map((s) =>
        h("section", { class: "prosa" },
          h("h3", null, s.titulo),
          h("div", { html: G.md.render(s.md.trim()) })
        )
      );

      montar(vista,
        h("p", { class: "eyebrow" }, typeof libro.num === "number" ? "Libro " + libro.num : "Referencia"),
        h("h1", { class: "titulo" }, libro.titulo),
        h("p", { class: "subtitulo" }, libro.resumen),
        ...secciones,
        navegacionPie(libro)
      );
    };
  }

  function navegacionPie(libro) {
    const i = G.libros.indexOf(libro);
    const prev = G.libros[i - 1];
    const sig = G.libros[i + 1];
    return h("div", { class: "fila separado", style: "margin-top:32px" },
      prev ? h("a", { class: "btn btn-fantasma", href: "#/libro/" + prev.id }, "← " + prev.titulo) : h("span"),
      sig ? h("a", { class: "btn", href: "#/libro/" + sig.id }, sig.titulo + " →") : h("span")
    );
  }

  G.vistas = G.vistas || {};
  G.vistas.renderLibro = renderLibro;
})();

</script>

  <script>
/* Ventana · modo SOS
   Flujo guiado de emergencia en pantalla completa, para usar EN el pico.
   Diseño para alguien activado: pasos únicos, letra grande, cero decisiones. */
(function () {
  const G = (window.Guia = window.Guia || {});
  const { h, montar } = G.dom;

  const ANCLAS = [
    "Esto es el pico. Pasa solo.",
    "Sentirlo sí, actuarlo no.",
    "En 30 minutos esto se ve distinto.",
    "No decido nada en caliente.",
    "¿Me acerca o me aleja?"
  ];

  let overlay = null;
  let temporizadores = [];

  function limpiar() {
    temporizadores.forEach((t) => { clearTimeout(t); clearInterval(t); });
    temporizadores = [];
  }

  function cerrar() {
    limpiar();
    if (overlay) { overlay.remove(); overlay = null; }
    document.body.style.overflow = "";
  }

  function marco(pasoNum, ...contenido) {
    const btnCerrar = h("button", { class: "btn btn-fantasma", onclick: cerrar, "aria-label": "Salir del modo SOS" }, "✕ Salir");
    return h("div", { class: "sos-overlay", role: "dialog", "aria-modal": "true", "aria-label": "Modo SOS" },
      h("div", { class: "sos-cabecera" }, btnCerrar),
      h("div", { class: "sos-cuerpo" },
        h("p", { class: "sos-pasos" }, "Paso " + pasoNum + " de 4"),
        ...contenido
      )
    );
  }

  function pinta(nodo) {
    montar(overlay);
    overlay.append(nodo);
  }

  /* ---- Paso 1: llegada ---- */
  function paso1() {
    limpiar();
    pinta(marco(1,
      h("h2", null, "Estás aquí. Eso ya es ganar."),
      h("p", { class: "grande" }, "Abriste esto en vez de actuar el impulso. Ahora, tres cosas:"),
      h("p", { class: "grande" }, "No escribas nada. No decidas nada. No respondas nada."),
      h("p", { class: "suave" }, "Si necesitas irte de donde estás, tu frase: ", h("em", null, "\u201cEsto me importa, dame un momento. Vuelvo.\u201d")),
      h("div", { class: "fila-botones" },
        h("button", { class: "btn btn-primario", onclick: paso2 }, "Listo, sigamos")
      )
    ));
  }

  /* ---- Paso 2: descarga a elegir (protocolo TIPP) ---- */
  function paso2() {
    limpiar();
    const zona = h("div");
    function elegir(id) {
      G.dom.montar(zona,
        G.descarga.crearDescarga(id),
        h("div", { class: "fila-botones", style: "justify-content:center;margin-top:8px" },
          h("button", { class: "btn btn-fantasma btn-mini", onclick: () => pintarSelector() }, "← otra palanca")));
    }
    function pintarSelector() { G.dom.montar(zona, G.descarga.crearSelector(elegir)); }
    pintarSelector();
    pinta(marco(2,
      h("h2", null, "Primero el cuerpo"),
      h("p", { class: "suave" }, "La activación es química: se baja por el cuerpo, no por la lógica. Elige tu palanca — el frío es la más rápida."),
      zona,
      h("div", { class: "fila-botones" },
        h("button", { class: "btn", onclick: paso3 }, "Siguiente →")
      )
    ));
  }

  /* ---- Paso 3: dejar pasar el pico ---- */
  function paso3() {
    limpiar();
    const reloj = h("div", { class: "temporizador", "aria-live": "off" }, "20:00");
    const ancla = h("p", { class: "ancla-rotativa" }, ANCLAS[0]);
    let restante = 20 * 60;
    let corriendo = false;

    const btnReloj = h("button", {
      class: "btn btn-primario",
      onclick: () => {
        if (corriendo) return;
        corriendo = true;
        btnReloj.textContent = "Corriendo…";
        btnReloj.disabled = true;
        const intv = setInterval(() => {
          restante--;
          const m = String(Math.floor(restante / 60)).padStart(2, "0");
          const s = String(restante % 60).padStart(2, "0");
          reloj.textContent = m + ":" + s;
          if (restante <= 0) {
            clearInterval(intv);
            reloj.textContent = "✓";
            ancla.textContent = "El pico ya debería haber bajado. Escúchate.";
          }
        }, 1000);
        temporizadores.push(intv);
      }
    }, "Iniciar 20 minutos");

    let iAncla = 0;
    const rota = setInterval(() => {
      iAncla = (iAncla + 1) % ANCLAS.length;
      ancla.textContent = ANCLAS[iAncla];
    }, 9000);
    temporizadores.push(rota);

    pinta(marco(3,
      h("h2", null, "El pico pasa solo"),
      h("p", { class: "grande" }, "La activación tarda 20–30 minutos en bajar si no le echas leña. Tu único trabajo es dejarla pasar."),
      reloj,
      h("p", { class: "suave" }, "Mientras tanto: camina rápido · agua fría en cara y muñecas · o escribe TODO en una nota que nadie leerá (jamás en el chat)."),
      h("p", { class: "suave" }, "Si aparece el bucle (\u201ccómo se atreve…\u201d), es leña: vuelve al cuerpo."),
      ancla,
      h("div", { class: "fila-botones" },
        btnReloj,
        h("button", { class: "btn", onclick: () => { cerrar(); G.prefill = { ola: { nivel: 8 } }; G.router.navegar("#/ola"); } }, "🌊 Surfear la ola (ver tu curva)"),
        h("button", { class: "btn", onclick: () => { cerrar(); G.router.navegar("#/vaciadero"); } }, "🔥 Vaciadero"),
        h("button", { class: "btn", onclick: () => { cerrar(); G.router.navegar("#/anclaje"); } }, "🖐 Anclaje 5-4-3-2-1"),
        h("button", { class: "btn", onclick: paso4 }, "Ya estoy más abajo →")
      )
    ));
  }

  /* ---- Paso 4: antes de actuar ---- */
  function paso4() {
    limpiar();
    G.storage.guardar("sos_completados", (G.storage.leer("sos_completados", 0) || 0) + 1);
    pinta(marco(4,
      h("h2", null, "Antes de decir o hacer nada"),
      h("p", { class: "ancla-rotativa" }, "¿Esto me acerca o me aleja de lo que quiero?"),
      h("p", { class: "suave" }, "Si la respuesta es \u201cme aleja pero me aliviaría\u201d, es el impulso hablando. Espera otro rato."),
      h("p", { class: "grande" }, "Cuando vuelvas a la conversación: agradece la espera y usa la fórmula — ", h("em", null, "cuando pasó X, me sentí Y, te pido Z.")),
      h("p", { class: "suave" }, "Y recuerda: dijiste que volvías. Cumplirlo es lo que separa la pausa del abandono."),
      h("div", { class: "fila-botones" },
        h("button", {
          class: "btn btn-primario",
          onclick: () => { cerrar(); G.router.navegar("#/checkin"); }
        }, "Registrar este momento (check-in)"),
        h("button", { class: "btn", onclick: cerrar }, "Cerrar")
      ),
      h("p", { class: "tenue" }, "En unas horas, ya en frío: hazle la autopsia a este episodio. Ahí está el oro."),
      h("p", { class: "tenue" }, "Y si viene la vergüenza a cobrar: herramienta Autocompasión — machacarte es gasolina, no disciplina.")
    ));
  }

  function abrir() {
    if (overlay) cerrar();
    overlay = h("div");
    document.getElementById("zonaOverlay").append(overlay);
    document.body.style.overflow = "hidden";
    paso1();
    // Nota: paso1 reemplaza el contenido de overlay; el contenedor externo queda fijo.
  }

  G.emergencia = { abrir, cerrar };
})();

</script>

/* Ventana · respiración guiada
   Motor reutilizable (también lo usa el modo SOS). Tres técnicas.
   Respeta prefers-reduced-motion: sin animación de escala, solo texto y conteo. */
(function () {
  const G = (window.Guia = window.Guia || {});
  const { h, montar } = G.dom;

  const TECNICAS = {
    suspiro: {
      nombre: "Suspiro fisiológico",
      descripcion: "La manera más rápida conocida de bajar la activación: doble inhalación por la nariz + exhalación LARGA por la boca (el ingrediente activo es la exhalación). Evidencia: alta (ensayo controlado de Stanford, 2023).",
      ciclos: 8,

      ]
    },

      nombre: "Exhalación alargada (4–8)",
      descripcion: "Inhala en 4, exhala en 8. La exhalación al doble de la inhalación frena el sistema de alarma (es la P de \u201cpaced breathing\u201d del TIPP). Evidencia: alta como mecanismo.",
      ciclos: 10,
      fases: [
        { txt: "Inhala por la nariz", dur: 4000, expandir: true },
        { txt: "Exhala lento", dur: 8000, expandir: false }
      ]
    },
    t478: {
      nombre: "4-7-8",
      descripcion: "Inhala 4, retén 7, exhala 8 con sonido suave. Para bajar revoluciones o dormir. Si retener 7 agobia, acorta la escala manteniendo la exhalación más larga que la inhalación. Evidencia: media.",
      ciclos: 4,
      fases: [
        { txt: "Inhala por la nariz", dur: 4000, expandir: true },
        { txt: "Retén (suave, sin apretar)", dur: 7000, expandir: true },
        { txt: "Exhala por la boca, lento", dur: 8000, expandir: false }
      ]
    },
    zumbido: {
      nombre: "Zumbido vagal (abeja / Voo)",
      descripcion: "Exhala emitiendo un mmm o vooo GRAVE y sostenido: la vibración + la exhalación larga estimulan el nervio vago. Cuanto más grave, más vibra en el pecho. Evidencia: media (mecanismo compartido con humming/Om).",
      ciclos: 6,
      fases: [
        { txt: "Inhala hondo por la nariz", dur: 3500, expandir: true },
        { txt: "Exhala con zumbido grave (mmm / voo)", dur: 7500, expandir: false }
      ]
    },
    cuadrada: {
      nombre: "Respiración cuadrada (4-4-4-4)",
      descripcion: "Para antes de una conversación difícil: calma manteniéndote alerta. Si las retenciones tensan, acórtalas. Evidencia: media (uso táctico documentado).",
      ciclos: 6,
      fases: [
        { txt: "Inhala", dur: 4000, expandir: true },
        { txt: "Sostén", dur: 4000, expandir: true },
        { txt: "Exhala", dur: 4000, expandir: false },
        { txt: "Sostén", dur: 4000, expandir: false }
      ]
    }
  };

  const movReducido = () =>
    window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  /** Crea un escenario de respiración autónomo.
      opciones: { tecnica, autoIniciar, alTerminar } → { el, iniciar, detener } */
  function crearEscenario(opciones = {}) {
    const tecnica = TECNICAS[opciones.tecnica] || TECNICAS.suspiro;
    let cancelado = true;
    let temporizadores = [];

    const circulo = h("div", { class: "circulo-respiracion", "aria-hidden": "true" });
    const fase = h("p", { class: "fase-respiracion" }, "Listo cuando tú lo estés");
    const contador = h("p", { class: "contador-respiracion" }, tecnica.ciclos + " ciclos · ~" + duracionTotal(tecnica) + " min");
    const btnIniciar = h("button", { class: "btn btn-primario", onclick: iniciar }, "Empezar");
    const btnDetener = h("button", { class: "btn btn-fantasma oculto", onclick: detener }, "Detener");

    const el = h("div", { class: "escenario-respiracion" },
      h("div", { class: "circulo-envoltura" }, circulo),
      fase, contador,
      h("div", { class: "fila-botones" }, btnIniciar, btnDetener)
    );

    function duracionTotal(t) {
      const ms = t.ciclos * t.fases.reduce((a, f) => a + f.dur, 0);
      return Math.max(1, Math.round(ms / 60000));
    }

    function limpiarTemporizadores() {
      temporizadores.forEach(clearTimeout);
      temporizadores = [];
    }

    function paso(iCiclo, iFase) {
      if (cancelado) return;
      const f = tecnica.fases[iFase];
      contador.textContent = "Ciclo " + (iCiclo + 1) + " de " + tecnica.ciclos;

      // Texto con cuenta regresiva por segundos (útil para todos, esencial sin animación)
      let restante = Math.round(f.dur / 1000);
      const pinta = () => { fase.textContent = f.txt + (restante > 1 ? " · " + restante : ""); };
      pinta();
      const intervalo = setInterval(() => {
        restante--;
        if (restante <= 0) clearInterval(intervalo);
        else pinta();
      }, 1000);
      temporizadores.push(intervalo);

      if (!movReducido()) {
        circulo.classList.add("animando");
        circulo.style.setProperty("--dur", f.dur + "ms");
        circulo.classList.toggle("expandido", !!f.expandir);
      }

      temporizadores.push(setTimeout(() => {
        clearInterval(intervalo);
        const sigFase = iFase + 1;
        if (sigFase < tecnica.fases.length) paso(iCiclo, sigFase);
        else if (iCiclo + 1 < tecnica.ciclos) paso(iCiclo + 1, 0);
        else terminar();
      }, f.dur));
    }

    function iniciar() {
      cancelado = false;
      btnIniciar.classList.add("oculto");
      btnDetener.classList.remove("oculto");
      paso(0, 0);
    }

    function detener() {
      cancelado = true;
      limpiarTemporizadores();
      circulo.classList.remove("expandido", "animando");
      fase.textContent = "Pausado. Cuando quieras, otra vez.";
      contador.textContent = "";
      btnDetener.classList.add("oculto");
      btnIniciar.classList.remove("oculto");
      btnIniciar.textContent = "Empezar de nuevo";
    }

    function terminar() {
      cancelado = true;
      limpiarTemporizadores();
      G.storage.guardar("resp_sesiones", (G.storage.leer("resp_sesiones", 0) || 0) + 1);
      circulo.classList.remove("expandido");
      fase.textContent = "Bien hecho. Nota cómo está el cuerpo ahora.";
      contador.textContent = "";
      btnDetener.classList.add("oculto");
      btnIniciar.classList.remove("oculto");
      btnIniciar.textContent = "Otra ronda";
      if (typeof opciones.alTerminar === "function") opciones.alTerminar();
    }

    if (opciones.autoIniciar) setTimeout(iniciar, 400);

    return { el, iniciar, detener };
  }

  /* -------- Vista de la herramienta -------- */
  let tecnicaActiva = "suspiro";

  function vista(vista) {
    let escenario = crearEscenario({ tecnica: tecnicaActiva });

    const zonaEscenario = h("div", null, escenario.el);
    const descripcion = h("p", { class: "suave" }, TECNICAS[tecnicaActiva].descripcion);

    const chips = h("div", { class: "grupo-chips", role: "group", "aria-label": "Técnica de respiración" },
      Object.entries(TECNICAS).map(([id, t]) =>
        h("button", {
          class: "chip", "aria-pressed": String(id === tecnicaActiva),
          onclick: (ev) => {
            tecnicaActiva = id;
            chips.querySelectorAll(".chip").forEach((c) => c.setAttribute("aria-pressed", "false"));
            ev.currentTarget.setAttribute("aria-pressed", "true");
            escenario.detener();
            escenario = crearEscenario({ tecnica: id });
            montar(zonaEscenario, escenario.el);
            descripcion.textContent = t.descripcion;
          }
        }, t.nombre)
      )
    );

    montar(vista,
      h("p", { class: "eyebrow" }, "Herramienta"),
      h("h1", { class: "titulo" }, "Respiración guiada"),
      h("p", { class: "subtitulo" }, "La palanca más rápida sobre el cuerpo. Elige la técnica y sigue el círculo."),
      chips, descripcion, zonaEscenario,
      h("p", { class: "tenue" }, "Si tu sistema tiene 'reducir movimiento' activado, la guía es por texto y conteo, sin animación.")
    );

(function () {
  const G = (window.Guia = window.Guia || {});
  const { h, montar } = G.dom;

  function vista(vista) {
    const marcadas = G.storage.leer("prog_tareas", {});

    function alternar(id, valor) {
      marcadas[id] = valor;
      G.storage.guardar("prog_tareas", marcadas);
      pintarProgreso();
    }

    const barra = h("div", null);
    const textoProg = h("p", { class: "suave" });

    function pintarProgreso() {
      let total = 0, hechas = 0, faseActual = null;
      for (const fase of G.programa) {
        for (const t of fase.tareas) { total++; if (marcadas[t.id]) hechas++; }
        if (!faseActual && fase.tareas.some((t) => !marcadas[t.id])) faseActual = fase;
      }
      const pct = total ? Math.round((hechas / total) * 100) : 0;
      barra.innerHTML = "";
      barra.append(h("div", { class: "barra-progreso" }, h("div", { style: "width:" + pct + "%" })));
      textoProg.textContent = hechas + " de " + total + " tareas · " + pct + "%" +
        (faseActual ? " · Fase actual: " + faseActual.titulo + " (" + faseActual.semanas + ")" : " · Programa completado 🎉");
    }

    const fases = G.programa.map((fase, i) =>
      h("div", { class: "tarjeta" },
        h("p", { class: "eyebrow" }, "Fase " + (i + 1) + " · " + fase.semanas),

          return h("div", { class: "fila", style: "margin-bottom:8px;align-items:flex-start" },

        })),

        h("p", { class: "tenue mb0" }, h("strong", null, "Error típico: "), fase.error)
      )
    );

    pintarProgreso();
    montar(vista,
      h("p", { class: "eyebrow" }, "Herramienta · un foco por quincena"),

(function () {
  const G = (window.Guia = window.Guia || {});
  const { h, montar, claveDia } = G.dom;
  const DIA = 24 * 60 * 60 * 1000;

  function estado() { return G.storage.leer("repaso", {}); }
  function stats() { return G.storage.leer("repaso_stats", { revisadas: 0 }); }

  function pendientes() {
    const st = estado();
    const ahora = Date.now();
    return G.tarjetas.filter((t) => {
      const e = st[t.id];
      return !e || e.proxima <= ahora;
    });
  }

  function calificar(id, grado) {
    const st = estado();
    const e = st[id] || { intervalo: 0 };
    if (grado === "otra") e.intervalo = 0;
    else if (grado === "bien") e.intervalo = Math.max(1, Math.round((e.intervalo || 0.5) * 2));
    else e.intervalo = Math.max(2, Math.round((e.intervalo || 1) * 3));
    e.proxima = Date.now() + Math.max(0.5, e.intervalo) * DIA * (grado === "otra" ? 0.007 : 1); // "otra vez" vuelve en ~10 min
    st[id] = e;
    G.storage.guardar("repaso", st);
    const s = stats();
    s.revisadas++;
    s.ultimoDia = claveDia();
    G.storage.guardar("repaso_stats", s);
  }

  function vista(vista) {
    let cola = [];

    function inicio() {
      cola = pendientes();
      const s = stats();

          h("div", { class: "fila-botones" },
            cola.length ? h("button", { class: "btn btn-primario", onclick: () => tarjeta(0) }, "Repasar (" + Math.min(cola.length, 12) + ")") : null,
            h("button", { class: "btn", onclick: () => { cola = [...G.tarjetas].sort(() => Math.random() - 0.5); tarjeta(0); } }, "Modo libre"))

  function graficaDeteccion(serie) {
    const W = 640, H = 150, m = 24, ancho = (W - 2 * m) / serie.length - 10;
    const el = svg("svg", { viewBox: "0 0 " + W + " " + H, class: "grafica", role: "img", "aria-label": "Porcentaje de amarillos detectados a tiempo por semana" });
    serie.forEach((s, i) => {
      const x = m + i * ((W - 2 * m) / serie.length) + 5;
      if (s.pct == null) {
        el.append(svg("rect", { x, y: H - m - 4, width: ancho, height: 4, rx: 2, fill: "var(--linea)" }));
      } else {
        const alto = Math.max(4, (s.pct / 100) * (H - 2 * m));
        el.append(svg("rect", { x, y: H - m - alto, width: ancho, height: alto, rx: 4, fill: s.pct >= 60 ? "var(--calma)" : "var(--ambar)" }));
        const t = svg("text", { x: x + ancho / 2, y: H - m - alto - 6, fill: "var(--tinta-suave)", "font-size": 11, "text-anchor": "middle" });
        t.textContent = s.pct + "%"; el.append(t);
      }
    });
    const eje = svg("text", { x: m, y: H - 6, fill: "var(--tinta-tenue)", "font-size": 11 });
    eje.textContent = "últimas 8 semanas →"; el.append(eje);
    return el;
  }

  /** Resumen de las cuatro curvas + datos duros. */
  function resumen() {
    const checkins = G.storage.leer("checkins", []);
    const autopsias = G.storage.leer("autopsias", []);
    const dojo = G.storage.leer("dojo", []);
    const conAmarillo = checkins.filter((c) => c.detecte !== "na");
    const detectados = conAmarillo.filter((c) => c.detecte === "si").length;
    const episodios = checkins.filter((c) => c.episodio).length;
    const emociones = {};
    for (const c of checkins) if (c.emocion) {
      const clave = c.emocion.toLowerCase().trim();
      emociones[clave] = (emociones[clave] || 0) + 1;
    }
    const top = Object.entries(emociones).sort((a, b) => b[1] - a[1]).slice(0, 5);
    return { checkins, autopsias, dojo, conAmarillo, detectados, episodios, top };
  }

  function informeTexto() {
    const r = resumen();
    const autoev = G.storage.leer("autoevaluaciones", []);
    const L = [];
    L.push("INFORME DE ENTRENAMIENTO EMOCIONAL · Ventana");
    L.push("Generado: " + new Date().toLocaleDateString("es"));
    L.push("");
    L.push("— Registro —");
    L.push("Check-ins totales: " + r.checkins.length);
    L.push("Amarillos/rojos registrados: " + r.conAmarillo.length + " · detectados a tiempo: " + r.detectados);
    L.push("Episodios marcados: " + r.episodios + " · autopsias procesadas: " + r.autopsias.length);
    if (r.top.length) L.push("Emociones más nombradas: " + r.top.map(([e, n]) => e + " (" + n + ")").join(", "));
    if (autoev.length) {
      L.push("Autoevaluación: base " + autoev[0].total + "/40 → última " + autoev[autoev.length - 1].total + "/40");
    }
    L.push("");
    L.push("— Últimas autopsias (resumen) —");
    for (const a of r.autopsias.slice(-5)) {
      L.push("· " + new Date(a.ts).toLocaleDateString("es") + " (nivel " + a.nivel + "/10): " + (a.respuestas.antes || "").slice(0, 90));
      if (a.respuestas.debajo) L.push("  Debajo: " + a.respuestas.debajo.slice(0, 90));
      if (a.respuestas.proxima) L.push("  Plan: " + a.respuestas.proxima.slice(0, 90));
    }
    L.push("");
    L.push("Nota: datos auto-registrados por el paciente con una app local de entrenamiento");
    L.push("en regulación emocional (protocolo: detección/semáforo, pausa, descarga,");
    L.push("reestructuración, autopsias de episodio, comunicación y reparación).");
    return L.join("\n");
  }

  function descargarInforme() {
    const blob = new Blob([informeTexto()], { type: "text/markdown" });
    const url = URL.createObjectURL(blob);
    const a = h("a", { href: url, download: "ventana-informe-" + claveDia() + ".md" });
    document.body.append(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    toast("Informe descargado");
  }

  function vista(vista) {
    const r = resumen();
    const niveles = serieNiveles();
    const hayDatos = r.checkins.length > 0;

    montar(vista,
      h("p", { class: "eyebrow" }, "Herramienta · tus cuatro curvas"),
      h("h1", { class: "titulo" }, "Estadísticas"),
      h("p", { class: "subtitulo" }, "El progreso real no es cero episodios: es detectar antes, recuperarte más rápido, dañar menos y reparar mejor. Aquí se ve."),
      !hayDatos
        ? h("div", { class: "vacio" }, "Todavía no hay datos que graficar. Con una semana de check-ins, esto cobra vida.")
        : h("div", null,
            h("div", { class: "tarjeta" },
              h("h3", { class: "mt0", style: "font-family:var(--f-titulo)" }, "Tu número, últimos 30 días"),
              h("p", { class: "tenue" }, "La banda verde es tu ventana (≤6). La meta no es una línea plana: es que las subidas duren menos."),
              graficaNiveles(niveles)),
            h("div", { class: "tarjeta" },
              h("h3", { class: "mt0", style: "font-family:var(--f-titulo)" }, "Detección a tiempo (curva 1)"),
              h("p", { class: "tenue" }, "De los amarillos/rojos que registraste, cuántos viste venir. Esta curva subiendo = el termómetro calibrado."),
              graficaDeteccion(serieDeteccion())),
            h("div", { class: "tarjeta" },
              h("h3", { class: "mt0", style: "font-family:var(--f-titulo)" }, "Datos duros"),
              h("p", { class: "suave mb0" },
                r.checkins.length + " check-ins · " + r.episodios + " episodios marcados · " + r.autopsias.length +
                " autopsias · " + r.dojo.length + " respuestas de dojo (" +
                (r.dojo.length ? Math.round((r.dojo.filter((d) => d.tipo === "regulada").length / r.dojo.length) * 100) : 0) + "% reguladas)" +
                (r.top.length ? " · emociones top: " + r.top.map(([e]) => e).join(", ") : "")))
          ),
      (() => {
        const c = G.simulador.competencias();
        const rec = G.simulador.recomendacion();
        if (!c.total) return h("div", { class: "tarjeta" },
          h("h3", { class: "mt0", style: "font-family:var(--f-titulo)" }, "Competencias (simulador)"),
          h("p", { class: "suave mb0" }, "Aún sin datos: unas cuantas simulaciones en el Dojo y este panel te dirá tus fortalezas y tus puntos flojos, con nombre y apellido."));
        return h("div", { class: "tarjeta" },
          h("h3", { class: "mt0", style: "font-family:var(--f-titulo)" }, "Competencias (simulador)"),
          c.fortalezas.length ? h("div", null, h("p", { class: "eyebrow" }, "Fortalezas"),
            h("div", { class: "prosa", html: G.md.render(c.fortalezas.map((f) => "- ✔ " + f).join("\n")) })) : null,
          c.entrenar.length ? h("div", null, h("p", { class: "eyebrow", style: "color:var(--ambar)" }, "Por entrenar"),
            h("div", { class: "prosa", html: G.md.render(c.entrenar.map((f) => "- • " + f).join("\n")) })) : null,
          !c.fortalezas.length && !c.entrenar.length ? h("p", { class: "suave" }, "Con " + c.total + " decisiones aún no hay patrón claro; unas simulaciones más y aparece.") : null,
          h("p", { class: "tenue" }, "Recomendación: " + rec.escena.titulo + " — " + rec.motivo),
          h("div", { class: "fila-botones" },
            h("button", { class: "btn btn-mini btn-primario", onclick: () => { G.simPrefs = { modo: "entrenar", escenaId: rec.escena.id }; G.router.navegar("#/simulador"); } }, "Entrenar ahora")));
      })(),
      h("div", { class: "tarjeta" },
        h("h3", { class: "mt0", style: "font-family:var(--f-titulo)" }, "Informe para terapeuta"),
        h("p", { class: "suave" }, "Resumen de tus patrones y últimas autopsias, listo para llevar a consulta. Movimiento de experto: entrenar con datos y con entrenador."),
        h("div", { class: "fila-botones" },
          h("button", { class: "btn btn-primario", onclick: descargarInforme }, "Descargar informe (.md)"),
          h("button", { class: "btn", onclick: async () => toast(await copiar(informeTexto()) ? "Informe copiado" : "No pude copiar aquí") }, "Copiar texto"))
      )
    );
  }

  G.vistas = G.vistas || {};
  G.vistas.estadisticas = vista;
})();

</script>
  <script>
/* Ventana · sistema de maestría
   Principio de diseño: los niveles NO se leen, se ganan. Cada punto sale de
   práctica registrada en la app. Un experto es alguien con repeticiones, no
   con capítulos leídos. */
(function () {
  const G = (window.Guia = window.Guia || {});
  const { h, montar } = G.dom;

  const DISCIPLINAS = [
    { id: "deteccion",  nombre: "Detección",  desc: "Ver el amarillo a tiempo: check-ins, calibración del termómetro." },
    { id: "cuerpo",     nombre: "Cuerpo",     desc: "Bajar la activación: respiraciones completadas, SOS terminados." },
    { id: "mente",      nombre: "Mente",      desc: "Desarmar interpretaciones: repasos del mazo, aciertos del Dojo." },
    { id: "palabra",    nombre: "Palabra",    desc: "Salir y expresar bien: escenarios de palabra, frases propias, retos." },
    { id: "reparacion", nombre: "Reparación", desc: "Procesar y reparar: autopsias hechas, escenarios de reparación." },
    { id: "terreno",    nombre: "Terreno",    desc: "Cuidar la base: terreno anotado, retos de sueño/alcohol/ejercicio." }
  ];

  const NIVELES = [
    { min: 0,   nombre: "Aprendiz" },
    { min: 12,  nombre: "Practicante" },
    { min: 35,  nombre: "Avanzado" },
    { min: 80,  nombre: "Experto" },
    { min: 160, nombre: "Maestro" }
  ];

  const RANGOS = [
    { min: 0,   nombre: "Observador" },
    { min: 25,  nombre: "Aprendiz" },
    { min: 70,  nombre: "Practicante" },
    { min: 160, nombre: "Domador" },
    { min: 320, nombre: "Experto" },
    { min: 560, nombre: "Maestro de la Ventana" }
  ];

  /** Calcula puntos por disciplina a partir de lo registrado. */
  function calcular() {
    const st = G.storage;
    const checkins = st.leer("checkins", []);
    const autopsias = st.leer("autopsias", []);
    const dojo = st.leer("dojo", []);
    const repaso = st.leer("repaso_stats", { revisadas: 0 });
    const retosHechos = st.leer("retos_hechos", {});
    const cuaderno = st.leer("cuaderno", {});
    const respSes = st.leer("resp_sesiones", 0);
    const sosOk = st.leer("sos_completados", 0);

    const p = { deteccion: 0, cuerpo: 0, mente: 0, palabra: 0, reparacion: 0, terreno: 0 };

    // Detección: cada check-in 1; amarillo detectado a tiempo +2; nombre preciso +1
    for (const c of checkins) {
      p.deteccion += 1;
      if (c.detecte === "si") p.deteccion += 2;
      if (c.emocion) p.deteccion += 1;
      if (c.terreno) p.terreno += 1;
    }

    // Cuerpo
    p.cuerpo += respSes * 2 + sosOk * 3;
    p.cuerpo += (st.leer("descargas", 0) || 0) * 1;
    p.cuerpo += st.leer("olas", []).length * 2;

    // Nuevas herramientas cognitivas y de palabra
    p.deteccion += st.leer("stops", []).length * 2;
    p.deteccion += (st.leer("anclajes", 0) || 0) * 1;
    p.reparacion += (st.leer("compasiones", 0) || 0) * 2;
    p.palabra += (st.leer("borradores_salvados", 0) || 0) * 3;
    p.palabra += st.leer("conversaciones", []).filter((c) => c.estado === "hecha").length * 3;

    // Simulador: cada turno regulado/parcial suma a la disciplina de su escena
    for (const t of st.leer("sim_turnos", [])) {
      const esc = (G.simEscenas || []).find((e) => e.id === t.escena);
      const disc = esc ? esc.disciplina : "mente";
      const pts = t.tipo === "regulada" ? 2 : t.tipo === "parcial" ? 1 : 0;
      if (p[disc] != null) p[disc] += pts;
    }

    // Mente: repasos + aciertos dojo (regulada 2, parcial 1) van a su disciplina
    p.mente += Math.floor(repaso.revisadas / 2);
    for (const d of dojo) {
      const pts = d.tipo === "regulada" ? 2 : d.tipo === "parcial" ? 1 : 0;
      if (p[d.disciplina] != null) p[d.disciplina] += pts;
      else p.mente += pts;
    }

    // Reparación: autopsias 3; con si-entonces escrito +2
    for (const a of autopsias) {
      p.reparacion += 3;
      if (a.respuestas && a.respuestas.proxima) p.reparacion += 2;
    }

    // Palabra: campos clave del cuaderno llenos (una vez)
    if ((cuaderno.frases || "").trim()) p.palabra += 4;
    if ((cuaderno.sientonces || "").trim()) p.mente += 4;
    if ((cuaderno.norte || "").trim()) p.deteccion += 2;

    // Retos: 2 puntos a su disciplina
    for (const dia of Object.keys(retosHechos)) {
      const reto = G.retos.find((r) => r.id === retosHechos[dia]);
      if (reto && p[reto.disciplina] != null) p[reto.disciplina] += 2;
    }

    return p;
  }

  function nivelDe(puntos) {
    let actual = NIVELES[0], siguiente = null;
    for (let i = 0; i < NIVELES.length; i++) {
      if (puntos >= NIVELES[i].min) { actual = NIVELES[i]; siguiente = NIVELES[i + 1] || null; }
    }
    return { actual, siguiente };
  }

  function rangoGlobal(p) {
    const total = Object.values(p).reduce((a, b) => a + b, 0);
    let r = RANGOS[0];
    for (const cand of RANGOS) if (total >= cand.min) r = cand;
    const sig = RANGOS[RANGOS.indexOf(r) + 1] || null;
    return { total, rango: r, siguiente: sig };
  }

  /** Reto del día: determinista por fecha, sesgado hacia tu disciplina más floja. */
  function retoDelDia() {
    const dia = G.dom.claveDia();
    const hechos = G.storage.leer("retos_hechos", {});
    const p = calcular();
    const floja = DISCIPLINAS.reduce((a, b) => (p[a.id] <= p[b.id] ? a : b)).id;
    const candidatos = G.retos.filter((r) => r.disciplina === floja);
    const banco = candidatos.length ? candidatos : G.retos;
    let semilla = 0;
    for (const ch of dia) semilla = (semilla * 31 + ch.charCodeAt(0)) % 100000;
    const reto = banco[semilla % banco.length];
    return { reto, hecho: hechos[dia] === reto.id, dia };
  }

  function marcarReto() {
    const { reto, dia } = retoDelDia();
    const hechos = G.storage.leer("retos_hechos", {});
    hechos[dia] = reto.id;
    G.storage.guardar("retos_hechos", hechos);
  }

  /* -------- Vista -------- */
  function vista(vista) {
    const p = calcular();
    const g = rangoGlobal(p);
    const rd = retoDelDia();

    const filas = DISCIPLINAS.map((d) => {
      const { actual, siguiente } = nivelDe(p[d.id]);
      const pct = siguiente ? Math.min(100, Math.round(((p[d.id] - actual.min) / (siguiente.min - actual.min)) * 100)) : 100;
      return h("div", { class: "tarjeta" },
        h("div", { class: "fila separado" },
          h("div", null, h("strong", null, d.nombre), h("span", { class: "tenue" }, "  ·  " + actual.nombre)),
          h("span", { class: "badge badge-verde" }, p[d.id] + " pts")
        ),
        h("p", { class: "tenue", style: "margin:6px 0 10px" }, d.desc),
        h("div", { class: "barra-progreso" }, h("div", { style: "width:" + pct + "%" })),
        h("p", { class: "tenue mb0", style: "margin-top:6px" },
          siguiente ? "Siguiente nivel (" + siguiente.nombre + ") a los " + siguiente.min + " pts" : "Nivel máximo alcanzado")
      );
    });

    const btnReto = h("button", {
      class: "btn " + (rd.hecho ? "" : "btn-primario"),
      onclick: () => { if (!rd.hecho) { marcarReto(); G.dom.toast("Reto cumplido: +2 en su disciplina"); vista.__render(); } }
    }, rd.hecho ? "Cumplido hoy ✓" : "Marcar como hecho");

    vista.__render = () => vistaRender(vista);
    montar(vista,
      h("p", { class: "eyebrow" }, "Herramienta · práctica registrada, no lectura"),
      h("h1", { class: "titulo" }, "Maestría"),
      h("p", { class: "subtitulo" }, "Aquí no hay atajos: cada punto sale de algo que hiciste y registraste. Así se fabrica un experto."),
      h("div", { class: "tarjeta", style: "border-color:var(--calma)" },
        h("p", { class: "eyebrow" }, "Tu rango"),
        h("h3", { class: "mt0", style: "font-family:var(--f-titulo);font-size:1.6rem" }, g.rango.nombre),
        h("p", { class: "suave mb0" }, g.total + " puntos totales" + (g.siguiente ? " · siguiente rango (" + g.siguiente.nombre + ") a los " + g.siguiente.min : " · rango máximo"))
      ),
      h("div", { class: "tarjeta", style: "border-color:var(--ambar)" },
        h("p", { class: "eyebrow" }, "Reto del día · disciplina " + (G.retos.find(r => r.id === rd.reto.id)?.disciplina || "")),
        h("p", { style: "font-size:1.05rem" }, rd.reto.t),
        h("div", { class: "fila-botones" }, btnReto)
      ),
      ...filas,
      h("p", { class: "tenue" }, "Cómo puntúa cada disciplina está explicado en el Libro 10.4.")
    );
  }

  function vistaRender(v) { vista(v); }

  G.maestria = { calcular, rangoGlobal, retoDelDia, marcarReto, DISCIPLINAS };
  G.vistas = G.vistas || {};
  G.vistas.maestria = vista;
})();

</script>
  <script>
/* Ventana · Vaciadero
   Dos armas contra el mensaje bomba:
   1) La nota que se quema: escribe TODO, sin filtro. No se guarda nunca, no se
      envía nunca. El botón la destruye. (Descarga verbal sin víctima.)
   2) El borrador frío: si algo sí habrá que decir, se escribe AQUÍ (no en el
      chat) y queda con candado de tiempo. Abrirlo antes cuesta fricción a
      propósito. Cada borrador que muere o se reescribe en frío suma Maestría. */
(function () {
  const G = (window.Guia = window.Guia || {});
  const { h, montar, toast, fechaCorta, copiar } = G.dom;
  const HORA = 60 * 60 * 1000;

  /* ---- Nota que se quema ---- */
  function crearQuemador(alQuemar) {
    const area = h("textarea", {
      style: "min-height:180px",
      placeholder: "Suéltalo TODO aquí. Sin filtro, sin gramática, sin piedad. Nadie va a leer esto — ni tú mañana."
    });
    const btn = h("button", { class: "btn btn-peligro", onclick: () => {
      if (!area.value.trim()) { toast("Primero suéltalo"); return; }
      area.classList.add("quemando");
      btn.disabled = true;
      setTimeout(() => {
        area.value = "";
        area.classList.remove("quemando");
        btn.disabled = false;
        toast("Quemado. Eso ya no existe.");
        if (alQuemar) alQuemar();
      }, 900);
    } }, "🔥 Quemar (no se guarda, no se envía)");
    return h("div", null, area, h("div", { class: "fila-botones" }, btn),
      h("p", { class: "tenue" }, "Nada de lo que escribas aquí toca el almacenamiento. Es descarga, no documento."));
  }

  /* ---- Borradores fríos ---- */
  function guardarBorrador(texto, horas) {
    const lista = G.storage.leer("borradores", []);
    lista.push({ id: Date.now(), ts: new Date().toISOString(), texto, abreEn: Date.now() + horas * HORA, estado: "bloqueado" });
    G.storage.guardar("borradores", lista);
  }

  function marcarSalvado() {
    G.storage.guardar("borradores_salvados", (G.storage.leer("borradores_salvados", 0) || 0) + 1);
  }

  function vista(vista) {
    const areaBorrador = h("textarea", { style: "min-height:140px",
      placeholder: "Si esto SÍ va a tener que decirse, escríbelo aquí — no en el chat. El chat tiene botón de enviar; esto tiene candado." });
    const horasSel = h("select", null,
      h("option", { value: "2" }, "Se abre en 2 horas"),
      h("option", { value: "6" }, "Se abre en 6 horas"),
      h("option", { value: "16" }, "Se abre mañana"));

    function listaBorradores() {
      const lista = G.storage.leer("borradores", []).slice().reverse();
      if (!lista.length) return h("div", { class: "vacio" }, "Sin borradores. Ojalá siga así: significa que nada urgente nació en caliente.");
      return h("div", null, lista.map((b) => {
        const abierto = Date.now() >= b.abreEn;
        const restanteMin = Math.max(0, Math.ceil((b.abreEn - Date.now()) / 60000));
        const cuerpo = h("div", { class: "entrada-cuerpo oculto" }, b.texto);
        const acciones = h("div", { class: "fila-botones oculto" },
          h("button", { class: "btn btn-mini btn-primario", onclick: async () => { await copiar(b.texto); toast("Copiado para reescribir en frío"); } }, "Copiar"),
          h("button", { class: "btn btn-mini", onclick: () => { finalizar(b.id, "reescrito"); } }, "Lo reescribí en frío ✓"),
          h("button", { class: "btn btn-mini btn-peligro", onclick: () => { finalizar(b.id, "muerto"); } }, "No hacía falta · quemar"));

        function abrir() {
          cuerpo.classList.remove("oculto");
          acciones.classList.remove("oculto");
        }

        const cabecera = h("div", { class: "entrada-cab" },
          abierto ? h("span", { class: "badge badge-verde" }, "listo para releer en frío")
                  : h("span", { class: "badge badge-ambar" }, "🔒 " + (restanteMin >= 60 ? Math.ceil(restanteMin / 60) + " h" : restanteMin + " min")),
          h("span", { class: "entrada-fecha", style: "margin-left:auto" }, fechaCorta(b.ts)));

        const fila = h("div", { class: "entrada" }, cabecera);
        if (abierto) {

   te lo pide (o cuando quieras), y VES tu propia curva bajar en vivo.
   Es la demostración empírica de la tesis central: el pico pasa solo si no le
   echas leña. Cada ola surfeada completa suma Maestría (Cuerpo). */
(function () {
  const G = (window.Guia = window.Guia || {});
  const { h, montar, toast, claseNivel } = G.dom;
  const NS = "http://www.w3.org/2000/svg";
  const INTERVALO_AVISO = 90 * 1000; // cada 90 s pide lectura

  function svg(tag, attrs) {
    const el = document.createElementNS(NS, tag);
    for (const [k, v] of Object.entries(attrs || {})) el.setAttribute(k, v);

  function vista(vista) {
    let puntos = [];          // { t: segundos desde inicio, v: 0-10 }
    let inicio = null;
    let temporizadores = [];
    const pre = (G.prefill && G.prefill.ola && G.prefill.ola.nivel) || 8;
    if (G.prefill && G.prefill.ola) G.prefill = null;

    function limpiar() { temporizadores.forEach((x) => { clearTimeout(x); clearInterval(x); }); temporizadores = []; }

    /* ---- pantalla inicial ---- */
    function pantallaInicio() {
      let nivel = pre;
      const lectura = h("div", { class: "lectura-numero " + claseNivel(nivel) }, String(nivel));
      const desl = h("input", { type: "range", class: "semaforo", min: "0", max: "10", value: String(nivel),
        "aria-label": "Intensidad del impulso ahora",
        oninput: (e) => { nivel = Number(e.target.value); lectura.textContent = String(nivel); lectura.className = "lectura-numero " + claseNivel(nivel); } });

      montar(vista,
        h("p", { class: "eyebrow" }, "Herramienta · el pico, medido"),
        h("h1", { class: "titulo" }, "Surf de la ola"),
        h("p", { class: "subtitulo" }, "El impulso es una ola: sube, hace pico y baja sola si no la obedeces ni la peleas. Aquí no vas a creerlo: vas a verlo, con tus propios números."),

          h("label", { class: "etiqueta" }, "¿Qué tan fuerte empuja el impulso ahora?"),
          h("div", { class: "fila" }, lectura, h("div", { style: "flex:1" }, desl)),
          h("p", { class: "ayuda" }, "Mientras surfeas: nada de releer el chat ni ensayar respuestas — eso es leña. Camina, respira, mira la curva."),

    }

    /* ---- surf activo ---- */
    function empezar(nivelInicial) {

      const maxT = Math.max(300, (puntos[puntos.length - 1].t || 0) + 60);
      const x = (t) => m + (t / maxT) * (W - 2 * m);
      const y = (v) => H - m - (v / 10) * (H - 2 * m);
      el.append(svg("rect", { x: m, y: y(6), width: W - 2 * m, height: y(0) - y(6), fill: "rgba(127,209,185,0.10)" }));
      [0, 5, 10].forEach((v) => {
        el.append(svg("line", { x1: m, y1: y(v), x2: W - m, y2: y(v), stroke: "var(--linea)" }));
        const t = svg("text", { x: 4, y: y(v) + 4, fill: "var(--tinta-tenue)", "font-size": 11 }); t.textContent = v; el.append(t);
      });

      puntos.forEach((p) => el.append(svg("circle", { cx: x(p.t), cy: y(p.v), r: 4, fill: p.v <= 3 ? "var(--calma)" : p.v <= 6 ? "var(--ambar)" : "var(--rojo)" })));

    function pantallaSurf(pidiendo) {
      limpiar();
      const ultimo = puntos[puntos.length - 1];
      const minutos = Math.floor((Date.now() - inicio) / 60000);

      const botonera = h("div", { class: "grupo-chips" });
      for (let v = 0; v <= 10; v++) {

            h("button", { class: "btn", onclick: () => terminar(false) }, "Terminar surf"))));
      if (!pidiendo) programarAviso();

    function registrar(v) {
      puntos.push({ t: Math.round((Date.now() - inicio) / 1000), v });
      if (v <= 3 && puntos.length >= 3) terminar(true);

    function terminar(porVerde) {

      G.storage.guardar("olas", olas);

      montar(vista,
        h("p", { class: "eyebrow" }, "Ola surfeada · +2 Cuerpo"),
        h("h1", { class: "titulo" }, pico + " → " + final + " en " + minutos + " min"),
        grafica(),
        h("div", { class: "tarjeta", style: "border-color:var(--calma)" },
          h("p", { class: "suave mb0" }, porVerde

            : "Cada ola surfeada sin actuar debilita el patrón. La curva queda registrada: tus propios datos contra la urgencia.")),

          h("a", { class: "btn btn-primario", href: "#/checkin" }, "Registrar el momento"),
          h("a", { class: "btn", href: "#/inicio" }, "Cerrar")));
    }

    pantallaInicio();
  }

  G.vistas = G.vistas || {};
  G.vistas.ola = vista;
})();

      const desl = h("input", { type: "range", class: "semaforo", min: "0", max: "10", value: String(datos.nivel),

      const chEmo = chips(EMOCIONES, () => {});
      const chImp = chips(IMPULSOS, () => {});

      montar(vista, ...cabecera("O · Observa", "Ponle números y nombres"),
        h("div", { class: "tarjeta" },
          h("label", { class: "etiqueta" }, "¿Qué número soy ahora?"),
          h("div", { class: "fila" }, lectura, h("div", { style: "flex:1" }, desl)),
          h("label", { class: "etiqueta" }, "¿Qué siento? (elige los que apliquen)"), chEmo,
          h("label", { class: "etiqueta" }, "¿Qué quiere hacer mi impulso?"), chImp,
          h("div", { class: "fila-botones" }, h("button", { class: "btn btn-primario", onclick: () => {
            datos.emociones = chEmo.seleccionados();
            datos.impulsos = chImp.seleccionados();
            pasoP();

    function pasoP() {
      registrar("stop");
      const frase = (G.storage.leer("cuaderno", {}).frases || "").split("\n")[0] ||

      montar(vista, ...cabecera("P · Procede", "Elige el siguiente movimiento"),
        datos.impulsos.length ? h("p", { class: "suave" },
          "Tu impulso quiere: " + datos.impulsos.join(", ") + ". Ya lo viste venir — eso es medio freno. Ahora, la jugada:") : null,
        h("div", { class: "tarjeta-fila" },
          h("button", { class: "tarjeta-accion", style: "text-align:left", onclick: async () => { await G.dom.copiar(frase); toast("Frase copiada. Dila y sal."); } },
            h("span", { class: "icono" }, "💬"), h("strong", null, "Decir mi frase de salida"), h("span", null, "\u201c" + frase + "\u201d")),
          h("button", { class: "tarjeta-accion", style: "text-align:left", onclick: () => G.router.navegar("#/descarga") },
            h("span", { class: "icono" }, "⚡"), h("strong", null, "Descarga física"), h("span", null, "Frío, ejercicio, caminar: bajar el número por el cuerpo.")),
          h("button", { class: "tarjeta-accion", style: "text-align:left", onclick: () => G.router.navegar("#/vaciadero") },
            h("span", { class: "icono" }, "🔥"), h("strong", null, "Vaciadero"), h("span", null, "Escribirlo todo donde no hay botón de enviar.")),
          h("button", { class: "tarjeta-accion", style: "text-align:left", onclick: () => G.router.navegar("#/anclaje") },
            h("span", { class: "icono" }, "🖐"), h("strong", null, "Anclaje 5-4-3-2-1"), h("span", null, "Si la cabeza está en niebla o en bucle: los sentidos primero.")),
          h("button", { class: "tarjeta-accion", style: "text-align:left", onclick: pasoDetector },
            h("span", { class: "icono" }, "🎬"), h("strong", null, "Detector de películas"), h("span", null, "Separar el hecho de la historia que me estoy contando."))));
    }

    /* Detector de películas */
    function pasoDetector() {
      const hecho = h("textarea", { placeholder: "Solo lo que grabaría una cámara: \u201cvisto a las 22:30, sin respuesta\u201d. Sin adjetivos, sin intenciones." });
      const historia = h("textarea", { placeholder: "La película: \u201cno le importo, siempre soy el último\u201d. Escríbela tal cual suena por dentro." });
      montar(vista, ...cabecera("Detector · 1 de 2", "Hecho vs. historia"),
        h("div", { class: "tarjeta" },
          h("label", { class: "etiqueta" }, "El hecho (lo que grabaría una cámara)"), hecho,
          h("label", { class: "etiqueta" }, "La historia (lo que me estoy contando)"), historia,
          h("div", { class: "fila-botones" }, h("button", { class: "btn btn-primario", onclick: () => {
            datos.hecho = hecho.value.trim(); datos.historia = historia.value.trim();
            pasoAlternativas();

    }

    function pasoAlternativas() {
      const areas = [0, 1, 2].map((i) => h("input", { type: "text", placeholder: "Alternativa " + (i + 1), style: "margin-bottom:8px" }));
      montar(vista, ...cabecera("Detector · 2 de 2", "Tres explicaciones alternativas"),
        h("div", { class: "tarjeta" },
          datos.hecho && h("p", { class: "suave" }, h("strong", null, "El hecho: "), datos.hecho),
          h("p", { class: "tenue" }, "No hace falta creerlas: hace falta romper el monopolio de la primera. Ayuda: ¿qué explicaciones tienen que ver con SU vida y no contigo? ¿Qué le dirías a un amigo con este hecho exacto?"),
          ...areas,
          h("div", { class: "fila-botones" }, h("button", { class: "btn btn-primario", onclick: () => {
            datos.alternativas = areas.map((a) => a.value.trim()).filter(Boolean);
            pasoReevaluar();
          } }, "Listo →"))));
    }

    function pasoReevaluar() {
      let v = datos.nivel;
      const lectura = h("span", { class: "lectura-numero " + claseNivel(v), style: "font-size:1.8rem;min-width:52px" }, String(v));
      const desl = h("input", { type: "range", class: "semaforo", min: "0", max: "10", value: String(v),

      montar(vista, ...cabecera("Detector · cierre", "¿Y ahora, qué número?"),
        h("div", { class: "tarjeta" },
          h("div", { class: "fila" }, lectura, h("div", { style: "flex:1" }, desl)),
          h("div", { class: "fila-botones" }, h("button", { class: "btn btn-primario", onclick: () => {
            datos.nivelFinal = v;
            registrar("detector");
            cierre();
          } }, "Cerrar STOP"))));

    function cierre() {
      const bajo = datos.nivelFinal != null && datos.nivelFinal < datos.nivel;
      montar(vista,
        h("p", { class: "eyebrow" }, "STOP completo · +2 Detección"),
        h("h1", { class: "titulo" }, bajo ? datos.nivel + " → " + datos.nivelFinal : "Interrumpido a tiempo"),
        h("div", { class: "tarjeta", style: "border-color:var(--calma)" },
          h("p", { class: "suave mb0" }, bajo
            ? "La historia perdió fuerza cuando dejó de ser la única. No desapareció — no es magia — pero por debajo del umbral del impulso, ya eliges tú."
            : "Viste el amarillo, lo nombraste y elegiste el siguiente paso. Eso es exactamente la habilidad. El número baja con la práctica.")),
        h("div", { class: "fila-botones" },
          h("a", { class: "btn btn-primario", href: "#/checkin" }, "Registrar el momento"),
          h("a", { class: "btn", href: "#/inicio" }, "Cerrar")));

    function registrar(tipo) {
      const lista = G.storage.leer("stops", []);
      lista.push({ ts: new Date().toISOString(), dia: claveDia(), tipo, nivel: datos.nivel, nivelFinal: datos.nivelFinal,
        emociones: datos.emociones, impulsos: datos.impulsos });
      G.storage.guardar("stops", lista);
    }

    pasoS();
  }

  G.vistas = G.vistas || {};
  G.vistas.stop = vista;
})();

  <script>
/* Ventana · Preparador de conversaciones
   La fórmula del Libro 6, hecha máquina: te pregunta las piezas, arma la frase
   y la apertura suave, y su DETECTOR te avisa en vivo si metiste un "pero",
   un reproche o un "siempre/nunca". Puntería antes de disparar. */
(function () {
  const G = (window.Guia = window.Guia || {});
  const { h, montar, toast, copiar, fechaCorta } = G.dom;

  const EMOCIONES = ["dejado de lado", "desestimado", "ignorado", "no escuchado", "no elegido",
    "tratado injustamente", "inseguro", "decepcionado", "traicionado", "acorralado", "invisible", "insuficiente"];

  /* Detector: patrones que sabotean el mensaje, con explicación. */
  const PATRONES = [
    { re: /\bpero\b/i, aviso: "\u201cPero\u201d detectado: borra todo lo anterior. Corta la frase ahí o reformula sin él." },
    { re: /\bes que t[uú]\b|\bt[uú] tambi[eé]n\b/i, aviso: "Contraataque detectado (\u201ces que tú…\u201d): convierte la petición en pelea." },
    { re: /\bsiempre\b|\bnunca\b|\bjam[aá]s\b/i, aviso: "\u201cSiempre/nunca\u201d: casi siempre falso y siempre incendiario. Cámbialo por el caso concreto." },
    { re: /\bdeber[ií]as\b|\bten[ií]as que\b/i, aviso: "\u201cDeberías\u201d: suena a sentencia. Mejor pide hacia adelante: \u201cte pido que…\u201d." },
    { re: /\begoísta\b|\bmalagradecid|desconsiderad|\bt[oó]xic/i, aviso: "Etiqueta detectada: describe el hecho, no sentencies a la persona." },
    { re: /\?\?|!!|\bya\b.*\bmismo\b/i, aviso: "Tono de urgencia: si esto arde, no es momento de mandarlo. 24 horas." },
    { re: /\bme hiciste\b|\bpor tu culpa\b/i, aviso: "Acusación directa: prueba \u201ccuando pasó X, me sentí Y\u201d — abre en vez de atacar." }
  ];

  function analizar(texto) {
    const avisos = [];
    for (const p of PATRONES) if (p.re.test(texto)) avisos.push(p.aviso);
    return avisos;
  }

  function vista(vista) {
    const hecho = h("input", { type: "text", placeholder: "cancelaste el plan avisando dos horas antes" });
    const emocionSel = h("select", null, EMOCIONES.map((e) => h("option", { value: e }, e)));
    const significado = h("input", { type: "text", placeholder: "llevaba días esperándolo" });
    const peticion = h("input", { type: "text", placeholder: "que me avises apenas sepas que algo cambia" });
    const zonaAvisos = h("div");
    const zonaResultado = h("div");

    function revisar() {
      const todo = [hecho.value, significado.value, peticion.value].join(" · ");
      const avisos = analizar(todo);
      G.dom.montar(zonaAvisos, ...avisos.map((a) => h("div", { class: "aviso", style: "margin-bottom:8px" }, "⚠ " + a)));
      return avisos.length;
    }
    [hecho, significado, peticion].forEach((el) => el.addEventListener("input", revisar));

    function generar() {
      if (!hecho.value.trim() || !peticion.value.trim()) { toast("Falta el hecho o la petición"); return; }
      revisar();
      const frase = "Cuando " + limpia(hecho.value) + ", me sentí " + emocionSel.value +
        ", porque para mí " + (limpia(significado.value) || "era importante") +
        ". Te pido " + limpia(peticion.value) + ".";
      const apertura = "Quiero hablarte de algo que me dolió. No es un juicio ni una pelea: quiero que lo entendamos y me tomará dos minutos.";

      const texto = apertura + "\n\n" + frase;
      G.dom.montar(zonaResultado,
        h("div", { class: "tarjeta", style: "border-color:var(--calma)" },
          h("p", { class: "eyebrow" }, "Apertura suave"),
          h("p", null, apertura),
          h("p", { class: "eyebrow", style: "margin-top:16px" }, "Tu fórmula"),
          h("p", { style: "font-size:1.05rem" }, frase),
          h("div", { class: "fila-botones" },
            h("button", { class: "btn btn-primario", onclick: async () => toast(await copiar(texto) ? "Copiado. En persona o por llamada, no por chat." : "No pude copiar aquí") }, "Copiar"),
            h("button", { class: "btn", onclick: () => guardar(frase) }, "Guardar como pendiente")),
          h("p", { class: "tenue" }, "Lista de despegue: ¿los dos en verde? ¿sin público? ¿sin alcohol? ¿sabes qué quieres que pase al final? Si algo falla, no es el momento — es la emboscada.")));
    }

    function limpia(s) { return s.trim().replace(/\.+$/, ""); }

    function guardar(frase) {
      const lista = G.storage.leer("conversaciones", []);
      lista.push({ id: Date.now(), ts: new Date().toISOString(), frase, estado: "pendiente" });
      G.storage.guardar("conversaciones", lista);
      toast("Guardada. Cuando la tengas, márcala: +3 Palabra");
      vistaRender(vista);
    }

    function pendientes() {
      const lista = G.storage.leer("conversaciones", []).slice().reverse();
      if (!lista.length) return null;
      return h("div", null,
        h("h3", { style: "font-family:var(--f-titulo)" }, "Conversaciones preparadas"),
        lista.map((c) => h("div", { class: "entrada" },
          h("div", { class: "entrada-cab" },
            c.estado === "hecha" ? h("span", { class: "badge badge-verde" }, "tenida ✓") : h("span", { class: "badge badge-ambar" }, "pendiente"),
            h("span", { class: "entrada-fecha", style: "margin-left:auto" }, fechaCorta(c.ts)),
            c.estado !== "hecha" && h("button", { class: "btn btn-mini btn-primario", onclick: () => {
              c.estado = "hecha";
              const todas = G.storage.leer("conversaciones", []).map((x) => x.id === c.id ? c : x);
              G.storage.guardar("conversaciones", todas);
              toast("+3 Palabra. ¿Cómo salió? Vale una nota en el check-in.");
              vistaRender(vista);
            } }, "La tuve ✓"),
            h("button", { class: "btn btn-mini btn-fantasma", onclick: () => {
              G.storage.guardar("conversaciones", G.storage.leer("conversaciones", []).filter((x) => x.id !== c.id));
              vistaRender(vista);
            } }, "✕")),
          h("div", { class: "entrada-cuerpo" }, c.frase))));
    }

    montar(vista,
      h("p", { class: "eyebrow" }, "Herramienta · puntería antes de disparar"),
      h("h1", { class: "titulo" }, "Preparador de conversaciones"),
      h("p", { class: "subtitulo" }, "Me das las piezas, armo tu fórmula y tu apertura — y el detector te avisa si se coló un \u201cpero\u201d, un reproche o un \u201csiempre\u201d."),
      h("div", { class: "tarjeta" },
        h("label", { class: "etiqueta" }, "El hecho (sin adjetivos, lo que grabaría una cámara)"), hecho,
        h("label", { class: "etiqueta" }, "Me sentí…"), emocionSel,
        h("label", { class: "etiqueta" }, "Porque para mí… (qué significó)"), significado,
        h("label", { class: "etiqueta" }, "Te pido… (concreto, hacia adelante)"), peticion,
        zonaAvisos,
        h("div", { class: "fila-botones" }, h("button", { class: "btn btn-primario", onclick: generar }, "Armar mi fórmula"))),
      zonaResultado,
      pendientes());
  }

  function vistaRender(v) { vista(v); }

  G.conversacion = { analizar };
  G.vistas = G.vistas || {};
  G.vistas.conversacion = vista;
})();

</script>
  <script>
/* Ventana · Anclaje
   Para cortar el bucle mental, la disociación o el pánico: forzar a la
   atención a procesar el aquí y ahora. Tres modos, con su nivel de evidencia
   declarado. Cada anclaje completado suma +1 Detección. */
(function () {
  const G = (window.Guia = window.Guia || {});
  const { h, montar, toast } = G.dom;

  function registrar() {
    G.storage.guardar("anclajes", (G.storage.leer("anclajes", 0) || 0) + 1);
    toast("+1 Detección");
  }

  const SENTIDOS = [
    { n: 5, texto: "cosas que VES", ayuda: "Con detalle: color, forma, textura. Despacio.", icono: "👁" },
    { n: 4, texto: "cosas que puedes TOCAR", ayuda: "Tócalas de verdad si puedes: textura, temperatura.", icono: "✋" },
    { n: 3, texto: "sonidos que OYES", ayuda: "Cercanos y lejanos. Espera a distinguirlos.", icono: "👂" },
    { n: 2, texto: "olores que HUELES", ayuda: "Si no hay, nombra dos que te gusten, de memoria.", icono: "👃" },
    { n: 1, texto: "sabor que notas", ayuda: "El de tu boca ahora, o uno que recuerdes bien.", icono: "👅" }
  ];

  function vista(vista) {
    function inicio() {
      montar(vista,
        h("p", { class: "eyebrow" }, "Herramienta · aquí y ahora"),
        h("h1", { class: "titulo" }, "Anclaje"),
        h("p", { class: "subtitulo" }, "Cuando la cabeza se va — bucle, pánico, niebla — la salida no es pensar mejor: es obligar a los sentidos a procesar el presente."),
        h("div", { class: "tarjeta-fila" },
          h("button", { class: "tarjeta-accion", style: "text-align:left", onclick: () => cincoCuatro(0, 0) },
            h("span", { class: "icono" }, "🖐"), h("strong", null, "5-4-3-2-1"),
            h("span", null, "Recorre los cinco sentidos, en voz alta. Evidencia: media (uso clínico amplio).")),
          h("button", { class: "tarjeta-accion", style: "text-align:left", onclick: pendulacionSetup },
            h("span", { class: "icono" }, "🌗"), h("strong", null, "Pendulación"),
            h("span", null, "Alternar entre la zona incómoda y una zona neutral del cuerpo. Evidencia: baja (clínica somática).")),
          h("button", { class: "tarjeta-accion", style: "text-align:left", onclick: mariposa },
            h("span", { class: "icono" }, "🦋"), h("strong", null, "Abrazo de mariposa"),
            h("span", null, "Golpeteo bilateral lento de autoconsuelo. Evidencia: baja-media."))));
    }

    /* ---- 5-4-3-2-1 ---- */
    function cincoCuatro(iSentido, contados) {
      const s = SENTIDOS[iSentido];
      montar(vista,
        h("p", { class: "eyebrow" }, "Anclaje 5-4-3-2-1 · " + (iSentido + 1) + " de 5"),
        h("h1", { class: "titulo", style: "font-size:1.6rem" }, s.icono + " Nombra " + s.n + " " + s.texto),
        h("div", { class: "tarjeta centro" },
          h("p", { class: "suave" }, s.ayuda + " Dilo en voz alta o en susurro: el lenguaje es parte del efecto."),
          h("div", { class: "lectura-numero n-verde", style: "margin:12px auto" }, contados + " / " + s.n),
          h("div", { class: "fila-botones", style: "justify-content:center" },
            h("button", { class: "btn btn-primario btn-heroe", onclick: () => {
              const c = contados + 1;
              if (c >= s.n) {
                if (iSentido + 1 < SENTIDOS.length) cincoCuatro(iSentido + 1, 0);
                else cierre("Cinco sentidos recorridos. La cabeza tuvo que venir al presente para lograrlo.");
              } else cincoCuatro(iSentido, c);
            } }, "Nombrada ✓"))));
    }

    /* ---- Pendulación ---- */
    function pendulacionSetup() {
      const mal = h("input", { type: "text", placeholder: "presión en el pecho, nudo en el estómago…" });
      const bien = h("input", { type: "text", placeholder: "el meñique del pie, la punta de la nariz, una mano tibia…" });
      montar(vista,
        h("p", { class: "eyebrow" }, "Pendulación · preparación"),
        h("h1", { class: "titulo", style: "font-size:1.6rem" }, "Dos zonas"),
        h("div", { class: "tarjeta" },
          h("p", { class: "suave" }, "La idea: enseñarle al sistema nervioso que puede visitar lo incómodo y VOLVER. Se entrena alternando la atención, no quedándose en el dolor."),
          h("label", { class: "etiqueta" }, "¿Dónde se siente lo incómodo?"), mal,
          h("label", { class: "etiqueta" }, "Busca una zona que se sienta neutral o agradable"), bien,
          h("div", { class: "fila-botones" },
            h("button", { class: "btn btn-primario", onclick: () => pendulacion(mal.value.trim() || "la zona incómoda", bien.value.trim() || "tu zona neutral", 0, true) }, "Empezar (4 ciclos)"))));
    }

    function pendulacion(mal, bien, ciclo, enNeutral) {
      if (ciclo >= 4) { cierre("Cuatro visitas y cuatro regresos. Eso es tolerancia entrenándose."); return; }
      const dur = enNeutral ? 20 : 10;
      let restante = dur;
      const reloj = h("div", { class: "temporizador" }, restante);
      const intv = setInterval(() => {
        restante--;
        reloj.textContent = restante;
        if (restante <= 0) {
          clearInterval(intv);
          if (enNeutral) pendulacion(mal, bien, ciclo, false);
          else pendulacion(mal, bien, ciclo + 1, true);
        }
      }, 1000);
      montar(vista,
        h("p", { class: "eyebrow" }, "Pendulación · ciclo " + (ciclo + 1) + " de 4"),
        h("h1", { class: "titulo", style: "font-size:1.5rem" }, enNeutral ? "Atención en: " + bien : "Visita breve a: " + mal),
        h("div", { class: "tarjeta centro" },
          h("p", { class: "suave" }, enNeutral ? "Quédate aquí. Nota temperatura, contacto, quietud." : "Solo obsérvala con curiosidad, sin pelear. Ya vuelves."),
          reloj,
          h("div", { class: "fila-botones", style: "justify-content:center" },
            h("button", { class: "btn btn-fantasma btn-mini", onclick: () => { clearInterval(intv); inicio(); } }, "Salir"))));
    }

    /* ---- Abrazo de mariposa ---- */
    function mariposa() {

})();

   El eslabón que más recaídas fabrica es la vergüenza post-episodio: sube la
   activación de fondo y deja el terreno listo para el siguiente estallido.

          h("button", { class: "tarjeta-accion", style: "text-align:left", onclick: () => rain(0, {}) },

    const PASOS_PAUSA = [
      { titulo: "Reconocer", frase: "\u201cEste es un momento difícil.\u201d", nota: "Solo eso. Sin analizar, sin juzgar. Nombrar el sufrimiento ya lo regula un poco — dilo despacio, en voz baja si puedes." },
      { titulo: "Humanidad común", frase: "\u201cEsto es parte de ser humano. No soy el único que pelea con esto.\u201d", nota: "La vergüenza aísla (\u201csolo yo soy así\u201d). Este paso rompe el aislamiento: millones entrenan exactamente este mismo patrón." },
      { titulo: "Amabilidad", frase: "\u201cQue pueda tratarme con la misma decencia con la que trataría a un amigo en esto.\u201d", nota: "Pon una mano en el pecho o donde te resulte natural. El gesto físico no es decoración: ayuda a que el cuerpo se lo crea." }
    ];

    function pausa(i) {
      if (i >= PASOS_PAUSA.length) { cierre("Un minuto que corta la gasolina. Vuelve a esto cada vez que el juez interno tome el micrófono."); return; }
      const p = PASOS_PAUSA[i];
      montar(vista,
        h("p", { class: "eyebrow" }, "Pausa de autocompasión · " + (i + 1) + " de 3"),
        h("h1", { class: "titulo", style: "font-size:1.5rem" }, p.titulo),

            datos.emo = h("input", { type: "text", placeholder: "estoy sintiendo…" })) },
        { t: "Permite", cuerpo: () => h("div", null,

            datos.donde = h("input", { type: "text", placeholder: "lo siento en… y creo que necesita…" })) },
        { t: "Nutre", cuerpo: () => h("div", null,
            h("p", { class: "suave" }, "Mano donde lo sientas, y una frase de cuidado — la que le dirías a alguien que quieres:"),
            h("p", { class: "ancla-rotativa" }, "\u201cEstoy aquí. Estamos entrenando. Esto no te define.\u201d")) }

        h("div", { class: "fila-botones" },
          h("button", { class: "btn", onclick: inicio }, "Otra práctica"),

          h("a", { class: "btn btn-fantasma", href: "#/inicio" }, "Cerrar")));
    }

    inicio();
  }

  G.vistas = G.vistas || {};
  G.vistas.compasion = vista;
