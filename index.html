<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="Ventana · Guía interactiva de manejo emocional. Todo local, sin conexión, sin rastreo.">
  <title>Ventana · Guía de manejo emocional</title>
  <style>
/* ============================================================
   VENTANA · hoja de estilos
   Tokens primero; la paleta ES el semáforo del modelo:
   calma (verde) · ámbar (amarillo) · rojo (solo SOS/rojo).
   Sin fuentes ni recursos externos: cero peticiones de red.
   ============================================================ */

:root {
  /* Color */
  --fondo: #10151d;
  --superficie: #161d28;
  --superficie-2: #1c2534;
  --linea: #27324a;
  --tinta: #e9eef6;
  --tinta-suave: #9aa8bd;
  --tinta-tenue: #6b7891;
  --calma: #7fd1b9;
  --calma-int: #b9ecdc;
  --calma-fondo: rgba(127, 209, 185, 0.12);
  --ambar: #e8b872;
  --ambar-fondo: rgba(232, 184, 114, 0.12);
  --rojo: #e98a80;
  --rojo-int: #f3b1aa;
  --rojo-fondo: rgba(233, 138, 128, 0.12);

  /* Tipografía: serif editorial para títulos (es una guía), sans de sistema para UI */
  --f-titulo: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Times New Roman", serif;
  --f-cuerpo: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --f-datos: ui-monospace, "SF Mono", "Cascadia Mono", Consolas, Menlo, monospace;

  /* Escala */
  --e1: 4px; --e2: 8px; --e3: 12px; --e4: 16px; --e5: 24px; --e6: 32px; --e7: 48px;
  --radio: 12px;
  --radio-g: 18px;
  --ancho-lectura: 70ch;
  --sombra: 0 8px 28px rgba(0, 0, 0, 0.35);
}

/* ---------- Base ---------- */
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  background: var(--fondo);
  color: var(--tinta);
  font-family: var(--f-cuerpo);
  font-size: 16px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}
img, svg { vertical-align: middle; }
button { font: inherit; color: inherit; cursor: pointer; }
input, textarea, select { font: inherit; color: inherit; }
a { color: var(--calma); text-decoration: none; }
a:hover { text-decoration: underline; }
:focus-visible { outline: 2px solid var(--calma); outline-offset: 2px; border-radius: 4px; }

.skip-link {
  position: absolute; left: -9999px; top: 0; z-index: 100;
  background: var(--calma); color: #0c211b; padding: var(--e2) var(--e4); border-radius: 0 0 8px 0;
}
.skip-link:focus { left: 0; }

/* ---------- Barra superior ---------- */
.topbar {
  position: sticky; top: 0; z-index: 40;
  display: flex; align-items: center; gap: var(--e3);
  padding: var(--e3) var(--e4);
  background: rgba(16, 21, 29, 0.9);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--linea);
}
.marca { display: flex; align-items: center; gap: var(--e2); color: var(--tinta); }
.marca:hover { text-decoration: none; }
.marca-icono { color: var(--calma); }
.marca-nombre {
  font-family: var(--f-titulo); font-size: 1.25rem; letter-spacing: 0.06em;
  text-transform: uppercase;
}
.topbar-espacio { flex: 1; }
.nav-toggle {
  display: none; background: none; border: 1px solid var(--linea);
  border-radius: 8px; padding: 4px 10px; font-size: 1.1rem;
}

/* ---------- Marco: lateral + vista ---------- */
.marco { display: flex; min-height: calc(100vh - 57px); }
.lateral {
  width: 264px; flex-shrink: 0;
  border-right: 1px solid var(--linea);
  padding: var(--e4) var(--e3) var(--e7);
  position: sticky; top: 57px; align-self: flex-start;
  max-height: calc(100vh - 57px); overflow-y: auto;
}
.lateral h2 {
  font-family: var(--f-cuerpo); font-size: 0.7rem; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--tinta-tenue);
  margin: var(--e5) var(--e3) var(--e2);
}
.lateral h2:first-child { margin-top: var(--e2); }
.lateral a {
  display: block; color: var(--tinta-suave);
  padding: 7px var(--e3); border-radius: 8px; font-size: 0.92rem;
}
.lateral a:hover { color: var(--tinta); background: var(--superficie); text-decoration: none; }
.lateral a[aria-current="page"] {
  color: var(--calma-int); background: var(--calma-fondo); font-weight: 600;
}
.lateral a .mini { color: var(--tinta-tenue); font-size: 0.78rem; display: block; }

.vista {
  flex: 1; min-width: 0;
  padding: var(--e6) var(--e5) var(--e7);
}
.vista > * { max-width: var(--ancho-lectura); margin-left: auto; margin-right: auto; }
.vista:focus { outline: none; }

/* ---------- Tipografía de contenido ---------- */
.eyebrow {
  font-size: 0.72rem; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--calma); font-weight: 700; margin: 0 0 var(--e2);
}
h1.titulo {
  font-family: var(--f-titulo); font-weight: 500; font-size: 2rem;
  line-height: 1.2; margin: 0 0 var(--e3);
}
.subtitulo { color: var(--tinta-suave); margin: 0 0 var(--e5); font-size: 1.02rem; }

.prosa h3 {
  font-family: var(--f-titulo); font-weight: 600; font-size: 1.3rem;
  margin: var(--e6) 0 var(--e3); line-height: 1.3;
}
.prosa h4 { font-size: 1.02rem; margin: var(--e5) 0 var(--e2); color: var(--calma-int); }
.prosa p { margin: 0 0 var(--e4); }
.prosa ul, .prosa ol { margin: 0 0 var(--e4); padding-left: 1.3em; }
.prosa li { margin-bottom: var(--e2); }
.prosa strong { color: var(--tinta); }
.prosa em { color: var(--calma-int); font-style: italic; }
.prosa blockquote {
  margin: var(--e4) 0; padding: var(--e3) var(--e4);
  border-left: 3px solid var(--calma);
  background: var(--superficie); border-radius: 0 var(--radio) var(--radio) 0;
  color: var(--tinta-suave);
}
.prosa blockquote p { margin-bottom: var(--e2); }
.prosa hr { border: 0; border-top: 1px solid var(--linea); margin: var(--e6) 0; }

.tbl-envoltura { overflow-x: auto; margin: 0 0 var(--e4); }
table.tbl { border-collapse: collapse; width: 100%; font-size: 0.92rem; }
.tbl th, .tbl td { border: 1px solid var(--linea); padding: var(--e2) var(--e3); text-align: left; vertical-align: top; }
.tbl th { background: var(--superficie-2); font-weight: 600; }
.tbl tr:nth-child(even) td { background: var(--superficie); }

/* ---------- Componentes ---------- */
.tarjeta {
  background: var(--superficie); border: 1px solid var(--linea);
  border-radius: var(--radio-g); padding: var(--e5);
  margin-bottom: var(--e4);
}
.tarjeta h3 { margin-top: 0; }
.tarjeta-fila { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: var(--e3); }
.tarjeta-accion {
  display: block; background: var(--superficie); border: 1px solid var(--linea);
  border-radius: var(--radio-g); padding: var(--e4); color: var(--tinta);
  transition: border-color 0.15s ease, transform 0.15s ease;
}
.tarjeta-accion:hover { border-color: var(--calma); text-decoration: none; transform: translateY(-2px); }
.tarjeta-accion .icono { font-size: 1.4rem; display: block; margin-bottom: var(--e2); }
.tarjeta-accion strong { display: block; margin-bottom: 2px; }
.tarjeta-accion span { color: var(--tinta-suave); font-size: 0.88rem; }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: var(--e2);
  border: 1px solid var(--linea); background: var(--superficie-2);
  color: var(--tinta); border-radius: 10px; padding: 9px 16px;
  font-weight: 600; font-size: 0.94rem;
  transition: background 0.15s ease, border-color 0.15s ease;
}
.btn:hover { border-color: var(--tinta-tenue); }
.btn-primario { background: var(--calma); border-color: var(--calma); color: #0c211b; }
.btn-primario:hover { background: var(--calma-int); border-color: var(--calma-int); }
.btn-sos { background: var(--rojo-fondo); border-color: var(--rojo); color: var(--rojo-int); }
.btn-sos:hover { background: var(--rojo); color: #2a100d; }
.btn-fantasma { background: transparent; }
.btn-peligro { border-color: var(--rojo); color: var(--rojo-int); background: transparent; }
.btn-peligro:hover { background: var(--rojo-fondo); }
.btn-mini { padding: 4px 10px; font-size: 0.8rem; border-radius: 8px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.fila-botones { display: flex; flex-wrap: wrap; gap: var(--e2); margin-top: var(--e3); }

.chip {
  border: 1px solid var(--linea); background: var(--superficie);
  border-radius: 999px; padding: 5px 13px; font-size: 0.84rem; color: var(--tinta-suave);
}
.chip[aria-pressed="true"] { background: var(--calma-fondo); border-color: var(--calma); color: var(--calma-int); }
.grupo-chips { display: flex; flex-wrap: wrap; gap: var(--e2); margin: var(--e3) 0; }

.etiqueta { display: block; font-weight: 600; font-size: 0.9rem; margin: var(--e4) 0 var(--e1); }
.ayuda { color: var(--tinta-tenue); font-size: 0.82rem; margin: 2px 0 0; }
input[type="text"], input[type="date"], textarea, select {
  width: 100%; background: var(--fondo); border: 1px solid var(--linea);
  border-radius: 10px; padding: 10px 12px; color: var(--tinta);
}
textarea { min-height: 84px; resize: vertical; }
input:focus, textarea:focus, select:focus { border-color: var(--calma); outline: none; }

/* Deslizador semáforo: la pista ES el modelo (0 verde → 10 rojo) */
input[type="range"].semaforo {
  -webkit-appearance: none; appearance: none; width: 100%; height: 12px;
  border-radius: 999px; outline-offset: 6px;
  background: linear-gradient(90deg, var(--calma) 0%, var(--calma) 32%, var(--ambar) 55%, var(--rojo) 85%);
}
input[type="range"].semaforo::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--tinta); border: 3px solid var(--fondo);
  box-shadow: 0 2px 8px rgba(0,0,0,0.5); cursor: grab;
}
input[type="range"].semaforo::-moz-range-thumb {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--tinta); border: 3px solid var(--fondo); cursor: grab;
}
.lectura-numero {
  font-family: var(--f-datos); font-size: 2.6rem; font-weight: 700;
  line-height: 1; min-width: 70px; text-align: center;
}
.n-verde { color: var(--calma); }
.n-ambar { color: var(--ambar); }
.n-rojo { color: var(--rojo); }

/* Medidor-ventana (elemento firma): tu punto dentro/fuera de la ventana */
.medidor { margin: var(--e4) 0; }
.medidor-pista {
  position: relative; height: 14px; border-radius: 999px;
  background: var(--superficie-2); border: 1px solid var(--linea);
}
.medidor-banda {
  position: absolute; top: 0; bottom: 0; left: 0; width: 60%;
  background: var(--calma-fondo); border-right: 2px solid var(--calma);
  border-radius: 999px 0 0 999px;
}
.medidor-punto {
  position: absolute; top: 50%; transform: translate(-50%, -50%);
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--tinta); border: 3px solid var(--fondo);
  transition: left 0.4s ease;
}
.medidor-leyenda {
  display: flex; justify-content: space-between;
  font-size: 0.75rem; color: var(--tinta-tenue); margin-top: var(--e1);
}

.badge {
  display: inline-block; border-radius: 999px; padding: 2px 10px;
  font-size: 0.74rem; font-weight: 700; letter-spacing: 0.04em;
}
.badge-verde { background: var(--calma-fondo); color: var(--calma-int); }
.badge-ambar { background: var(--ambar-fondo); color: var(--ambar); }
.badge-rojo  { background: var(--rojo-fondo); color: var(--rojo-int); }

.barra-progreso {
  height: 10px; background: var(--superficie-2); border-radius: 999px;
  overflow: hidden; border: 1px solid var(--linea);
}
.barra-progreso > div { height: 100%; background: var(--calma); border-radius: 999px; transition: width 0.3s ease; }

.entrada {
  border: 1px solid var(--linea); border-radius: var(--radio);
  padding: var(--e3) var(--e4); margin-bottom: var(--e3); background: var(--superficie);
}
.entrada-cab { display: flex; align-items: center; gap: var(--e2); flex-wrap: wrap; }
.entrada-fecha { font-family: var(--f-datos); font-size: 0.8rem; color: var(--tinta-tenue); }
.entrada-cuerpo { margin-top: var(--e2); font-size: 0.92rem; color: var(--tinta-suave); white-space: pre-wrap; }
.entrada details summary { cursor: pointer; color: var(--calma); font-size: 0.88rem; }

.vacio {
  text-align: center; color: var(--tinta-tenue); padding: var(--e6) var(--e4);
  border: 1px dashed var(--linea); border-radius: var(--radio-g);
}

.aviso {
  border: 1px solid var(--ambar); background: var(--ambar-fondo);
  border-radius: var(--radio); padding: var(--e3) var(--e4);
  color: var(--tinta); font-size: 0.9rem; margin-bottom: var(--e4);
}

/* ---------- Frases ---------- */
.frase {
  display: flex; align-items: flex-start; justify-content: space-between; gap: var(--e3);
  border: 1px solid var(--linea); border-radius: var(--radio);
  padding: var(--e3) var(--e4); margin-bottom: var(--e2); background: var(--superficie);
}
.frase.anti { border-color: var(--rojo); background: var(--rojo-fondo); }
.frase p { margin: 0; }
.frase .nota { color: var(--tinta-tenue); font-size: 0.8rem; display: block; margin-top: 2px; }

/* ---------- Respiración ---------- */
.escenario-respiracion {
  display: flex; flex-direction: column; align-items: center;
  padding: var(--e6) 0; text-align: center;
}
.circulo-envoltura { width: 240px; height: 240px; display: grid; place-items: center; position: relative; }
.circulo-respiracion {
  width: 110px; height: 110px; border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, var(--calma-int), var(--calma) 70%);
  box-shadow: 0 0 60px rgba(127, 209, 185, 0.35);
  transform: scale(0.6);
}
.circulo-respiracion.animando { transition: transform var(--dur, 4s) cubic-bezier(0.4, 0, 0.4, 1); }
.circulo-respiracion.expandido { transform: scale(1.55); }
.fase-respiracion { font-family: var(--f-titulo); font-size: 1.35rem; margin: var(--e4) 0 var(--e1); min-height: 1.6em; }
.contador-respiracion { font-family: var(--f-datos); color: var(--tinta-suave); min-height: 1.4em; }

/* ---------- Overlay SOS ---------- */
.sos-overlay {
  position: fixed; inset: 0; z-index: 90;
  background: var(--fondo);
  display: flex; flex-direction: column;
  overflow-y: auto;
}
.sos-cabecera { display: flex; justify-content: flex-end; padding: var(--e4); }
.sos-cuerpo {
  flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
  padding: 0 var(--e5) var(--e7); text-align: center; max-width: 640px; margin: 0 auto; width: 100%;
}
.sos-cuerpo h2 { font-family: var(--f-titulo); font-weight: 500; font-size: 1.7rem; margin: 0 0 var(--e3); }
.sos-cuerpo p.grande { font-size: 1.1rem; color: var(--tinta-suave); }
.sos-pasos { font-family: var(--f-datos); font-size: 0.78rem; letter-spacing: 0.12em; color: var(--tinta-tenue); text-transform: uppercase; margin-bottom: var(--e4); }
.temporizador { font-family: var(--f-datos); font-size: 3.4rem; font-weight: 700; color: var(--calma); margin: var(--e3) 0; }
.ancla-rotativa { font-family: var(--f-titulo); font-size: 1.25rem; color: var(--calma-int); min-height: 2.2em; margin: var(--e4) 0; }

/* ---------- Toast ---------- */
.zona-toast { position: fixed; bottom: var(--e4); left: 50%; transform: translateX(-50%); z-index: 95; }
.toast {
  background: var(--superficie-2); border: 1px solid var(--calma);
  color: var(--tinta); border-radius: 10px; padding: 10px 18px;
  box-shadow: var(--sombra); font-size: 0.92rem; margin-top: var(--e2);
  animation: subir 0.25s ease;
}
@keyframes subir { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* ---------- Utilidades ---------- */
.fila { display: flex; align-items: center; gap: var(--e3); flex-wrap: wrap; }
.separado { justify-content: space-between; }
.suave { color: var(--tinta-suave); }
.tenue { color: var(--tinta-tenue); font-size: 0.85rem; }
.centro { text-align: center; }
.mt0 { margin-top: 0; } .mb0 { margin-bottom: 0; }
.oculto { display: none !important; }

/* ---------- Responsive ---------- */
@media (max-width: 860px) {
  .nav-toggle { display: block; }
  .lateral {
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 60;
    background: var(--superficie); width: 280px; max-height: none;
    transform: translateX(-105%); transition: transform 0.25s ease;
    box-shadow: var(--sombra); padding-top: var(--e5);
  }
  .lateral.abierto { transform: translateX(0); }
  .capa { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 50; }
  .vista { padding: var(--e5) var(--e4) var(--e7); }
  .btn-sos { padding: 9px 12px; font-size: 0.86rem; }
  h1.titulo { font-size: 1.6rem; }
}

/* ---------- Movimiento reducido ---------- */
@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
  * { animation: none !important; transition: none !important; }
  .circulo-respiracion { transform: scale(1) !important; opacity: 0.85; }
}

/* ---------- Edición Maestría ---------- */
.opcion-dojo {
  display: block; width: 100%; text-align: left;
  background: var(--superficie); border: 1px solid var(--linea);
  border-radius: var(--radio); padding: var(--e3) var(--e4);
  margin-bottom: var(--e2); font-size: 0.98rem; line-height: 1.5;
  transition: border-color 0.15s ease, background 0.15s ease;
}
.opcion-dojo:hover:not(:disabled) { border-color: var(--calma); background: var(--superficie-2); }
.opcion-dojo:disabled { cursor: default; opacity: 0.75; }
.opcion-dojo.elegida-regulada { border-color: var(--calma); background: var(--calma-fondo); opacity: 1; }
.opcion-dojo.elegida-parcial  { border-color: var(--ambar); background: var(--ambar-fondo); opacity: 1; }
.opcion-dojo.elegida-impulso  { border-color: var(--rojo);  background: var(--rojo-fondo);  opacity: 1; }

.grafica { width: 100%; height: auto; display: block; margin-top: var(--e2); }

/* ---------- Compuerta de entrada y flujo diario ---------- */
.compuerta {
  position: fixed; inset: 0; z-index: 85;
  background: var(--fondo);
  display: flex; align-items: center; justify-content: center;
  overflow-y: auto; padding: var(--e5);
}
.compuerta-cuerpo { width: 100%; max-width: 460px; }
.compuerta-titulo {
  font-family: var(--f-titulo); font-weight: 500; font-size: 1.8rem;
  text-align: center; margin: 0 0 var(--e5);
}
.puerta {
  display: block; width: 100%; text-align: left;
  border-radius: var(--radio-g); padding: var(--e4) var(--e5);
  margin-bottom: var(--e3); border: 1px solid var(--linea);
  background: var(--superficie);
  transition: transform 0.12s ease, border-color 0.12s ease;
}
.puerta:hover { transform: translateY(-2px); }
.puerta strong { display: block; font-size: 1.15rem; margin: 2px 0; }
.puerta-rango { font-family: var(--f-datos); font-size: 0.78rem; letter-spacing: 0.1em; }
.puerta-sub { color: var(--tinta-suave); font-size: 0.88rem; }
.puerta-rojo  { border-color: var(--rojo);  background: var(--rojo-fondo); }
.puerta-rojo .puerta-rango { color: var(--rojo-int); }
.puerta-ambar { border-color: var(--ambar); background: var(--ambar-fondo); }
.puerta-ambar .puerta-rango { color: var(--ambar); }
.puerta-verde { border-color: var(--calma); background: var(--calma-fondo); }
.puerta-verde .puerta-rango { color: var(--calma-int); }

.btn-heroe { font-size: 1.05rem; padding: 14px 26px; border-radius: 14px; }

.flujo-dots { display: flex; gap: 8px; margin-bottom: var(--e4); }
.flujo-dots .dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--superficie-2); border: 1px solid var(--linea);
}
.flujo-dots .dot.hecho { background: var(--calma); border-color: var(--calma); }
.flujo-dots .dot.actual { border-color: var(--calma); box-shadow: 0 0 0 3px var(--calma-fondo); }

/* ---------- Arsenal práctico ---------- */
textarea.quemando { animation: quemar 0.9s ease forwards; }
@keyframes quemar {
  0% { opacity: 1; }
  60% { opacity: 0.4; filter: blur(1px); border-color: var(--rojo); }
  100% { opacity: 0; filter: blur(3px); }
}

/* ---------- Flujo v2: dots clicables ---------- */
.flujo-cab { margin-bottom: var(--e4); }
.flujo-dots { margin-bottom: 0; }
.flujo-dots .dot {
  padding: 0; cursor: pointer;
  transition: transform 0.12s ease, background 0.12s ease;
}
.flujo-dots .dot:hover { transform: scale(1.35); border-color: var(--calma); }

/* ---------- Simulador ---------- */

/* Ventana · núcleo DOM
   Ayudantes mínimos para crear elementos sin framework.
   Patrón de módulo: cada archivo se registra en el espacio global G (window.Guia). */
(function () {
  const G = (window.Guia = window.Guia || {});

  /** Escapa texto para insertarlo en HTML de forma segura. */
  function esc(s) {
    return String(s ?? "").replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  /** h(tag, props, ...hijos) → HTMLElement. props admite class, html, on{evento}, atributos. */
  function h(tag, props, ...hijos) {
    const el = document.createElement(tag);
    if (props) {
      for (const [k, v] of Object.entries(props)) {
        if (v == null) continue;
        if (k === "class") el.className = v;
        else if (k === "html") el.innerHTML = v;
        else if (k.startsWith("on") && typeof v === "function") el.addEventListener(k.slice(2), v);
        else if (k === "dataset") Object.assign(el.dataset, v);
        else el.setAttribute(k, v);
      }
    }
    for (const hijo of hijos.flat()) {
      if (hijo == null || hijo === false) continue;
      el.append(hijo.nodeType ? hijo : document.createTextNode(hijo));
    }
    return el;
  }

  /** Vacía un nodo y monta hijos nuevos. */
  function montar(nodo, ...hijos) {
    nodo.replaceChildren(...hijos.flat().filter(Boolean));
    return nodo;
  }

  /** Notificación breve no bloqueante. */
  function toast(mensaje, ms = 2200) {
    const zona = document.getElementById("zonaToast");
    const t = h("div", { class: "toast", role: "status" }, mensaje);
    zona.append(t);
    setTimeout(() => t.remove(), ms);
  }

  /** Fecha legible corta en español. */
  function fechaCorta(iso) {
    try {
      return new Date(iso).toLocaleString("es", {
        day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit"
      });
    } catch { return iso; }
  }

  /** Clave de día local YYYY-MM-DD (para rachas y "hoy"). */
  function claveDia(d = new Date()) {
    const p = (n) => String(n).padStart(2, "0");
    return d.getFullYear() + "-" + p(d.getMonth() + 1) + "-" + p(d.getDate());
  }

  /** Clase de color según número del semáforo. */
  function claseNivel(n) { return n <= 3 ? "n-verde" : n <= 6 ? "n-ambar" : "n-rojo"; }
  function badgeNivel(n) {
    const b = n <= 3 ? ["badge-verde", "verde"] : n <= 6 ? ["badge-ambar", "amarillo"] : ["badge-rojo", "rojo"];
    return h("span", { class: "badge " + b[0] }, n + " · " + b[1]);
  }

  /** Copia texto al portapapeles con degradado para file:// (sin Clipboard API). */
  async function copiar(texto) {
    try {
      await navigator.clipboard.writeText(texto);
      return true;
    } catch (e) {
      try {
        const ta = h("textarea", { style: "position:fixed;left:-9999px" });
        ta.value = texto;
        document.body.append(ta);
        ta.select();
        const ok = document.execCommand("copy");
        ta.remove();
        return ok;
      } catch (e2) { return false; }
    }
  }

  G.dom = { esc, h, montar, toast, fechaCorta, claveDia, claseNivel, badgeNivel, copiar };
})();

</script>
  <script>
/* Ventana · mini-renderizador de Markdown
   El contenido de la guía vive como Markdown en js/data (autoría separada
   de la presentación). Soporta el subconjunto que usa la guía:
   párrafos, **negrita**, *cursiva*, listas -, listas 1., > citas,
   | tablas |, --- separador, #### subtítulos. Sin dependencias. */
(function () {
  const G = (window.Guia = window.Guia || {});
  const esc = G.dom.esc;

  function enLinea(t) {
    let s = esc(t);
    s = s.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    s = s.replace(/(^|[\s(¿¡"“])\*(?!\s)([^*\n]+?)\*(?=[\s.,;:)!?"”…]|$)/g, "$1<em>$2</em>");
    return s;
  }

  function tabla(lineas) {
    const filas = lineas.map((l) => l.replace(/^\||\|$/g, "").split("|").map((c) => c.trim()));
    const cab = filas[0];
    const cuerpo = filas.slice(2); // fila 1 = separador ---
    let html = '<div class="tbl-envoltura"><table class="tbl"><thead><tr>';
    html += cab.map((c) => "<th>" + enLinea(c) + "</th>").join("");
    html += "</tr></thead><tbody>";
    for (const f of cuerpo) {
      html += "<tr>" + f.map((c) => "<td>" + enLinea(c) + "</td>").join("") + "</tr>";
    }
    return html + "</tbody></table></div>";
  }

  /** Convierte un bloque Markdown a HTML. */
  function render(md) {
    const lineas = md.split("\n");
    const salida = [];
    let i = 0;
    while (i < lineas.length) {
      const l = lineas[i];

      if (!l.trim()) { i++; continue; }

      if (/^---+\s*$/.test(l)) { salida.push("<hr>"); i++; continue; }

      if (l.startsWith("#### ")) { salida.push("<h4>" + enLinea(l.slice(5)) + "</h4>"); i++; continue; }

      if (l.startsWith("|")) {
        const bloque = [];
        while (i < lineas.length && lineas[i].startsWith("|")) bloque.push(lineas[i++]);
        salida.push(tabla(bloque));
        continue;
      }

      if (l.startsWith("> ") || l === ">") {
        const bloque = [];
        while (i < lineas.length && lineas[i].startsWith(">")) {
          bloque.push(lineas[i].replace(/^>\s?/, ""));
          i++;
        }
        salida.push("<blockquote>" + render(bloque.join("\n")) + "</blockquote>");
        continue;
      }

      if (/^- /.test(l)) {
        const items = [];
        while (i < lineas.length && /^- /.test(lineas[i])) items.push(lineas[i++].slice(2));
        salida.push("<ul>" + items.map((x) => "<li>" + enLinea(x) + "</li>").join("") + "</ul>");
        continue;
      }

      if (/^\d+\. /.test(l)) {
        const items = [];
        while (i < lineas.length && /^\d+\. /.test(lineas[i])) items.push(lineas[i++].replace(/^\d+\. /, ""));
        salida.push("<ol>" + items.map((x) => "<li>" + enLinea(x) + "</li>").join("") + "</ol>");
        continue;
      }

      // Párrafo: agrupa líneas contiguas que no abren otro bloque
      const parr = [l];
      i++;
      while (i < lineas.length && lineas[i].trim() && !/^(- |\d+\. |>|\||#### |---)/.test(lineas[i])) {
        parr.push(lineas[i++]);
      }
      salida.push("<p>" + enLinea(parr.join(" ")) + "</p>");
    }
    return salida.join("\n");
  }

  G.md = { render };
})();

</script>
  <script>
/* Ventana · almacenamiento
   Todo se guarda LOCALMENTE (localStorage) bajo el prefijo "ventana:v1:".
   Nada sale del dispositivo: sin red, sin analítica, sin cuentas.
   Si localStorage no está disponible (modo privado estricto, sandbox),
   degrada a memoria: la app funciona, pero sin persistencia. */
(function () {
  const G = (window.Guia = window.Guia || {});
  const PREFIJO = "ventana:v1:";
  const memoria = new Map();
  let persistente = true;

  try {
    const k = PREFIJO + "__test";
    localStorage.setItem(k, "1");
    localStorage.removeItem(k);
  } catch (e) { persistente = false; }

  function leer(clave, porDefecto = null) {
    try {
      const crudo = persistente ? localStorage.getItem(PREFIJO + clave) : memoria.get(clave);
      return crudo == null ? porDefecto : JSON.parse(crudo);
    } catch (e) { return porDefecto; }
  }

  function guardar(clave, valor) {
    try {
      const crudo = JSON.stringify(valor);
      if (persistente) localStorage.setItem(PREFIJO + clave, crudo);
      else memoria.set(clave, crudo);
      return true;
    } catch (e) { return false; }
  }

  function borrar(clave) {
    if (persistente) localStorage.removeItem(PREFIJO + clave);
    else memoria.delete(clave);
  }

  function claves() {
    if (!persistente) return [...memoria.keys()];
    const r = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(PREFIJO)) r.push(k.slice(PREFIJO.length));
    }
    return r;
  }

  /** Exporta todos los datos del usuario como objeto plano. */
  function exportar() {
    const datos = {};
    for (const k of claves()) datos[k] = leer(k);
    return { app: "ventana", version: 1, exportado: new Date().toISOString(), datos };
  }

  /** Importa un volcado previo (reemplaza claves coincidentes). */
  function importar(volcado) {
    if (!volcado || volcado.app !== "ventana" || !volcado.datos) {
      throw new Error("El archivo no parece una copia de Ventana.");
    }
    for (const [k, v] of Object.entries(volcado.datos)) guardar(k, v);
  }

  function borrarTodo() {
    for (const k of claves()) borrar(k);
  }

  G.storage = { leer, guardar, borrar, claves, exportar, importar, borrarTodo, esPersistente: () => persistente };
})();

</script>
  <script>
/* Ventana · enrutador por hash
   Rutas exactas ("#/inicio") registradas en un mapa. Compatible con file://. */
(function () {
  const G = (window.Guia = window.Guia || {});
  const rutas = new Map();
  let porDefecto = "#/inicio";

  function registrar(hash, render) { rutas.set(hash, render); }

  function actual() { return location.hash || porDefecto; }

  function navegar(hash) {
    if (location.hash === hash) resolver();
    else location.hash = hash;
  }

  function resolver() {
    const vista = document.getElementById("vista");
    const hash = actual();
    const render = rutas.get(hash) || rutas.get(porDefecto);
    G.dom.montar(vista);              // limpia
    render(vista, hash);              // pinta
    marcarNavActiva(hash);
    vista.focus({ preventScroll: true });
    window.scrollTo({ top: 0 });
    document.getElementById("lateral").classList.remove("abierto");
    const capa = document.getElementById("capaNav");
    if (capa) capa.hidden = true;
  }

  function marcarNavActiva(hash) {
    document.querySelectorAll(".lateral a").forEach((a) => {
      if (a.getAttribute("href") === hash) a.setAttribute("aria-current", "page");
      else a.removeAttribute("aria-current");
    });
  }

  function iniciar(hashInicial) {
    if (hashInicial) porDefecto = hashInicial;
    window.addEventListener("hashchange", resolver);
    resolver();
  }

  G.router = { registrar, navegar, iniciar, actual };
})();

</script>

   Cada libro: { num, id, titulo, resumen, secciones: [{ titulo, md }] }.

  {

    resumen: "Cómo funciona el mecanismo que te secuestra: las dos vías, la ventana de tolerancia, la cadena del impulso y los mitos que estorban.",
    secciones: [
      { titulo: "1.1 Qué es exactamente una emoción", md: `
Una emoción no es una cosa: es un paquete de **cuatro componentes** que se disparan juntos.

1. **Sensación corporal:** calor, presión, tensión, vacío. El cuerpo siempre participa.
2. **Interpretación:** el significado que le das a lo que pasó ("me está ignorando", "no le importo").
3. **Impulso de acción:** cada emoción empuja hacia algo. La rabia empuja a atacar o castigar; el miedo, a huir o controlar; la tristeza, a retirarse; la vergüenza, a esconderse.
4. **Expresión:** lo que finalmente haces o dices.

Esto importa porque **puedes intervenir en cada componente por separado**: calmar el cuerpo (Libro 4), revisar la interpretación (Libro 5), surfear el impulso sin obedecerlo (Libro 4) y elegir la expresión (Libro 6). Cuatro puertas de entrada en vez de una.` },

      { titulo: "1.2 Las dos vías: por qué en caliente decides mal", md: `
Conviven en ti dos sistemas. Uno es **rápido**, automático, diseñado para sobrevivir: detecta amenaza y dispara en milisegundos, sin pedir permiso. El otro es **lento**, reflexivo: analiza, matiza, calcula consecuencias. Cuando algo te duele fuerte, el rápido toma el mando antes de que el lento alcance a opinar. Eso es el **secuestro emocional**, y tiene tres síntomas que conviene saberse de memoria:

- **Visión de túnel:** solo existe el detalle que hirió; desaparece el contexto y la historia con esa persona.
- **Certeza falsa:** tu interpretación se siente verdad absoluta. La certeza en caliente se siente idéntica a tener razón.
- **Urgencia fabricada:** sientes que hay que actuar YA. Casi nunca es cierto: la urgencia la fabrica la activación, no la realidad.

Dos conclusiones prácticas que fundamentan todo lo demás:

1. **La fuerza de voluntad en caliente no sirve.** Nadie "piensa mejor" en medio del secuestro. Lo que funciona es un método preparado en frío que se ejecuta casi solo.
2. **El pico pasa solo.** La activación tarda 20–30 minutos en bajar *si no la realimentas* con pensamientos que echan leña. Tu único trabajo durante el pico es sobrevivirlo sin actuar.

**El periodo refractario.** Mientras dura la activación, tu mente filtra la realidad para confirmar la emoción: solo ves pruebas de que tenías razón en enojarte. Por eso las decisiones y conclusiones de ese rato casi siempre están contaminadas. Regla: lo que concluyas en el pico se revisa en frío antes de darlo por válido.` },

      { titulo: "1.3 La ventana de tolerancia", md: `
Imagina una franja dentro de la cual puedes sentir **y** pensar a la vez: emocionado pero lúcido. Eso es tu ventana de tolerancia — la que da nombre a esta app. Por encima de ella estás en hiperactivación (el secuestro: urgencia, ataque, mensaje bomba); muy por debajo, en apagado (desconectar, "me da igual", frialdad).

Tres cosas útiles del modelo:

- Las herramientas en caliente (Libro 4) sirven para **volver a la ventana**, no para dejar de sentir.
- La ventana **se ensancha con entrenamiento**: sueño, ejercicio, práctica de atención y exposición gradual al malestar la agrandan; el alcohol, la deuda de sueño y el estrés crónico la encogen.
- Cada persona sale de la ventana por su lado favorito. El que no grita ni pega suele salir por arriba *hacia adentro* (mente acelerada, mensaje hiriente, decisión drástica) o disfrazar la salida de calma helada. **La frialdad castigadora también es estar fuera de la ventana.**` },

      { titulo: "1.4 La cadena del impulso, eslabón por eslabón", md: `
Todo episodio sigue esta secuencia. Cada eslabón es un punto de corte, y **cuanto más temprano cortes, más barato es**:

**Terreno** (dormiste mal, día cargado) → **Disparador** (algo pasa) → **Interpretación** ("no le importo") → **Emoción primaria** (dolido, desestimado) → **Emoción tapa** (rabia, urgencia) → **Impulso** (ganas de soltar la frase, mandar el mensaje, cortar) → **Ventana de decisión** (segundos donde aún eliges) → **Acción** → **Alivio de diez segundos** → **Costo real** → **Vergüenza** → terreno peor para la próxima.

Puntos de corte por eslabón: el terreno se cuida en frío (5.3); el disparador a veces se puede prever (3.2); la interpretación se desarma con las técnicas de 5.5–5.6; la emoción se nombra (3.4); el impulso se surfea (4.5); la ventana de decisión es donde entran la frase de salida y la descarga (Libro 4); y si la acción ya ocurrió, queda el control de daños (6.7) y la reparación (6.5).` },

      { titulo: "1.5 Emociones primarias, tapas y meta-emociones", md: `
**La primaria** es el dolor original: rechazado, invisible, insuficiente, traicionado. **La tapa** es la emoción rápida y dura que la protege, casi siempre rabia o urgencia. La tapa empuja a atacar; la primaria, si la escuchas, te dice qué necesitas. Pregunta llave, para usar mil veces: **"¿y debajo de esto, qué me dolió exactamente?"**

Existen además **meta-emociones**: emociones sobre tus emociones. Rabia por sentir celos ("no debería ser celoso"), vergüenza por haberte enojado, ansiedad por notar que te estás activando. Las meta-emociones duplican la carga: ya no manejas una emoción sino dos. El antídoto es el permiso: *sentir* cualquier cosa es legítimo y no se juzga; lo que se entrena es la *acción*. "Ok, hay celos. Sentirlos no es el problema; veamos qué hago con ellos."` },

      { titulo: "1.6 Mitos que estorban", md: `
**"Hay que desahogarse".** Descargar la rabia *contra* algo (despotricar largo, escribir para machacar al otro, revivir la escena una y otra vez) no vacía el tanque: lo entrena. Ensayar la rabia la fortalece. Lo que sí ayuda es descargar la *energía física* (caminar, respirar) y procesar en frío con método (autopsia, 5.4).

**"Contenerse es reprimir y hace daño".** Reprimir es negar lo que sientes. Regular es sentirlo entero, nombrarlo y elegir qué hacer. Son opuestos: la regulación empieza precisamente por admitir la emoción completa.

**"Decir todo lo que siento en el momento es ser auténtico".** La versión de ti que habla en pleno secuestro no es la más auténtica: es la más asustada y con visión de túnel. Autenticidad es que lo que digas represente lo que de verdad piensas y quieres, y eso casi nunca es la primera descarga.

**"El tiempo lo cura solo".** El tiempo baja la activación, pero sin procesamiento el patrón queda intacto y las heridas de relación se enquistan. El tiempo más autopsia y reparación, sí.

**"Yo soy así".** El estilo emocional intenso probablemente te acompañe siempre, y no es malo: la gente intensa también ama, crea y se entrega intenso. Lo que sí cambia con entrenamiento —y está sobradamente demostrado— es la **respuesta**: qué haces entre el impulso y la acción.` }

**Señala:** una pérdida (real o simbólica: una expectativa, una imagen de futuro). **Empuja a:** retirarse, bajar el ritmo. **Necesita:** espacio para procesar, y compañía sin arreglos. **Qué hacer:** dejarla estar sin taparla con rabia ni con actividad frenética. En hombres especialmente, mucha rabia es tristeza sin permiso. Llorar regula; no es derrota. **Se vuelve problema cuando:** dura semanas ocupándolo todo, o cuando jamás se permite y sale siempre convertida en otra cosa.` },

      { titulo: "2.4 Vergüenza", md: `
**Señala:** sensación de estar mal *tú* como persona (a diferencia de la culpa, que señala una *acción* mala). **Empuja a:** esconderte, o atacar para taparla. **Necesita:** ser nombrada y expuesta a la luz con alguien seguro; la vergüenza crece en secreto y se encoge al contarse. **Qué hacer:** convertirla en culpa siempre que se pueda ("hice algo dañino" en vez de "soy un desastre"), porque la acción se repara y la identidad no. Ojo: la vergüenza post-episodio sube tu activación de fondo y te deja más propenso al siguiente estallido; machacarte no es disciplina, es gasolina. **Se vuelve problema cuando:** cada error se convierte en juicio sobre tu valor total. La herramienta *Autocompasión* trae los dos guiones de emergencia para este exacto momento.` },

      { titulo: "2.5 Culpa", md: `
**Señala:** hiciste algo contra tus propios valores. **Empuja a:** reparar (su función es buena). **Necesita:** reparación concreta (6.5) y luego cierre. **Qué hacer:** usarla como combustible de reparación y cambio, no de autocastigo en bucle. Culpa que ya reparó y sigue doliendo en bucle es rumiación, y se trata como tal (5.7). **Se vuelve problema cuando:** te la generan para manejarte, o cuando la sientes por poner límites legítimos.` },

      { titulo: "2.6 Celos", md: `
**Señalan:** miedo a perder algo valioso frente a un tercero, mezclado casi siempre con inseguridad propia ("no soy suficiente"). **Empujan a:** vigilar, controlar, reprochar, poner a prueba. **Necesitan:** confirmación del vínculo pedida de frente, y trabajo con la inseguridad de fondo. **Qué hacer:** separar el dato de la película (¿qué pasó de verdad vs. qué historia armé?); pedir lo que necesitas sin acusar ("últimamente me siento inseguro de nosotros, necesito que hablemos") en vez de actuar el control. El control produce exactamente la distancia que temes. **Se vuelven problema cuando:** dirigen tu conducta (revisar, interrogar, prohibir) o aparecen sin ningún dato real.` },

      { titulo: "2.7 Frustración e impotencia", md: `
**Señalan:** un objetivo bloqueado; la realidad no coopera con tu plan. **Empujan a:** forzar, insistir con más fuerza, o mandarlo todo al diablo (la decisión drástica es su firma). **Necesitan:** separar lo controlable de lo que no lo es. **Qué hacer:** la pregunta de la serenidad práctica: "¿qué parte de esto depende de mí?" — a esa parte, acción; al resto, aceptación activa (que no es rendirse: es dejar de gastar pólvora en lo incontrolable). **Se vuelven problema cuando:** cada obstáculo menor dispara la demolición total ("entonces nada", "olvídalo todo").` },

      { titulo: "2.8 Decepción", md: `
**Señala:** la brecha entre lo que esperabas y lo que pasó. **Empuja a:** reprochar o retirarse en silencio. **Necesita:** revisar la expectativa (¿era realista?, ¿la comuniqué o esperaba que adivinara?) y expresarla limpia. **Qué hacer:** mucha decepción crónica viene de expectativas jamás dichas en voz alta. Antes de cobrar una decepción, verifica si el otro sabía lo que esperabas. **Se vuelve problema cuando:** vives cobrando exámenes que el otro no sabía que estaba dando.` },

      { titulo: "2.9 Euforia y entusiasmo (sí, también se regulan)", md: `
La impulsividad no solo va en negativo: en subidón se prometen cosas, se compra, se escriben declaraciones, se toman decisiones grandes con la misma certeza falsa del enojo. **Regla:** las decisiones grandes tampoco se toman en el pico de arriba. Las 24 horas aplican igual.` }
    ]
  },

  {
    num: 3, id: "libro-3", titulo: "Tu mapa personal",
    resumen: "Nadie explota por todo: cada persona tiene 2 o 3 fibras. Este libro construye tu mapa; lo que descubras se anota en Mi cuaderno.",
    secciones: [
      { titulo: "3.1 Las fibras tienen historia", md: `
Tus disparadores no son aleatorios: suelen conectar con experiencias donde aprendiste que ciertas cosas duelen especialmente (sentirte no elegido, no escuchado, injustamente tratado). No hace falta psicoanalizarse para avanzar, pero sí ayuda saber esto: cuando un disparador te activa fuera de toda proporción, **no estás respondiendo solo a lo de hoy, sino a toda la pila de veces anteriores.** Reconocerlo baja la culpa hacia el otro ("no me hizo tanto; tocó una pila vieja") y explica la intensidad sin justificar el daño. Entender el origen fino de las fibras es trabajo ideal para terapia.` },

      { titulo: "3.2 Inventario de disparadores", md: `
Repasa tus últimos 5–6 episodios y marca qué los encendió:

- **Atención y presencia:** que te dejen en visto; que miren el teléfono mientras hablas; que cancelen planes; sentirte plato de segunda mesa.
- **Valoración:** que desestimen algo importante para ti; que se rían de lo que te importa; que no reconozcan tu esfuerzo; comparaciones.
- **Justicia:** acusaciones falsas; doble vara; que te corrijan en público; promesas incumplidas.
- **Vínculo:** frialdad o distancia repentina; celos; sentirte excluido de decisiones o planes; silencios largos.
- **Autonomía:** que te controlen, presionen o exijan sin salida; que decidan por ti; invasión de tu espacio o tiempo.

**Ejercicio:** identifica tus 2–3 dominantes, anótalos en *Mi cuaderno*, y trátalos desde hoy como zonas de precaución: cuando estés en territorio de tu disparador, el semáforo se revisa el doble.` },

      { titulo: "3.3 Semáforo corporal con escala", md: `
El cuerpo avisa antes que la mente. Señales típicas: calor en cara o pecho, mandíbula y puños apretados, respiración corta, corazón acelerado, nudo en el estómago, pensamientos en bucle acelerado y —la señal reina— **urgencia de responder ya**.

Ponle números (los usarás en toda la app):

- **0–3 · Verde:** tranquilo. Se puede conversar cualquier cosa.
- **4–6 · Amarillo:** señales presentes, todavía piensas claro, la ventana se cierra. **Aquí se gana o se pierde.**
- **7–10 · Rojo:** secuestro. No se decide nada; solo se ejecuta protocolo.

**Ejercicio de dos semanas:** tres veces al día (mañana, tarde, noche), pregúntate "¿en qué número estoy?" y regístralo en el *Check-in*. No hay que hacer nada más: solo calibrar el termómetro. Sin termómetro calibrado, ninguna herramienta llega a tiempo.` },

      { titulo: "3.4 Vocabulario emocional completo", md: `
Nombrar con precisión regula: activa la parte del cerebro que piensa y baja la que reacciona. Palabras vagas ("me molesté", "me sentí mal") no regulan nada. Las familias completas:

- **Rechazo y abandono:** rechazado · abandonado · excluido · dejado de lado · no elegido · reemplazado
- **Menosprecio:** ignorado · invisible · desvalorizado · desestimado · no tomado en serio · humillado · usado
- **Injusticia:** tratado injustamente · acusado en falso · indignado
- **Miedo y amenaza:** miedo a perder · inseguro · celoso · en alerta · ansioso
- **Vergüenza:** avergonzado · expuesto · juzgado · insuficiente
- **Traición y decepción:** traicionado · engañado · decepcionado
- **Impotencia:** frustrado · impotente · no escuchado · incomprendido
- **Presión:** saturado · sobrepasado · acorralado · invadido · controlado

Pueden venir en combo ("celoso + insuficiente", "no escuchado + desestimado"): nombra los dos. Y recuerda la pregunta llave para levantar la tapa de la rabia: *¿y debajo, qué me dolió exactamente?*` },

      { titulo: "3.5 Tus movimientos impulsivos típicos", md: `
La impulsividad sin gritos toma estas formas. Marca las tuyas:

- **La frase espejo:** decir algo hiriente para que el otro sienta lo que sientes tú.
- **El ultimátum** que no querías cumplir ("si haces eso, olvídate de mí").
- **La retirada castigo:** "haz lo que quieras", silencio helado, irte sin decir nada.
- **La decisión drástica:** cortar, bloquear, borrar, renunciar, deshacer.
- **El mensaje bomba:** el texto largo escrito y enviado en pleno pico.
- **El sarcasmo con filo** y las indirectas.
- **Desaparecer** días sin explicación.
- **La demolición:** ante un problema parcial, tirar todo ("entonces nada, cancelemos todo").

Cuando el movimiento tiene nombre lo ves venir: "esto que quiero hacer ahora es mi retirada castigo". Nombrarlo en el momento ya es medio freno.` },

      { titulo: "3.6 La necesidad debajo (tabla ampliada)", md: `
| Si te sientes... | Necesitas... | Vía directa (pedirlo) | Vía destructiva (actuarlo) |
| --- | --- | --- | --- |
| Ignorado | Atención | "Necesito que hablemos hoy" | Castigar con indiferencia |
| No escuchado | Comprensión | "¿Me dices qué entendiste?" | Repetir cada vez más hiriente |
| Desestimado | Valoración | "Esto me importa aunque parezca menor" | Sarcasmo, desprecio espejo |
| Inseguro / celoso | Confirmación | "Necesito saber dónde estamos" | Controlar, revisar, poner a prueba |
| Acorralado | Espacio | "Dame tiempo para pensarlo" | Explotar o desaparecer |
| Injustamente tratado | Ser oído | "Escucha mi versión antes de concluir" | Contraataque con lista de agravios |
| No elegido | Prioridad | "Me gustaría que esto lo decidiéramos juntos" | Ultimátum |
| Decepcionado | Expectativas claras | "Yo esperaba X; ¿lo vemos?" | Cobrar en frío exámenes no avisados |

El movimiento maestro de toda la guía: **detectar la emoción → encontrar la necesidad → pedirla con palabras en vez de actuarla con daño.**` },

      { titulo: "3.7 Autoevaluación inicial (tu línea de base)", md: `
En la herramienta *Autoevaluación* puntúas de 0 (nunca) a 4 (casi siempre) diez frases sobre tu manejo actual. Hazla hoy y repítela al final del programa de 90 días: no importa el número de hoy; importa la diferencia en 90 días. La app guarda el historial y te muestra la evolución.` }
    ]
  },

  {
    num: 4, id: "libro-4", titulo: "Caja de herramientas en caliente",
    resumen: "Qué usar según tu número: respiración, cuerpo, atención, mente y palabra. El protocolo integrado y los errores que convierten la pausa en daño.",
    secciones: [
      { titulo: "4.1 Qué usar según el nivel", md: `
Regla de oro de este libro: **la herramienta se elige según tu número.** Intentar razonar en 8/10 es inútil; hacer respiración profunda estando en 3/10 es innecesario. Primero el número, después la herramienta.

- **4–6 (amarillo):** frase de salida + preguntas ancla + revisión rápida de interpretación. Aquí todavía funciona la mente.
- **7–8 (rojo):** frase de salida corta + descarga física. La mente ya no coopera: todo va al cuerpo.
- **9–10 (secuestro total):** solo cuerpo y distancia. Frío, caminar, respirar. Ninguna palabra importante, ningún teléfono en la mano.

En el momento, si no recuerdas nada de esto: botón **SOS** arriba a la derecha. Te lleva de la mano.` },

      { titulo: "4.2 Respiración (la palanca más rápida)", md: `
- **Suspiro fisiológico** (el más eficaz para bajar rápido): doble inhalación por la nariz —una profunda y, encima, un segundo sorbo corto— y exhalación larga y lenta por la boca. Repite 5–10 veces.
- **Exhalación alargada:** inhala en 4 tiempos, exhala en 8. La exhalación larga es la que frena el sistema de alarma. Cinco minutos.
- **Respiración cuadrada** (para antes de conversaciones difíciles): inhala 4 – sostén 4 – exhala 4 – sostén 4. Cuatro ciclos.

Las tres están guiadas con animación en la herramienta *Respiración*.` },

      { titulo: "4.3 Cuerpo", md: `
- **Caminar rápido** 10–15 minutos, mejor afuera. La activación es energía de movimiento: dale movimiento.
- **Frío:** agua fría en cara y muñecas, o sostener algo helado. El frío en la cara frena la activación por reflejo directo.
- **Tensión y suelta:** aprieta puños, hombros y mandíbula 5 segundos, suelta de golpe. Tres rondas. (Versión completa: recorre pies → piernas → abdomen → manos → hombros → cara, tensando y soltando cada zona.)
- **Movimiento rítmico bilateral:** caminar marcando el paso, alternar golpecitos suaves en los muslos izquierda-derecha. El ritmo alternado calma.` },

      { titulo: "4.4 Atención (para cortar el bucle mental)", md: `
- **5-4-3-2-1:** nombra 5 cosas que ves, 4 que oyes, 3 que puedes tocar, 2 que hueles, 1 que saboreas. Saca la atención de la película y la trae al presente.
- **Cuenta regresiva con carga:** de 100 hacia atrás de 7 en 7. Ocupa el canal mental que la rumiación necesita.
- **Descripción neutra:** describe tu entorno como notario, sin adjetivos ("mesa de madera, tres sillas, luz blanca..."). Un minuto.` },

      { titulo: "4.5 Mente (las cuatro maniobras)", md: `
- **STOP:** **S**top (congela: no hables, no escribas) · **T**oma un paso atrás (físico o mental) · **O**bserva (¿qué número soy?, ¿qué siento?, ¿qué quiere hacer mi impulso?) · **P**rocede con intención (elige el siguiente paso, que casi siempre es la frase de salida + descarga).
- **Surfear el impulso:** el impulso funciona en olas: sube, hace pico y baja solo en minutos *si no lo obedeces ni lo peleas*. Obsérvalo como una ola: "ahí está, subiendo... debe andar por 8... ya baja". Cada ola surfeada sin actuar debilita el patrón; cada una obedecida lo entrena. Estás jubilando un hábito a base de olas surfeadas.
- **Acción opuesta:** cuando el impulso empuja fuerte hacia algo destructivo, haz deliberadamente lo contrario suave. ¿Empuja a atacar? Baja la voz y suaviza la cara. ¿Empuja a desaparecer? Di "necesito pausa, vuelvo a las 8". ¿Empuja a mandar el mensaje? Suelta el teléfono en otra habitación. No es reprimir: es no dejar que el impulso maneje el volante.
- **Defusión (despegarte del pensamiento):** en vez de "no le importo", di mentalmente "estoy teniendo el pensamiento de que no le importo". Suena mínimo; el efecto es real: convierte el pensamiento de verdad-absoluta en evento mental observable. Funciona también con la certeza falsa: "estoy teniendo la certeza de que lo hizo a propósito".
- **Distancia por nombre (tercera persona):** háblate por tu nombre o en segunda persona: "¿qué le conviene hacer a [tu nombre] ahora?" en vez de "¿qué hago?". Crea distancia psicológica instantánea y casi sin esfuerzo — de las técnicas con mejor respaldo experimental que existen. Combínala con el test del amigo: aconséjate como aconsejarías a otro.` },

      { titulo: "4.6 Palabra", md: `
- **Frases de salida** (dicen tres cosas: me importa + pausa + vuelvo). La colección completa, filtrable por contexto y con botón de copiar, está en la herramienta *Frases*. Elige 2–3, reescríbelas en tus palabras en *Mi cuaderno* y ensáyalas en voz alta: en caliente solo sale lo sobreaprendido.
- **Frases ancla internas:** "Esto es el pico; pasa solo." · "¿Me acerca o me aleja?" · "Sentirlo sí, actuarlo no." · "En 30 minutos esto se ve distinto." · "No decido nada en caliente."` },

      { titulo: "4.7 El protocolo integrado", md: `
1. **Detecta** el número (la señal corporal avisó).
2. **Di la frase** de salida. Decirla ya es ganar: interrumpe la secuencia automática.
3. **Descarga** 20–30 minutos: caminar / respirar / frío / escribir sin filtro en una nota que nadie leerá (se borra, jamás se envía). **Sin rumiar:** si aparece el bucle "cómo se atreve...", vuelve al cuerpo (4.4). El pico solo baja si no le echas leña.
4. **Pregunta ancla** antes de actuar: "¿esto me acerca o me aleja de lo que quiero?" Si la respuesta es "me aleja pero me aliviaría", es el impulso hablando.
5. **Vuelve** cuando dijiste. Agradece la espera y retoma con la fórmula del Libro 6.` },

      { titulo: "4.8 Protocolos express", md: `
- **30 segundos** (te soltaron algo en plena reunión o cena): un suspiro fisiológico + frase interna ("es el pico, pasa") + si hace falta hablar, una frase neutra corta ("déjame pensarlo y te digo").
- **5 minutos** (baño, ir por agua): 10 suspiros fisiológicos + agua fría en muñecas + pregunta ancla.
- **30 minutos** (episodio fuerte): protocolo completo de 4.7 — o directamente el botón SOS.` },

      { titulo: "4.9 Sobrevivir el pico: distracción con criterio y tu kit", md: `
Cuando el pico es 9–10 y no puedes resolver nada YA, distraerse **con criterio** es legítimo: es un puente para pasar el pico, no evitación crónica. El menú (ACCEPTS, de la TDC): una **A**ctividad que absorba · **C**ontribuir (ayudar a alguien) · generar otra **E**moción (una comedia, música que te mueva) · a**P**artar el problema un rato a propósito · ocupar los pensamien**T**os (contar de 7 en 7, recitar) · una **S**ensación fuerte (hielo en la mano, ducha, sabor intenso).

Y prepara en frío tu **kit de los 5 sentidos** (autoconsuelo, TDC): una vista (foto, lugar), un sonido (playlist de emergencia), un olor (café, una colonia), un sabor (té, algo lento), un tacto (manta, mascota, ducha caliente). En crisis no se improvisa: se abre el kit. Guárdalo en *Mi cuaderno*.` },

      { titulo: "4.10 El arsenal por nivel de evidencia (honestidad de domador)", md: `
Un experto sabe qué tan probada está cada arma. Resumen honesto:

- **Evidencia alta:** suspiro fisiológico (ensayo controlado, Stanford 2023) · etiquetar la emoción con precisión (neuroimagen: nombrar baja la amígdala) · hablarte en tercera persona (Kross) · reevaluación cognitiva / mirada alternativa (la más estudiada; OJO: pierde fuerza por encima de ~8/10 — por eso el orden es cuerpo primero) · exhalación más larga que la inhalación (mecanismo vagal) · practicar en frío.
- **Evidencia media:** frío en la cara (mecanismo alto, uso clínico medio) · 4-7-8 · respiración cuadrada · STOP · surfear el impulso · acción opuesta (mejor para tristeza y vergüenza) · 5-4-3-2-1 · defusión · pausa de autocompasión · relajación muscular · zumbido vagal · escritura expresiva.
- **Evidencia baja o anecdótica (riesgo cero, útil si a TI te sirve):** sacudida somática y caídas de talón · pendulación · abrazo de mariposa · RAIN como paquete. El tapping (EFT) muestra efectos en estudios pero con debate serio sobre si el golpeteo añade algo a la exposición + reencuadre que ya contiene; no lo incluimos como herramienta.

Regla de oro del compendio: **si una técnica no te mueve nada tras 1–2 semanas de práctica en frío, cámbiala.** Hay muchas; la mejor es la que tú usas.` },

      { titulo: "4.11 Errores que convierten la pausa en daño", md: `
Usar la frase de salida con tono helado (eso es retirada castigo con disfraz). Rumiar durante la pausa. Volver antes de tiempo con el cuerpo encendido. No volver nunca. Usar "necesito espacio" como forma elegante de desaparecer. La pausa protege la conversación; el castigo la cierra. La diferencia siempre está en el tono al irte y en si cumples la vuelta.` }
    ]
  },

  {
    num: 5, id: "libro-5", titulo: "Trabajo en frío",
    resumen: "Donde de verdad se construye el cambio: reglas, planes si-entonces, terreno, autopsias, distorsiones, rumiación y tolerancia al malestar.",
    secciones: [
      { titulo: "5.1 Tus reglas personales", md: `
Se pactan contigo mismo en lúcido; en caliente solo se obedecen. Las básicas:

1. **Ningún mensaje importante en caliente.** Se escribe, se guarda en borrador, se relee a las horas. Casi siempre lo reescribes: eso te dice todo.
2. **Ninguna decisión grande sin 24 horas** (cortar, bloquear, renunciar, prometer). Si mañana sigue pareciendo buena idea, se hace mañana. Esperar no cuesta nada; no esperar te ha costado mucho.
3. **Nada de conversaciones difíciles** con alcohol, sin dormir o con hambre.
4. **Temas delicados en persona o por llamada,** nunca por chat si se puede evitar.
5. **En territorio de mis disparadores, doble chequeo del semáforo.**

Agrega las tuyas en *Mi cuaderno* conforme las autopsias te muestren dónde se te escapa.` },

      { titulo: "5.2 Planes si-entonces y ensayo mental", md: `
El formato que mejor automatiza una respuesta nueva: *"Si pasa [señal o situación], entonces hago [acción concreta]."*

Ejemplos: "Si noto calor en el pecho y urgencia de responder, entonces digo mi frase y salgo a caminar." · "Si me dejan en visto y empiezo a rumiar, entonces suelto el teléfono en otra habitación 30 minutos." · "Si en una discusión quiero soltar una frase espejo, entonces respiro largo y digo 'pausa, vuelvo en 20'."

**Ensayo mental (así se hace bien):** una vez al día, dos minutos. Cierra los ojos, imagina la escena disparadora *con detalle incómodo* —el visto, el tono, el calor subiendo, la urgencia— y visualízate ejecutando el plan completo: notas la señal, dices la frase, sales, respiras, vuelves. Repetido, el cerebro va tratando la escena como ya practicada, y en la vida real el plan se dispara casi solo. Los pilotos entrenan emergencias en simulador; esto es tu simulador.` },

      { titulo: "5.3 El terreno", md: `
Tu umbral no es fijo: sube y baja con el estado del cuerpo. No es consejo genérico de bienestar; es mantenimiento directo de tu capacidad de regularte.

- **Sueño:** la falta de sueño es el mayor reductor de ventana que existe. Con deuda de sueño, explota cualquiera. Si notas racha de episodios, lo primero que se revisa es esto.
- **Alcohol:** desinhibe justo el freno que estás entrenando, y deja resaca emocional (día siguiente más irritable). Regla mínima: cero conversaciones difíciles con alcohol encima.
- **Cafeína:** en exceso imita la activación (corazón rápido, inquietud) y te acerca al amarillo de base.
- **Comida:** hambre = irritabilidad química. No es metáfora.
- **Ejercicio regular:** válvula de descarga y ensanchador de ventana. Tres veces por semana cambia el terreno de fondo.
- **Carga acumulada:** en semanas de estrés alto, avisa a los tuyos ("estoy en semana difícil, ténme paciencia") y sube la vigilancia. Saber que estás en terreno frágil ya reduce episodios.

**El chequeo HALT.** Antes de tomarte en serio una emoción intensa o meterte a resolver un problema emocional complejo, revisa cuatro básicos: ¿tengo **H**ambre? ¿vengo **A**rrastrando enojo de otra cosa? ¿estoy **L**onely (solo, sin contacto real hace días)? ¿estoy **T**an cansado que todo pesa doble? Si algo de eso está en rojo, atiéndelo primero: media hora de comida, sueño o contacto humano estabiliza más que una hora de análisis.` },

      { titulo: "5.4 La autopsia de episodios (con ejemplo resuelto)", md: `
Va a volver a pasar mientras aprendes; cada episodio es oro **si lo procesas**. A las horas, en frío, diez minutos con la herramienta *Autopsia*. Hazla como investigador, no como juez. Ejemplo resuelto:

> **¿Qué pasó justo antes?** Le escribí a las 19:00 sobre el plan del sábado. A las 22:30, visto sin respuesta, pero la vi conectada.
> **¿Qué me dije?** "Le da igual. Para responderle a otros sí tiene tiempo. Siempre soy el último."
> **¿Qué sentí y dónde?** Desestimado y no elegido. Calor en el pecho, mandíbula tensa, mente en bucle. Un 7.
> **¿Debajo de la rabia?** Miedo a no importarle de verdad.
> **¿Qué impulso?** Mensaje bomba + retirada castigo ("sabes qué, olvida el sábado").
> **¿Qué hice?** Lo mandé.
> **¿Alivio / costo?** Alivio: 10 segundos de sentir que "me hice respetar". Costo: ella estaba en cena familiar con el teléfono en la mesa; discusión de dos días; yo pidiendo perdón desde el hoyo.
> **¿Dónde pude cortar antes?** En la interpretación: "visto + conectada" tenía tres explicaciones alternativas que ni consideré. Y en el impulso: la regla del borrador existía y la salté.
> **¿Qué pruebo la próxima vez?** Si-entonces: "Si veo visto sin respuesta y empiezo el bucle, entonces teléfono a otra habitación 45 minutos, y cualquier mensaje se escribe en nota, no en el chat."

Con cinco o seis de estas conoces tu patrón mejor que nadie, y el punto de corte se adelanta solo.` },

      { titulo: "5.5 Catálogo de distorsiones (los atajos que encienden el fuego)", md: `
Entre lo que pasa y lo que sientes está **lo que te dices sobre lo que pasó**. No duele el visto: duele "no le importo". La mente en caliente usa atajos sistemáticos; conocerlos por nombre permite cazarlos:

1. **Leer la mente:** "lo hizo a propósito", "piensa que soy poca cosa". Contra-pregunta: *¿qué evidencia tengo de su intención, aparte de mi malestar?*
2. **Adivinar el futuro:** "esto se acabó", "me va a dejar". *¿Cuántas veces mis profecías en caliente se cumplieron?*
3. **Catastrofizar:** convertir un dato menor en el fin. *En una escala de problemas de mi vida, ¿dónde queda esto de verdad?*
4. **Todo o nada:** "siempre hace lo mismo", "nunca me toma en cuenta". Los *siempre/nunca* son casi siempre falsos y siempre incendiarios. *¿Cuándo fue la última excepción?*
5. **Sobregeneralizar:** un hecho → una ley universal ("me falló hoy" → "no se puede confiar en nadie").
6. **Personalizar:** todo lo que el otro hace es un mensaje sobre ti. *¿Qué explicaciones tienen que ver con su vida y no conmigo?*
7. **Filtro negativo:** de diez cosas, ves solo la mala. *¿Qué más pasó hoy con esta persona?*
8. **Descartar lo positivo:** "me lo dijo por decir", "lo hizo por compromiso".
9. **Los debería:** "no debería haberme dicho eso", "debería darse cuenta sola". Cada *debería* incumplido se cobra en rabia. *¿Es una regla real acordada, o una expectativa mía jamás dicha?*
10. **Etiquetar:** del hecho a la sentencia ("es una egoísta", "soy un desastre"). Las etiquetas cierran; las descripciones abren.
11. **Razonamiento emocional:** "lo siento tan fuerte que tiene que ser verdad". La intensidad mide tu activación, no la realidad. Es la distorsión madre de la certeza falsa.

Todos tenemos dos o tres de cabecera: identifica las tuyas y anótalas en *Mi cuaderno*.` },

      { titulo: "5.6 Reestructuración: la hoja de cinco columnas", md: `
Para trabajar en frío las interpretaciones calientes:

1. **Situación** (hecho pelado, sin adjetivos): "Visto a las 22:30, sin respuesta."
2. **Pensamiento automático:** "No le importo. Siempre soy el último."
3. **Emoción e intensidad:** desestimado + miedo a perder, 8/10.
4. **Mirada alternativa** (usa: tres explicaciones posibles + test del amigo —*¿qué le diría yo a un amigo en esta situación exacta?*— + caza de distorsiones del 5.5): "Estaba en cena. 'Siempre' es falso: ayer respondió al minuto. Estoy leyendo la mente y razonando desde la emoción."
5. **Re-evalúa la intensidad:** 4/10. No desaparece —no es magia—, pero por debajo del umbral de impulso ya eliges tú.

**Bonus de reencuadre:** la activación también se puede reinterpretar. "Estoy nervioso" y "estoy encendido, el cuerpo se está preparando" son la misma fisiología con dos etiquetas — y la segunda rinde mejor. No es negar: es elegir la lectura útil de un dato ambiguo.

Hazla por escrito las primeras 8–10 veces (sirve el campo de notas de la *Autopsia* o papel); después el proceso corre solo en la cabeza.` },

      { titulo: "5.7 Rumiación: el fuego lento", md: `
Rumiar es masticar el episodio en bucle durante horas o días: reproducir la escena, ensayar respuestas, redactar mentalmente el reclamo. Se disfraza de "estar procesando", pero no procesa: mantiene la activación de fondo y te deja a medio camino del siguiente estallido.

Protocolo anti-rumiación:

1. **Detéctala por nombre:** "esto es rumiación", no "estoy pensando".
2. **La pregunta de acción:** *¿hay algo que pueda hacer AHORA sobre esto?* Si sí → hazlo o agéndalo (escribe el borrador, anota el tema para la conversación). Si no → el pensamiento no tiene trabajo pendiente; es solo bucle.
3. **Cita con la preocupación:** dale un espacio formal ("esto lo pienso hoy 19:00, 15 minutos, con papel") y fuera de esa cita, cada vez que vuelva: "tomado nota, tienes cita a las 19:00" + atención afuera.
4. **Cambia el canal físico:** la rumiación odia la competencia. Ejercicio, ducha, conversación de otra cosa, tarea que exija las manos y la cabeza.` },

      { titulo: "5.8 Entrenar la tolerancia al malestar", md: `
El músculo de fondo es aguantar incomodidad sin descargarla. Se entrena con pesos pequeños y deliberados, en frío: deja un mensaje no urgente sin responder una hora a propósito; cuando algo menor te moleste, nómbralo y calla 10 minutos; en una discusión de baja intensidad, escucha hasta el final antes de responder; ponte en situaciones levemente frustrantes (fila lenta, tráfico) y practica ahí el suspiro fisiológico. Incomodidad elegida en pequeño compra capacidad para la incomodidad grande que no eliges.` },

      { titulo: "5.9 Diez minutos de atención al día", md: `
Una práctica diaria de atención (sentarte 10 minutos a seguir la respiración, y cada vez que la mente se va, notarlo y volver) no es relajación: es el **gimnasio del darse cuenta**. Cada "me fui / vuelvo" es una repetición del músculo exacto que necesitas en amarillo: notar a tiempo lo que está pasando dentro. La gente que practica esto detecta el amarillo antes. Diez minutos, todos los días, aburrido y todo. Es de las inversiones con mejor retorno de toda la guía.` }
    ]
  },

    num: 6, id: "libro-6", titulo: "Comunicación",
    resumen: "Regularte no es callarte: la fórmula, límites a tiempo, qué hacer cuando el otro está en rojo, reparar bien y el terreno digital.",
    secciones: [
      { titulo: "6.1 La fórmula", md: `
**"Cuando pasó [hecho concreto], me sentí [emoción precisa], porque para mí [qué significó]. Te pido [petición concreta]."**

"Cuando cancelaste el plan avisando a última hora, me sentí dejado de lado, porque llevaba días esperándolo. Te pido que si algo cambia me avises apenas lo sepas."

Claves: el hecho, sin adjetivos ni acusación ("cancelaste avisando tarde", no "me hiciste la desconsideración de siempre"). La emoción, en primera persona ("me sentí desestimado" abre; "me ignoraste" ataca). La petición, concreta y hacia adelante, no reproche hacia atrás.` },

      { titulo: "6.2 Cómo se abre una conversación difícil", md: `
**Los primeros treinta segundos predicen el final.** Una conversación que abre con reproche ("tenemos que hablar de lo egoísta que fuiste") termina en defensa y contraataque, haga lo que se haga después. Apertura suave: momento adecuado (los dos en verde, sin público, sin prisa) + anuncio del tema sin sentencia ("quiero hablarte de algo que me dolió el sábado; no es un juicio, quiero que lo entendamos") + fórmula del 6.1. Prepárala por escrito si hace falta: apertura ensayada no es falsedad, es puntería.

Y antes de entrar, una pregunta: **¿qué quiero que pase al final de esta conversación?** Si la respuesta honesta es "que se sienta mal", no estás listo: eso es el impulso pidiendo turno. Vuelve al Libro 4.` },

      { titulo: "6.3 Pedir, límites y decir no", md: `
- **Pedir en vez de reprochar:** el reproche es una necesidad disfrazada de acusación, y produce defensa, no cambio. "Nunca me tomas en cuenta" → "me gustaría que me preguntaras antes de decidir esto". Mismo fondo, resultado opuesto.
- **Límites a tiempo:** un límite sano se pone temprano, en verde, con voz tranquila: "prefiero que no me hables en ese tono; así no puedo conversar". El patrón a romper: aguantar callado cuatro veces y estallar a la quinta por algo menor. No explotaste "por nada": cobraste todo junto. Los límites a tiempo son el antídoto de las explosiones diferidas.
- **Decir no sin novela:** "no puedo con eso esta semana" es una frase completa. El no tardío y resentido cuesta más que el no claro y temprano.` },

      { titulo: "6.4 Cuando el otro está en rojo", md: `
Su activación invita a la tuya: dos personas fuera de la ventana no resuelven nada. Tu trabajo cuando el otro explota:

1. **No te defiendas en su pico.** Los argumentos en rojo ajeno son leña.
2. **Valida primero:** "veo que esto te dolió de verdad" / "tienes razón en que eso te sonó feo". Validar el dolor no es darle la razón en todo: es reconocer que su emoción existe. Nada baja más rápido la activación ajena.
3. **Después, tu versión,** con la fórmula, cuando haya bajado.
4. Si no baja: pausa bilateral. "Así nos hacemos daño; paremos y sigamos a las 8." Y a las 8, se sigue.` },

      { titulo: "6.5 Reparar bien", md: `
Cuando lastimaste, la reparación tiene cinco partes:

1. **Reconoce lo específico:** "te dije X y estuvo mal", no "perdón si algo te molestó".
2. **Sin "pero":** el pero borra todo lo anterior. Explicar tu estado se puede; justificarte, no.
3. **Valida el impacto:** "entiendo que te dolió / te asustó".
4. **Di qué harás distinto,** concreto: "estoy trabajando en pedir pausa antes de responder así".
5. **Sostenlo en el tiempo:** lo que repara es el cambio repetido, no las palabras.

Y cuida que la disculpa no termine con el otro consolándote a ti: ese giro convierte tu reparación en otra demanda.` },

      { titulo: "6.6 Reconstruir confianza (cuando el daño fue repetido)", md: `
La confianza no se restaura con una conversación épica sino con **predictibilidad**: muchas instancias pequeñas de comportamiento nuevo, sostenidas en el tiempo. Piensa en una cuenta: cada episodio viejo fue un retiro grande; cada pausa bien pedida, cada vuelta cumplida, cada semana sin mensaje bomba es un depósito chico. Los depósitos chicos constantes reconstruyen; los gestos enormes esporádicos, no. Consecuencia práctica: no prometas "nunca más" (promesa que no controlas); promete el método ("estoy entrenando esto, y cuando falle voy a repararlo rápido") y cúmplelo.` },

      { titulo: "6.7 Lo digital y el control de daños", md: `
- **El chat es el peor terreno** para temas delicados: sin tono, sin cara, con tiempo infinito para malinterpretar. Regla: dos mensajes de tensión → "mejor te llamo" o "lo hablamos en persona".
- **El visto** es el disparador moderno por excelencia y el que más películas genera. Si-entonces obligatorio para el visto (ver el ejemplo resuelto de 5.4).
- **Borradores siempre:** lo que se escribe en caliente se escribe en nota, no en el chat (la nota no tiene botón de enviar).
- **Audios en caliente, jamás:** el tono queda grabado.
- **¿Ya lo mandaste?** Control de daños, cuanto antes y en frío mínimo: "Lo que te escribí anoche estuvo mal, en el fondo y en la forma. No lo pienso. Estaba activado y no debí escribirte así. ¿Puedo llamarte y lo hablamos bien?" — y después reparación completa (6.5). Retirar el golpe rápido no borra el costo, pero lo reduce mucho y muestra el cambio en acción.` }
    ]
  },

    num: 7, id: "libro-7", titulo: "Programa de 90 días",
    resumen: "Toda la guía convertida en un solo foco por quincena. El seguimiento con casillas está en la herramienta Programa.",
    secciones: [
      { titulo: "Cómo funciona", md: `
La guía entera puede abrumar; este programa la convierte en un solo foco por quincena. Regla general: **no avances de fase hasta llevar al menos una semana practicando la actual.** En todas las fases sigue el check-in diario de un minuto.

El detalle de cada fase (tareas, criterio de avance y error típico) vive en la herramienta *Programa*, donde puedes marcar tu progreso. Resumen del recorrido:

1. **Semanas 1–2 · Observar:** calibrar el termómetro (número 3 veces al día) y anotar episodios sin intentar cambiarlos. Llenar *Mi cuaderno*.
2. **Semanas 3–4 · Nombrar:** emoción precisa en cada amarillo + levantar la tapa. Empieza la práctica de atención (5.9).
3. **Semanas 5–6 · Pausar y descargar:** protocolo caliente completo, frase ensayada a diario, conversación del contrato (Anexo H).
4. **Semanas 7–8 · Reglas y borradores:** reglas activas por escrito, si-entonces con ensayo mental diario.
5. **Semanas 9–10 · Desarmar interpretaciones:** hojas de cinco columnas, caza de tus distorsiones, anti-rumiación.
6. **Semanas 11–12 · Comunicar:** la fórmula en real (empezando por temas pequeños), un límite a tiempo, reparaciones pendientes.
7. **Semana 13 · Evaluar y consolidar:** repetir la autoevaluación, revisar las cuatro curvas, escribir el plan de mantenimiento.` }
    ]
  },

  {
    num: 8, id: "libro-8", titulo: "Problemas frecuentes",
    resumen: "Las diez situaciones que van a aparecer durante el entrenamiento, y qué hacer con cada una.",
    secciones: [
      { titulo: "\"En el momento se me olvida todo\"", md: `
Normal: el secuestro apaga justo la memoria de lo aprendido. Soluciones: sobreaprender UNA sola cosa (la frase de salida, ensayada en voz alta hasta el hartazgo) en vez de diez a medias; ensayo mental diario (5.2); el botón SOS a un toque; y las primeras veces, aceptar que llegarás tarde — cortar la cadena en el eslabón 7 sigue siendo mejor que en el 9.` },

      { titulo: "\"La pausa enoja más a la otra persona\"", md: `
Casi siempre porque la vive como abandono o castigo. Antídoto: la conversación del contrato (Anexo H) *antes* del próximo episodio: explicar en frío qué estás entrenando y qué significa tu pausa. Cuando el otro sabe que la pausa es *para volver mejor*, deja de pelearla. Y cumple la vuelta religiosamente: una sola pausa sin vuelta y el contrato pierde valor.` },

      { titulo: "\"Rumio durante horas o días\"", md: `
Protocolo 5.7 completo. Y revisa el terreno: la rumiación crece con cansancio y ocio ansioso. Si tras semanas de práctica el bucle sigue ocupando días enteros, es señal clara de que un profesional aceleraría mucho el proceso.` },

      { titulo: "\"¿Y si el otro realmente hizo algo malo? Regularme parece dejarlo pasar\"", md: `
Error de concepto clave: **regularte no es tragarte la injusticia; es reclamarla con puntería.** Puedes tener toda la razón Y estar en rojo: en rojo, tu reclamo justo sale envuelto en metralla y el otro responde a la metralla, no al reclamo. Regulado, tu reclamo llega entero y es mucho más difícil de esquivar. La regulación no reemplaza el reclamo: lo hace eficaz. Y si la otra persona sistemáticamente cruza tus límites, la respuesta regulada puede ser perfectamente tomar distancia de esa relación — decidido en verde, no como portazo en rojo.` },

      { titulo: "\"El otro me provoca / escala aunque yo esté tranquilo\"", md: `
Tu regulación no controla al otro; controla tu mitad del incendio (y los incendios necesitan dos). Usa 6.4: valida, no te defiendas en su pico, propone pausa bilateral. Si alguien usa tus botones deliberadamente y de forma repetida, eso ya no es un problema de manejo emocional tuyo: es información sobre esa relación.` },

      { titulo: "\"Ya mandé el mensaje bomba\"", md: `
Control de daños de 6.7, cuanto antes: retirar el golpe explícitamente, sin justificarlo, y pedir llevarlo a una conversación real. Luego reparación completa (6.5) y autopsia (5.4): ese episodio es tu mejor material de estudio.` },

      { titulo: "\"Funciona unas semanas y luego recaigo\"", md: `
Así funciona el aprendizaje de cualquier patrón viejo: la recaída es parte del proceso, no su refutación. Ve al protocolo de recaída (9.4). Dato importante: la recaída típica llega justo cuando empieza a ir bien y se afloja la práctica. Las semanas buenas no son para soltar el método; son la prueba de que el método funciona.` },

      { titulo: "\"Me da vergüenza pedir pausa; parece debilidad\"", md: `
Al revés: cualquiera puede descargar el impulso — eso es lo fácil, lo hace en automático todo el mundo. Contenerlo, nombrarlo y volver a la conversación es lo difícil. La frase de salida es de las cosas más adultas que se pueden decir en una discusión.` },

      { titulo: "\"¿Esto es reprimirme y volverme frío?\"", md: `
No: la meta es sentir TODO y elegir la acción. De hecho vas a sentir más que antes, porque nombrar con precisión te hace más consciente de matices que antes pasaban a rabia directa. Frialdad sería desconectar; esto es lo contrario.` },

      { titulo: "\"¿Cuánto tarda?\"", md: `
Primeros cambios visibles (detectar amarillo, algún borrador salvado): semanas 2–4. Cambio que otros notan: alrededor del mes 2–3. Automatización razonable: meses, con recaídas incluidas. Los años de patrón no se van en días; pero la curva es real y se mide (9.3).` }
    ]
  },
