  <script>
/* Ventana · Simulador del Dojo (motor)
   Conversaciones ramificadas por ESTADO: cada elección mueve Tensión y
   Conexión; la reacción del otro depende de esas barras, no de un guion fijo.
   Durante la simulación no hay puntos ni etiquetas de correcto/incorrecto:
   solo consecuencias, como en la vida. Todo lo demás llega al final:
   revisión del camino, análisis psicológico, razonamiento regulado,
   exploración contrafactual y modo terapeuta. */
(function () {
  const G = (window.Guia = window.Guia || {});
  const { h, montar, toast, fechaCorta } = G.dom;
  const DIA = 24 * 60 * 60 * 1000;

  /* ================= utilidades de datos ================= */
  function prog() { return G.storage.leer("sim_prog", {}); }
  function turnosLog() { return G.storage.leer("sim_turnos", []); }

  function escenasDe(cat, sub) {
    return G.simEscenas.filter((e) => e.cat === cat && (!sub || e.sub === sub)).sort((a, b) => a.nivel - b.nivel);
  }

  /** Progresión escalonada: el nivel mínimo de cada categoría está abierto;
      completar el nivel K desbloquea hasta el K+1 de esa categoría. */
  function desbloqueada(escena) {
    const deCat = G.simEscenas.filter((e) => e.cat === escena.cat);
    const minNivel = Math.min(...deCat.map((e) => e.nivel));
    if (escena.nivel === minNivel) return true;
    const p = prog();
    const maxComp = Math.max(0, ...deCat.filter((e) => p[e.id] && p[e.id].completada).map((e) => e.nivel));
    return escena.nivel <= maxComp + 1;
  }

  function vencidas() {
    const p = prog();
    return G.simEscenas.filter((e) => p[e.id] && p[e.id].proxima && p[e.id].proxima <= Date.now());
  }

  /* ================= competencias y recomendación ================= */
  function competencias() {
    const log = turnosLog();
    const porEmocion = {}, porHab = {};
    for (const t of log) {
      (porEmocion[t.emocion] = porEmocion[t.emocion] || { n: 0, reg: 0, imp: 0 });
      porEmocion[t.emocion].n++;
      if (t.tipo === "regulada") porEmocion[t.emocion].reg++;
      if (t.tipo === "impulso") porEmocion[t.emocion].imp++;
      (porHab[t.hab] = porHab[t.hab] || { reg: 0, imp: 0 });
      if (t.tipo === "regulada") porHab[t.hab].reg++;
      if (t.tipo === "impulso") porHab[t.hab].imp++;
    }
    const fortalezas = [], entrenar = [];
    for (const [emo, d] of Object.entries(porEmocion)) {
      if (d.n >= 3 && d.reg / d.n >= 0.7) fortalezas.push("Respondes regulado ante " + emo + " (" + Math.round((d.reg / d.n) * 100) + "%).");
      if (d.n >= 3 && d.imp / d.n >= 0.4) entrenar.push("Ante " + emo + ", el impulso todavía gana " + Math.round((d.imp / d.n) * 100) + "% de las veces.");
    }
    if ((porHab.pausa?.reg || 0) + (porHab.marco?.reg || 0) >= 3) fortalezas.push("Sabes pedir tiempo y poner marco antes de hablar.");
    if ((porHab.reparar?.reg || 0) >= 2) fortalezas.push("Tus reparaciones reconocen lo específico y esquivan el \u201cpero\u201d.");
    if ((porHab.limite?.reg || 0) >= 2) fortalezas.push("Pones límites a tiempo, sin drama.");
    if ((porHab.escucha?.imp || 0) >= 2) entrenar.push("Cuando te critican, la defensa te gana a la escucha.");
    if ((porHab.defusion?.imp || 0) >= 2) entrenar.push("Tu primera interpretación se convierte en sentencia (leer la mente).");
    if ((porHab.reparar?.imp || 0) >= 2) entrenar.push("En las disculpas se te cuela el \u201cpero\u201d o el autoflagelo.");
    return { fortalezas, entrenar, total: log.length };
  }

  function recomendacion() {
    const due = vencidas();
    if (due.length) return { escena: due[0], motivo: "Fallaste esta hace días: la repetición espaciada dice que hoy toca reintentarla." };
    const log = turnosLog();
    const porEmocion = {};
    for (const t of log) {
      (porEmocion[t.emocion] = porEmocion[t.emocion] || { n: 0, imp: 0 });
      porEmocion[t.emocion].n++;
      if (t.tipo === "impulso") porEmocion[t.emocion].imp++;
    }
    let peor = null;
    for (const [emo, d] of Object.entries(porEmocion)) {
      if (d.n >= 2 && (!peor || d.imp / d.n > peor.r)) peor = { emo, r: d.imp / d.n };
    }
    if (peor && peor.r > 0.3) {
      const e = G.simEscenas.find((x) => x.emocion.includes(peor.emo.split(" ")[0]) && desbloqueada(x));
      if (e) return { escena: e, motivo: "Tu patrón más débil ahora mismo es \u201c" + peor.emo + "\u201d: entrenar el punto flojo, no el truco favorito." };
    }
    const p = prog();
    const siguiente = G.simEscenas.filter((e) => desbloqueada(e) && !(p[e.id] && p[e.id].completada)).sort((a, b) => a.nivel - b.nivel)[0];
    if (siguiente) return { escena: siguiente, motivo: "Siguiente peldaño de tu progresión." };
    return { escena: G.simEscenas[0], motivo: "Repaso libre: hasta lo dominado se oxida." };
  }

  /* ================= vista principal ================= */
  function vista(vista) {
    const prefs = G.simPrefs || { modo: "entrenar" };
    G.simPrefs = null;

    if (prefs.escenaId) {
      const e = G.simEscenas.find((x) => x.id === prefs.escenaId);
      if (e) { jugar(e, prefs.modo === "examen"); return; }
    }
    if (prefs.modo === "examen") { empezarExamen(); return; }
    selectorCategorias();

    /* ---------- selección (modo entrenamiento) ---------- */
    function selectorCategorias() {
      const conContenido = G.simCategorias.filter((c) => G.simEscenas.some((e) => e.cat === c.id));
      montar(vista,
        h("p", { class: "eyebrow" }, "Simulador · modo entrenamiento"),
        h("h1", { class: "titulo" }, "¿Qué quieres practicar?"),
        h("p", { class: "subtitulo" }, "Eliges el terreno; la conversación evoluciona según tus decisiones. Sin puntos durante la práctica: solo consecuencias — el análisis llega al final."),
        h("div", { class: "tarjeta-fila" },
          conContenido.map((c) => {
            const n = G.simEscenas.filter((e) => e.cat === c.id).length;
            return h("button", { class: "tarjeta-accion", style: "text-align:left", onclick: () => selectorEscenas(c) },
              h("span", { class: "icono" }, c.nombre.split(" ")[0]),
              h("strong", null, c.nombre.replace(/^\S+\s/, "")),
              h("span", null, n + (n === 1 ? " simulación" : " simulaciones") + " · " + [...new Set(escenasDe(c.id).map((e) => e.sub))].join(", ")));
          })),
        h("p", { class: "tenue" }, "El catálogo crece por datos: cada escena es un objeto en js/data/simulaciones.js (formato documentado)."));
    }

    function selectorEscenas(cat) {
      const p = prog();
      montar(vista,
        h("p", { class: "eyebrow" }, "Simulador · " + cat.nombre),
        h("h1", { class: "titulo" }, "Elige la situación"),
        h("div", null, escenasDe(cat.id).map((e) => {
          const abierta = desbloqueada(e);
          const estado = p[e.id];
          return h("div", { class: "entrada" },
            h("div", { class: "entrada-cab" },
              h("span", { class: "badge " + (abierta ? "badge-verde" : "badge-ambar") }, abierta ? "Nivel " + e.nivel : "🔒 Nivel " + e.nivel),
              h("strong", null, e.titulo),
              h("span", { class: "tenue", style: "margin-left:auto" }, e.duracion),
              estado && estado.completada && h("span", { class: "badge " + (estado.ultimo === "bien" ? "badge-verde" : estado.ultimo === "medio" ? "badge-ambar" : "badge-rojo") }, estado.ultimo)),
            h("p", { class: "entrada-cuerpo", style: "margin-top:6px" }, e.sub + " · entrena: " + e.emocion),
            abierta
              ? h("div", { class: "fila-botones" }, h("button", { class: "btn btn-primario btn-mini", onclick: () => jugar(e, false) }, "Entrar"))
              : h("p", { class: "tenue" }, "Se desbloquea completando el nivel anterior de esta categoría."));
        })),
        h("div", { class: "fila-botones" }, h("button", { class: "btn btn-fantasma", onclick: selectorCategorias }, "← Categorías")));
    }

    /* ---------- modo examen ---------- */
    function empezarExamen() {
      const due = vencidas();
      const candidatas = due.length ? due : G.simEscenas.filter(desbloqueada);
      const e = candidatas[Math.floor(Math.random() * candidatas.length)];
      montar(vista,
        h("p", { class: "eyebrow" }, "Simulador · modo examen"),
        h("h1", { class: "titulo" }, "Situación sorpresa"),
        h("p", { class: "subtitulo" }, "No sabrás qué emoción pone a prueba hasta el análisis final. Integración de habilidades, como en la calle."),
        h("div", { class: "tarjeta" },
          h("p", null, e.contexto),
          h("div", { class: "fila-botones" }, h("button", { class: "btn btn-primario", onclick: () => jugar(e, true) }, "Empezar"))));
    }

    /* ================= motor de juego ================= */
    function jugar(escena, examen) {
      let T = escena.inicioT, C = escena.inicioC;
      const camino = []; // {turno, opcion, Tprev, Cprev}
      let contrafactual = null; // { desde, caminoOriginal, Tfin, Cfin }

      function medidores() {
        return h("div", { class: "sim-medidores" },
          medidor("Tensión", T, "rojo"), medidor("Conexión", C, "calma"));
      }
      function medidor(nombre, v, color) {
        return h("div", { class: "sim-medidor" },
          h("span", { class: "tenue" }, nombre + " " + v + "/10"),
          h("div", { class: "barra-progreso" }, h("div", { style: "width:" + (v * 10) + "%;background:var(--" + color + ")" })));
      }

      function variante(turno) {
        if (T >= 7 && turno.npc.tenso) return turno.npc.tenso;
        if (C >= 7 && turno.npc.calido) return turno.npc.calido;
        return turno.npc.base;
      }

      function renderTurno(i) {
        const turno = escena.turnos[i];
        const zona = h("div");
        turno.opciones.forEach((op, idx) => {
          zona.append(h("button", { class: "opcion-dojo", onclick: () => elegir(i, idx) }, op.t));
        });
        montar(vista,
          h("p", { class: "eyebrow" }, (examen ? "Examen" : escena.titulo) + " · turno " + (i + 1) + " de " + escena.turnos.length + (contrafactual ? " · EXPLORACIÓN CONTRAFACTUAL (no registra)" : "")),
          i === 0 && !contrafactual ? h("div", { class: "tarjeta", style: "border-color:var(--linea)" }, h("p", { class: "suave mb0" }, escena.contexto)) : null,
          medidores(),
          h("div", { class: "sim-npc" }, variante(turno)),
          h("p", { class: "suave" }, "¿Qué haces?"),
          zona);
      }

      function elegir(i, idx) {
        const op = escena.turnos[i].opciones[idx];
        camino.push({ turno: i, idx, Tprev: T, Cprev: C });
        T = Math.max(0, Math.min(10, T + op.dT));
        C = Math.max(0, Math.min(10, C + op.dC));
        if (!contrafactual) {
          const log = turnosLog();
          log.push({ ts: new Date().toISOString(), escena: escena.id, cat: escena.cat, emocion: escena.emocion, nivel: escena.nivel, tipo: op.tipo, hab: op.hab });
          G.storage.guardar("sim_turnos", log);
        }
        // Consecuencia narrada (sin etiqueta de tipo)
        montar(vista,
          h("p", { class: "eyebrow" }, (examen ? "Examen" : escena.titulo) + " · consecuencia" + (contrafactual ? " · CONTRAFACTUAL" : "")),
          medidores(),
          h("div", { class: "tarjeta", style: "border-color:var(--linea)" },
            h("p", null, op.efecto),
            h("p", { class: "tenue mb0" },
              (op.dT ? (op.dT > 0 ? "▲" : "▼") + " Tensión  " : "") +
              (op.dC ? (op.dC > 0 ? "▲" : "▼") + " Conexión" : ""))),
          h("div", { class: "fila-botones" },
            h("button", { class: "btn btn-primario", onclick: () => {
              if (i + 1 < escena.turnos.length) renderTurno(i + 1);
              else terminar();
            } }, i + 1 < escena.turnos.length ? "Continuar →" : "Ver cómo termina")));
      }

      function resultado() { const d = C - T; return d >= 3 ? "bien" : d <= -3 ? "mal" : "medio"; }

      function terminar() {
        const res = resultado();
        if (!contrafactual) {
          const p = prog();
          p[escena.id] = { completada: true, ultimo: res, ts: Date.now(), proxima: res === "bien" ? null : Date.now() + (res === "medio" ? 10 : 7) * DIA };
          G.storage.guardar("sim_prog", p);
        }
        analisis(res);
      }

      /* ---------- análisis final ---------- */
      function analisis(res) {
        const a = escena.analisis;
        const color = res === "bien" ? "calma" : res === "medio" ? "ambar" : "rojo";

        const revision = camino.map((paso) => {
          const op = escena.turnos[paso.turno].opciones[paso.idx];
          return h("div", { class: "entrada", style: "border-left:3px solid var(--" + (op.tipo === "regulada" ? "calma" : op.tipo === "parcial" ? "ambar" : "rojo") + ")" },
            h("div", { class: "entrada-cab" },
              h("span", { class: "badge " + (op.tipo === "regulada" ? "badge-verde" : op.tipo === "parcial" ? "badge-ambar" : "badge-rojo") }, "turno " + (paso.turno + 1) + " · " + op.tipo),
              h("button", { class: "btn btn-mini", style: "margin-left:auto", onclick: () => reJugar(paso) }, "¿Y si...?")),
            h("p", { class: "entrada-cuerpo" }, "\u201c" + op.t + "\u201d\n\n" + op.fb));
        });

        const preguntas = [
          "¿Qué parte fue la más difícil de elegir bien?",
          "¿Qué sentiste TÚ mientras elegías? (nómbralo con precisión)",
          "¿Te recordó algo real? ¿Esto te suele pasar?"
        ].map((q) => ({ q, area: h("textarea", { placeholder: q }) }));

        montar(vista,
          h("p", { class: "eyebrow" }, (contrafactual ? "Cierre contrafactual · " : "Sesión completa · ") + escena.titulo + " · nivel " + escena.nivel),
          h("h1", { class: "titulo", style: "font-size:1.6rem" }, res === "bien" ? "La conversación construyó" : res === "medio" ? "Empate con roce" : "La conversación costó"),
          medidores(),
          h("div", { class: "tarjeta", style: "border-color:var(--" + color + ")" }, h("p", { class: "mb0" }, escena.cierres[res])),

          contrafactual
            ? h("div", { class: "fila-botones" }, h("button", { class: "btn btn-primario", onclick: contrafactual.volver }, "← Volver a mi camino real"))
            : h("div", null,
                h("h3", { style: "font-family:var(--f-titulo)" }, "Revisión del camino"),
                h("p", { class: "tenue" }, "Recién ahora se revelan los perfiles de cada elección — y el \u201c¿Y si...?\u201d te deja explorar el camino que no tomaste (no registra ni puntúa)."),
                ...revision,

                h("h3", { style: "font-family:var(--f-titulo)" }, "Análisis psicológico"),
                h("div", { class: "tarjeta" }, h("div", { class: "prosa", html: G.md.render(
                  "- **Emoción en juego:** " + a.emocion + "\n" +
                  "- **La necesidad debajo:** " + a.necesidad + "\n" +
                  "- **La interpretación que fabricó el impulso:** " + a.interpretacion + "\n" +
                  "- **Sesgo cognitivo presente:** " + a.sesgo + "\n" +
                  "- **Ventana de tolerancia:** " + a.ventana + "\n" +
                  "- **La alternativa regulada:** " + a.alternativa + "\n" +
                  "- **Consecuencia en una relación real:** " + a.consecuencia) })),

                h("h3", { style: "font-family:var(--f-titulo)" }, "Cómo piensa la versión regulada"),
                h("div", { class: "tarjeta", style: "border-color:var(--calma)" }, h("p", { class: "mb0", style: "font-style:italic" }, escena.razonamiento)),

                h("h3", { style: "font-family:var(--f-titulo)" }, "Modo terapeuta · 2 minutos"),
                h("div", { class: "tarjeta" },
                  h("p", { class: "tenue" }, "No es examen: es donde la simulación se conecta con TU vida. Se guarda en Mi cuaderno."),
                  ...preguntas.flatMap((p) => [h("label", { class: "etiqueta" }, p.q), p.area]),
                  h("div", { class: "fila-botones" },
                    h("button", { class: "btn btn-primario", onclick: () => {
                      const lista = G.storage.leer("reflexiones", []);
                      lista.push({ ts: new Date().toISOString(), escena: escena.id, titulo: escena.titulo,
                        r: preguntas.map((p) => p.area.value.trim()) });
                      G.storage.guardar("reflexiones", lista);
                      toast("Guardado en Mi cuaderno");
                    } }, "Guardar reflexión"))),

                h("div", { class: "fila-botones" },
                  h("button", { class: "btn btn-primario", onclick: () => { G.simPrefs = { modo: examen ? "examen" : "entrenar" }; vistaRender(vista); } }, "Otra simulación"),
                  h("a", { class: "btn", href: "#/dojo" }, "Al Dojo"),
                  h("a", { class: "btn btn-fantasma", href: "#/inicio" }, "Inicio"))));
      }

      /* ---------- contrafactual: rejugar desde un turno ---------- */
      function reJugar(paso) {
        const snapshot = { camino: [...camino], T, C };
        camino.length = 0;
        camino.push(...snapshot.camino.slice(0, snapshot.camino.indexOf(paso)));
        T = paso.Tprev; C = paso.Cprev;
        contrafactual = {
          volver: () => {
            camino.length = 0; camino.push(...snapshot.camino);
            T = snapshot.T; C = snapshot.C;
            contrafactual = null;
            analisis(resultado());
          }
        };
        renderTurno(paso.turno);
      }

      renderTurno(0);
    }
  }

  function vistaRender(v) { vista(v); }

  G.simulador = { competencias, recomendacion, vencidas };
  G.vistas = G.vistas || {};
  G.vistas.simulador = vista;
})();

</script>
  <script>
/* Ventana · flujo de entrenamiento diario (v2: navegación libre)
   Check-in → Reto → Dojo ×2 → Repaso → Cierre, con:
   - Atrás en cada paso y puntos (dots) clicables: control total en un flujo corto.
   - Barra de progreso global + "Paso X de 5 · ~N min restantes".
   - Memoria de sesión: volver al check-in EDITA el mismo registro (no duplica);
     un escenario ya respondido se muestra en modo revisión (no se cultivan puntos);
     el repaso se reanuda donde quedó. */
(function () {
  const G = (window.Guia = window.Guia || {});
  const { h, montar, toast, claveDia, claseNivel } = G.dom;

  const PASOS = [
    { id: "checkin", nombre: "Check-in", min: 1 },
    { id: "reto",    nombre: "Reto",     min: 0.5 },
    { id: "dojo",    nombre: "Dojo 1",   min: 1 },
    { id: "dojo",    nombre: "Dojo 2",   min: 1 },
    { id: "repaso",  nombre: "Repaso",   min: 1.5 }
  ];

  function rachaPractica() {
    const dias = G.storage.leer("flujo_dias", {});
    let cuenta = 0;
    const d = new Date();
    if (!dias[claveDia(d)]) d.setDate(d.getDate() - 1);
    while (dias[claveDia(d)]) { cuenta++; d.setDate(d.getDate() - 1); }
    return cuenta;
  }

  function vista(vista) {
    let indice = 0;
    const puntosAntes = total(G.maestria.calcular());
    const estado = {
      checkinId: null,
      checkin: { nivel: 3, emocion: "", detecte: "na" },
      dojo: [null, null],          // respuesta congelada por ranura
      escenarios: null,            // sesión de 2, estable
      repaso: null                 // { cola, i }
    };
    if (G.prefill && G.prefill.checkin) { estado.checkin.nivel = G.prefill.checkin.nivel; G.prefill = null; }

    function total(p) { return Object.values(p).reduce((a, b) => a + b, 0); }

    /* ---------- Cabecera: barra + dots clicables + tiempo restante ---------- */
    function cabecera() {
      const enCierre = indice >= PASOS.length;
      const pct = enCierre ? 100 : Math.round((indice / PASOS.length) * 100);
      const restante = enCierre ? 0 : PASOS.slice(indice).reduce((a, p) => a + p.min, 0);
      const etiquetaTiempo = enCierre ? "completo"
        : restante < 1 ? "menos de 1 min restante"
        : "~" + (Number.isInteger(restante) ? restante : restante.toFixed(1)) + " min restantes";

      return h("div", { class: "flujo-cab" },
        h("div", { class: "barra-progreso" }, h("div", { style: "width:" + pct + "%" })),
        h("div", { class: "fila separado", style: "margin-top:8px" },
          h("div", { class: "flujo-dots", role: "group", "aria-label": "Pasos del flujo" },
            PASOS.map((p, i) =>
              h("button", {
                class: "dot" + (i < indice ? " hecho" : i === indice ? " actual" : ""),
                "aria-label": "Ir al paso " + (i + 1) + ": " + p.nombre,
                title: p.nombre,
                onclick: () => ir(i)
              }))),
          h("span", { class: "tenue" }, enCierre
            ? "Entrenamiento completo"
            : "Paso " + (indice + 1) + " de " + PASOS.length + " · " + etiquetaTiempo)));
    }

    function tituloPaso(eyebrow, titulo) {
      return [cabecera(), h("p", { class: "eyebrow" }, eyebrow), h("h1", { class: "titulo", style: "font-size:1.5rem" }, titulo)];
    }

    function botonAtras() {
      if (indice === 0) return null;
      return h("button", { class: "btn btn-fantasma", onclick: () => ir(indice - 1) }, "← Atrás");
    }
    function botonSaltar() {
      return h("button", { class: "btn btn-fantasma", onclick: avanzar }, "Saltar");
    }

    function ir(i) {
      indice = Math.max(0, Math.min(i, PASOS.length));
      pintar();
    }
    function avanzar() { ir(indice + 1); }

    function pintar() {
      if (indice >= PASOS.length) { pasoCierre(); return; }
      const paso = PASOS[indice].id;
      if (paso === "checkin") pasoCheckin();
      else if (paso === "reto") pasoReto();
      else if (paso === "dojo") pasoDojo();
      else pasoRepaso();
    }

    /* ---------- 1 · Check-in (editable al volver: mismo registro) ---------- */
    function pasoCheckin() {
      const c = estado.checkin;
      const lectura = h("div", { class: "lectura-numero " + claseNivel(c.nivel) }, String(c.nivel));
      const desl = h("input", { type: "range", class: "semaforo", min: "0", max: "10", value: String(c.nivel),
        "aria-label": "Nivel de 0 a 10",
        oninput: (e) => { c.nivel = Number(e.target.value); lectura.textContent = String(c.nivel); lectura.className = "lectura-numero " + claseNivel(c.nivel); } });
      const emocion = h("input", { type: "text", placeholder: "si hubo emoción fuerte: su nombre preciso (opcional)" });
      emocion.value = c.emocion;
      emocion.addEventListener("input", () => (c.emocion = emocion.value));
      const detecte = h("select", { onchange: (e) => (c.detecte = e.target.value) },
        h("option", { value: "na" }, "No hubo amarillo"),
        h("option", { value: "si" }, "Amarillo detectado a tiempo"),
        h("option", { value: "tarde" }, "Detectado tarde"),
        h("option", { value: "no" }, "No lo detecté"));
      detecte.value = c.detecte;

      function guardar() {
        const lista = G.storage.leer("checkins", []);
        if (estado.checkinId) {
          const previo = lista.find((x) => x.id === estado.checkinId);
          if (previo) { previo.nivel = c.nivel; previo.emocion = c.emocion.trim(); previo.detecte = c.detecte; }
          toast("Check-in corregido");
        } else {
          estado.checkinId = Date.now();
          lista.push({ id: estado.checkinId, ts: new Date().toISOString(), dia: claveDia(), nivel: c.nivel,
            emocion: c.emocion.trim(), detecte: c.detecte, episodio: false, herramienta: "", terreno: "", nota: "flujo diario" });
        }
        G.storage.guardar("checkins", lista);
        avanzar();
      }

      montar(vista, ...tituloPaso("Paso 1 · Check-in", "¿En qué número estás?"),
        estado.checkinId && h("p", { class: "tenue" }, "Ya guardaste este check-in; si cambias algo, se corrige el mismo registro."),
        h("div", { class: "tarjeta" },
          h("div", { class: "fila" }, lectura, h("div", { style: "flex:1" }, desl)),
          h("label", { class: "etiqueta" }, "Emoción (si la hubo)"), emocion,
          h("label", { class: "etiqueta" }, "¿Y el amarillo de hoy?"), detecte,
          h("div", { class: "fila-botones" },
            h("button", { class: "btn btn-primario", onclick: guardar }, estado.checkinId ? "Corregir y seguir" : "Guardar y seguir"),
            botonSaltar())));
    }

    /* ---------- 2 · Reto ---------- */
    function pasoReto() {
      const rd = G.maestria.retoDelDia();
      montar(vista, ...tituloPaso("Paso 2 · Reto del día", "Tu misión de hoy"),
        h("div", { class: "tarjeta", style: "border-color:var(--ambar)" },
          h("p", { style: "font-size:1.05rem" }, rd.reto.t),
          h("div", { class: "fila-botones" },
            rd.hecho
              ? h("button", { class: "btn", onclick: avanzar }, "Ya lo hice hoy ✓")
              : h("button", { class: "btn btn-primario", onclick: () => { G.maestria.marcarReto(); toast("+2 a su disciplina"); avanzar(); } }, "Hecho → seguir"),
            botonAtras(),
            h("button", { class: "btn btn-fantasma", onclick: avanzar }, "Lo hago más tarde"))));
    }

    /* ---------- 3–4 · Dojo (revisión si ya respondiste) ---------- */
    function ranuraDojo() { return PASOS.slice(0, indice + 1).filter((p) => p.id === "dojo").length - 1; }

    function pasoDojo() {
      if (!estado.escenarios) estado.escenarios = G.dojoUtil.elegirSesion(2);
      const slot = ranuraDojo();
      const e = estado.escenarios[slot];
      const respuesta = estado.dojo[slot];

      if (respuesta) { // modo revisión: sin re-responder, sin cultivar puntos
        montar(vista, ...tituloPaso("Paso " + (indice + 1) + " · Dojo (revisión)", e.situacion),
          h("div", { class: "tarjeta", style: "border-color:var(--" + (respuesta.tipo === "regulada" ? "calma" : respuesta.tipo === "parcial" ? "ambar" : "rojo") + ")" },
            h("p", { class: "eyebrow" }, "Tu respuesta · " + (respuesta.tipo === "regulada" ? "regulada +2" : respuesta.tipo === "parcial" ? "parcial +1" : "impulso +0")),
            h("p", null, "\u201c" + respuesta.texto + "\u201d"),
            h("p", { class: "suave" }, respuesta.fb),
            respuesta.tipo !== "regulada" && h("p", { class: "suave" }, h("strong", null, "La jugada del domador: "), respuesta.regulada),
            h("p", { class: "tenue" }, "Lección: " + e.leccion)),
          h("div", { class: "fila-botones" },
            h("button", { class: "btn btn-primario", onclick: avanzar }, "Seguir →"), botonAtras()));
        return;
      }

      const zona = h("div");
      G.dojoUtil.barajar(e.opciones).forEach((op) => {
        zona.append(h("button", { class: "opcion-dojo", onclick: (ev) => {
          G.dojoUtil.registrar(e, op);
          estado.dojo[slot] = { texto: op.t, tipo: op.tipo, fb: op.fb, regulada: e.opciones.find((o) => o.tipo === "regulada").t };
          zona.querySelectorAll(".opcion-dojo").forEach((b) => (b.disabled = true));
          ev.currentTarget.classList.add("elegida-" + op.tipo);
          zona.append(h("div", { class: "tarjeta", style: "margin-top:12px;border-color:var(--" + (op.tipo === "regulada" ? "calma" : op.tipo === "parcial" ? "ambar" : "rojo") + ")" },
            h("p", { class: "eyebrow" }, op.tipo === "regulada" ? "Regulada · +2" : op.tipo === "parcial" ? "Parcial · +1" : "Impulso · +0"),
            h("p", null, op.fb),
            op.tipo !== "regulada" && h("p", { class: "suave" }, h("strong", null, "La jugada del domador: "), estado.dojo[slot].regulada),
            h("div", { class: "fila-botones" }, h("button", { class: "btn btn-primario", onclick: avanzar }, "Seguir →"))));
        } }, op.t));
      });
      montar(vista, ...tituloPaso("Paso " + (indice + 1) + " · Dojo", e.situacion),
        h("p", { class: "suave" }, "¿Qué haces?"), zona,
        h("div", { class: "fila-botones" }, botonAtras(), botonSaltar()));
    }

    /* ---------- 5 · Repaso (reanudable) ---------- */
    function pasoRepaso() {
      if (!estado.repaso) {
        let cola = G.repasoMotor.pendientes();
        if (!cola.length) cola = [...G.tarjetas].sort(() => Math.random() - 0.5);
        estado.repaso = { cola: cola.slice(0, 5), i: 0 };
      }
      const r = estado.repaso;

      if (r.i >= r.cola.length) {
        montar(vista, ...tituloPaso("Paso 5 · Repaso", "Repaso del día completo"),
          h("div", { class: "tarjeta", style: "border-color:var(--calma)" },
            h("p", { class: "suave mb0" }, r.cola.length + " tarjetas calificadas. El algoritmo ya reprogramó cada una según tu respuesta.")),
          h("div", { class: "fila-botones" },
            h("button", { class: "btn btn-primario", onclick: avanzar }, "Al cierre →"), botonAtras()));
        return;
      }

      const t = r.cola[r.i];
      const dorso = h("div", { class: "tarjeta oculto", style: "border-color:var(--calma)" },
        h("p", null, t.dorso),
        h("div", { class: "fila-botones" },
          h("button", { class: "btn btn-peligro btn-mini", onclick: () => califica("otra") }, "Otra vez"),
          h("button", { class: "btn btn-mini", onclick: () => califica("bien") }, "Bien"),
          h("button", { class: "btn btn-primario btn-mini", onclick: () => califica("facil") }, "Fácil")));
      const ver = h("button", { class: "btn btn-primario", onclick: () => { dorso.classList.remove("oculto"); ver.classList.add("oculto"); } }, "Mostrar respuesta");

      function califica(grado) { G.repasoMotor.calificar(t.id, grado); r.i++; pasoRepaso(); }

      montar(vista, ...tituloPaso("Paso 5 · Repaso " + (r.i + 1) + "/" + r.cola.length, t.frente),
        h("div", { class: "fila-botones" }, ver, botonAtras(), botonSaltar()), dorso);
    }

    /* ---------- Cierre ---------- */
    function pasoCierre() {
      const dias = G.storage.leer("flujo_dias", {});
      dias[claveDia()] = true;
      G.storage.guardar("flujo_dias", dias);
      const ganados = total(G.maestria.calcular()) - puntosAntes;
      const racha = rachaPractica();
      const rango = G.maestria.rangoGlobal(G.maestria.calcular());

      montar(vista, cabecera(),
        h("p", { class: "eyebrow" }, "Entrenamiento de hoy · completo"),
        h("h1", { class: "titulo" }, "+" + ganados + " puntos"),
        h("div", { class: "tarjeta", style: "border-color:var(--calma)" },
          h("p", { class: "suave mb0" },
            "Racha de práctica: " + racha + " día" + (racha === 1 ? "" : "s") +
            " · Rango: " + rango.rango.nombre + " (" + rango.total + " pts)" +
            (rango.siguiente ? " · siguiente a los " + rango.siguiente.min : ""))),
        h("p", { class: "suave" }, "Esto era todo por hoy. El resto del cambio pasa afuera: una señal notada, una frase dicha, una vuelta cumplida."),
        h("div", { class: "fila-botones" },
          h("a", { class: "btn btn-primario", href: "#/inicio" }, "Listo por hoy"),
          h("button", { class: "btn", onclick: () => ir(PASOS.length - 1) }, "← Revisar el repaso"),
          h("a", { class: "btn btn-fantasma", href: "#/maestria" }, "Ver maestría")));
    }

    pintar();
  }

  G.flujo = { rachaPractica };
  G.vistas = G.vistas || {};
  G.vistas.flujo = vista;
})();

</script>
  <script>
/* Ventana · compuerta de entrada
   Triaje al abrir la app. No es un menú: es UNA pregunta —la pregunta central
   del método— con tres salidas grandes. Cada apertura es una repetición de la
   habilidad de autoevaluarse. Configurable en Copia y datos. */
(function () {
  const G = (window.Guia = window.Guia || {});
  const { h, montar, claveDia } = G.dom;

  let mostradaEnEstaCarga = false;
  let nodo = null;

  function preferencia() { return G.storage.leer("pref_compuerta", "siempre"); }

  function cerrar() {
    if (nodo) { nodo.remove(); nodo = null; }
    document.body.style.overflow = "";
    G.storage.guardar("compuerta_dia", claveDia());
  }

  function marco(...contenido) {
    return h("div", { class: "compuerta", role: "dialog", "aria-modal": "true", "aria-label": "¿Dónde estás ahora?" },
      h("div", { class: "compuerta-cuerpo" }, ...contenido)
    );
  }

  function pantallaPrincipal() {
    const btnRojo = h("button", { class: "puerta puerta-rojo", onclick: () => { cerrar(); G.emergencia.abrir(); } },
      h("span", { class: "puerta-rango" }, "7–10"),
      h("strong", null, "Estoy activado"),
      h("span", { class: "puerta-sub" }, "Urgencia, pecho apretado, ganas de responder YA")
    );
    const btnAmbar = h("button", { class: "puerta puerta-ambar", onclick: pantallaAmbar },
      h("span", { class: "puerta-rango" }, "4–6"),
      h("strong", null, "Algo se mueve"),
      h("span", { class: "puerta-sub" }, "Señales presentes, todavía pienso claro")
    );
    const btnVerde = h("button", { class: "puerta puerta-verde", onclick: () => { cerrar(); G.router.navegar("#/flujo"); } },
      h("span", { class: "puerta-rango" }, "0–3"),
      h("strong", null, "Tranquilo · vengo a entrenar"),
      h("span", { class: "puerta-sub" }, "Entrenamiento de hoy: ~5 minutos")
    );

    montar(nodo, marco(
      h("p", { class: "eyebrow centro" }, "Ventana"),
      h("h2", { class: "compuerta-titulo" }, "¿Dónde estás ahora?"),
      btnRojo, btnAmbar, btnVerde,
      h("div", { class: "centro", style: "margin-top:20px" },
        h("button", { class: "btn btn-fantasma btn-mini", onclick: () => { cerrar(); } }, "Solo explorar"))
    ));
    setTimeout(() => btnRojo.focus(), 50);
  }

  /* Ámbar: directo al STOP guiado, la artillería del amarillo. */
  function pantallaAmbar() {
    G.prefill = { stop: { nivel: 5 } };
    cerrar();
    G.router.navegar("#/stop");
  }

  function pantallaAmbarVieja() {
    const escenario = G.respiracion.crearEscenario({ tecnica: "suspiro", autoIniciar: true });
    // versión corta: detener tras ~3 ciclos lo decide el usuario con los botones
    montar(nodo, marco(
      h("p", { class: "eyebrow centro" }, "Amarillo · aquí se gana"),
      h("h2", { class: "compuerta-titulo" }, "Tres respiraciones antes de nada"),
      escenario.el,
      h("p", { class: "ancla-rotativa centro" }, "Esto es el pico subiendo. Todavía eliges tú."),
      h("div", { class: "fila-botones", style: "justify-content:center" },
        h("button", { class: "btn btn-primario", onclick: () => {
          escenario.detener();
          G.prefill = { checkin: { nivel: 5 } };
          cerrar(); G.router.navegar("#/checkin");
        } }, "Ya bajó → registrarlo"),
        h("button", { class: "btn btn-sos", onclick: () => { escenario.detener(); cerrar(); G.emergencia.abrir(); } }, "Sigo subiendo → SOS")
      )
    ));
  }

  function autoMostrar() {
    if (mostradaEnEstaCarga) return;
    const pref = preferencia();
    if (pref === "nunca") return;
    if (pref === "diaria" && G.storage.leer("compuerta_dia") === claveDia()) return;
    mostrar();
  }

  function mostrar() {
    mostradaEnEstaCarga = true;
    if (nodo) nodo.remove();
    nodo = h("div");
    document.getElementById("zonaOverlay").append(nodo);
    document.body.style.overflow = "hidden";
    pantallaPrincipal();
    document.addEventListener("keydown", function esc(e) {
      if (e.key === "Escape" && nodo) { cerrar(); document.removeEventListener("keydown", esc); }
    });
  }

  G.compuerta = { autoMostrar, mostrar };
})();

</script>

  <script>
/* Ventana · arranque: navegación, rutas y eventos globales */
(function () {
  const G = window.Guia;
  const { h, montar } = G.dom;

  /* ---- Navegación lateral ---- */
  const HERRAMIENTAS = [
    ["#/checkin", "Check-in", "1 minuto al día"],
    ["#/stop", "STOP guiado", "para el amarillo"],
    ["#/descarga", "Descarga física", "frío, ejercicio, caminar"],
    ["#/ola", "Surf de la ola", "tu pico, graficado"],
    ["#/vaciadero", "Vaciadero", "quemar o borrador frío"],
    ["#/anclaje", "Anclaje", "5-4-3-2-1, pendulación"],
    ["#/compasion", "Autocompasión", "contra la vergüenza-gasolina"],
    ["#/conversacion", "Preparador", "tu fórmula, sin peros"],
    ["#/dojo", "Dojo", "escenarios con feedback"],
    ["#/repaso", "Repaso", "tarjetas espaciadas"],
    ["#/respiracion", "Respiración", "guiada, 3 técnicas"],
    ["#/autopsia", "Autopsia", "procesa episodios"],
    ["#/frases", "Frases de salida", "filtrables, copiables"],
    ["#/autoevaluacion", "Autoevaluación", "tu línea de base"],
    ["#/programa", "Programa 90 días", "un foco por quincena"],
    ["#/estadisticas", "Estadísticas", "tus cuatro curvas"],
    ["#/maestria", "Maestría", "rango y reto del día"],
    ["#/cuaderno", "Mi cuaderno", "tu mapa personal"],
    ["#/datos", "Copia y datos", "todo es tuyo"]
  ];

  function construirNav() {
    const lateral = document.getElementById("lateral");
    const nodos = [h("h2", null, "Empieza"),
      enlace("#/inicio", "Inicio", null),
      enlace("#/flujo", "Entrenamiento de hoy", "~5 min encadenados"),
      enlace("#/como-usar", "Cómo usar la app", null)];

    nodos.push(h("h2", null, "Herramientas"));
    for (const [href, nombre, mini] of HERRAMIENTAS) nodos.push(enlace(href, nombre, mini));

    nodos.push(h("h2", null, "La guía"));
    for (const libro of G.libros) {
      const etiqueta = typeof libro.num === "number" ? "Libro " + libro.num : libro.titulo;
      const mini = typeof libro.num === "number" ? libro.titulo : "plantillas y guiones";
      nodos.push(enlace("#/libro/" + libro.id, etiqueta, mini));
    }
    montar(lateral, ...nodos);
  }

  function enlace(href, nombre, mini) {
    return h("a", { href }, nombre, mini && h("span", { class: "mini" }, mini));
  }

  /* ---- Rutas ---- */
  G.router.registrar("#/inicio", G.vistas.inicio);
  G.router.registrar("#/checkin", G.vistas.checkin);
  G.router.registrar("#/respiracion", G.vistas.respiracion);
  G.router.registrar("#/autopsia", G.vistas.autopsia);
  G.router.registrar("#/frases", G.vistas.frases);
  G.router.registrar("#/autoevaluacion", G.vistas.autoevaluacion);
  G.router.registrar("#/programa", G.vistas.programa);
  G.router.registrar("#/cuaderno", G.vistas.cuaderno);
  G.router.registrar("#/datos", G.vistas.datos);
  G.router.registrar("#/dojo", G.vistas.dojo);
  G.router.registrar("#/repaso", G.vistas.repaso);
  G.router.registrar("#/estadisticas", G.vistas.estadisticas);
  G.router.registrar("#/maestria", G.vistas.maestria);
  G.router.registrar("#/flujo", G.vistas.flujo);
  G.router.registrar("#/como-usar", G.vistas.comoUsar);
  G.router.registrar("#/vaciadero", G.vistas.vaciadero);
  G.router.registrar("#/ola", G.vistas.ola);
  G.router.registrar("#/descarga", G.vistas.descarga);
  G.router.registrar("#/stop", G.vistas.stop);
  G.router.registrar("#/conversacion", G.vistas.conversacion);
  G.router.registrar("#/anclaje", G.vistas.anclaje);
  G.router.registrar("#/compasion", G.vistas.compasion);
  G.router.registrar("#/simulador", G.vistas.simulador);
  for (const libro of G.libros) {
    G.router.registrar("#/libro/" + libro.id, G.vistas.renderLibro(libro.id));
  }

  /* ---- Eventos globales ---- */
  document.getElementById("btnSOS").addEventListener("click", () => G.emergencia.abrir());

  const lateral = document.getElementById("lateral");
  const capa = document.getElementById("capaNav");
  const alternador = document.getElementById("navToggle");
  alternador.addEventListener("click", () => {
    const abierto = lateral.classList.toggle("abierto");
    capa.hidden = !abierto;
    alternador.setAttribute("aria-expanded", String(abierto));
  });
  capa.addEventListener("click", () => {
    lateral.classList.remove("abierto");
    capa.hidden = true;
    alternador.setAttribute("aria-expanded", "false");
  });

  // Atajo de teclado: S abre el SOS (salvo escribiendo en un campo)
  document.addEventListener("keydown", (e) => {
    if (e.key.toLowerCase() === "s" && !e.ctrlKey && !e.metaKey && !e.altKey) {
      const t = e.target;
      if (t && (t.tagName === "INPUT" || t.tagName === "TEXTAREA" || t.tagName === "SELECT" || t.isContentEditable)) return;
      G.emergencia.abrir();
    }
    if (e.key === "Escape") G.emergencia.cerrar();
  });

  construirNav();
  G.router.iniciar("#/inicio");
  G.compuerta.autoMostrar();
})();

</script>
